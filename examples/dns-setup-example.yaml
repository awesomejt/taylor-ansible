# Example playbook for Technitium DNS with zone management
---
- name: Setup Technitium DNS Server with Zones
  hosts: dns_servers
  become: true
  roles:
    - technitium-dns

  vars:
    # Override default credentials (use Ansible Vault in production!)
    technitium_username: "admin"
    technitium_password: "your_secure_password_here"

    # Define your local zones and records
    technitium_zones:
      - name: "local"  # Your local domain
        type: "Primary"
        update: "UseSpecifiedNetworkACL"
        update_network_acl:
          - "192.168.1.0/24"
        records:
          # NS records
          - domain: "local"
            type: "NS"
            nameServer: "dns.local"
            ttl: 3600

          # A records for infrastructure
          - domain: "dns.local"
            type: "A"
            ipAddress: "192.168.1.10"  # Your DNS server IP
            ttl: 3600

          - domain: "router.local"
            type: "A"
            ipAddress: "192.168.1.1"   # Your router IP
            ttl: 3600

          - domain: "nas.local"
            type: "A"
            ipAddress: "192.168.1.20"  # Your NAS IP
            ttl: 3600

          - domain: "server.local"
            type: "A"
            ipAddress: "192.168.1.30"  # Your main server IP
            ttl: 3600

          # CNAME records
          - domain: "www.local"
            type: "CNAME"
            cname: "server.local"
            ttl: 3600

          - domain: "files.local"
            type: "CNAME"
            cname: "nas.local"
            ttl: 3600

          # Additional services
          - domain: "plex.local"
            type: "A"
            ipAddress: "192.168.1.40"  # Plex server
            ttl: 3600

          - domain: "docker.local"
            type: "A"
            ipAddress: "192.168.1.50"  # Docker host
            ttl: 3600

      # Reverse zone for 192.168.1.0/24 network
      - name: "1.168.192.in-addr.arpa"
        type: "Primary"
        records:
          - domain: "10.1.168.192.in-addr.arpa"
            type: "PTR"
            ptrName: "dns.local"
            ttl: 3600

          - domain: "1.1.168.192.in-addr.arpa"
            type: "PTR"
            ptrName: "router.local"
            ttl: 3600

          - domain: "20.1.168.192.in-addr.arpa"
            type: "PTR"
            ptrName: "nas.local"
            ttl: 3600

          - domain: "30.1.168.192.in-addr.arpa"
            type: "PTR"
            ptrName: "server.local"
            ttl: 3600

      # Example for allowing ExternalDNS RFC2136 updates from a K3s subnet
      - name: "taylor.lan"
        type: "Primary"
        update: "UseSpecifiedNetworkACL"
        update_network_acl:
          - "192.168.50.0/24"