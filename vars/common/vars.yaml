technitium_zones: 
  - name: "dev.lab"
    type: "Primary"
    # allow updates authenticated by TSIG `external-dns-dev` key for A/AAAA records
    update: "UseSpecifiedNetworkACL"
    update_network_acl:
      - "192.168.50.0/24"
      - "10.42.0.0/16"
    update_security_policies:
      - tsigKeyName: "{{ k3s_external_dns_rfc2136_tsig_keyname_dev }}"
        domain: "dev.lab"
        allowedTypes:
          - "A"
          - "AAAA"
          - "CNAME"
          - "TXT"
  - name: "prod.lab"
    type: "Primary"
    # allow updates authenticated by TSIG `external-dns-prod` key for A/AAAA records
    update: "UseSpecifiedNetworkACL"
    update_network_acl:
      - "192.168.50.0/24"
      - "10.42.0.0/16"
    update_security_policies:
      - tsigKeyName: "{{ k3s_external_dns_rfc2136_tsig_keyname_prod }}"
        domain: "prod.lab"
        allowedTypes:
          - "A"
          - "AAAA"
          - "CNAME"
          - "TXT"
  - name: "stage.lab"
    type: "Primary"
    # allow updates authenticated by TSIG `external-dns-stage` key for A/AAAA records
    update: "UseSpecifiedNetworkACL"
    update_network_acl:
      - "192.168.50.0/24"
      - "10.42.0.0/16"
    update_security_policies:
      - tsigKeyName: "{{ k3s_external_dns_rfc2136_tsig_keyname_stage }}"
        domain: "stage.lab"
        allowedTypes:
          - "A"
          - "AAAA"
          - "CNAME"
          - "TXT"
technitium_tsig_keys:
  - keyName: "{{ k3s_external_dns_rfc2136_tsig_keyname_dev }}"
    sharedSecret: "{{ vault_external_dns_dev_rfc2136_tsig_secret }}"
    algorithmName: "hmac-sha256"
  - keyName: "{{ k3s_external_dns_rfc2136_tsig_keyname_stage }}"
    sharedSecret: "{{ vault_external_dns_stage_rfc2136_tsig_secret }}"
    algorithmName: "hmac-sha256"
  - keyName: "{{ k3s_external_dns_rfc2136_tsig_keyname_prod }}"
    sharedSecret: "{{ vault_external_dns_prod_rfc2136_tsig_secret }}"
    algorithmName: "hmac-sha256"

# Hermes AI Agent (Nous Research) - https://github.com/NousResearch/hermes-agent
hermes_git_repo: "https://github.com/NousResearch/hermes-agent.git"
hermes_git_version: "main"
hermes_git_user_name: "Rogue Daemon"
hermes_git_user_email: "hermes@jasongtaylor.com"
hermes_soul_version: "main"
hermes_python_extras: "web,messaging"
hermes_api_timeout_seconds: 45
hermes_api_stale_timeout_seconds: 60
hermes_api_max_retries: 1
# oMLX servers (OpenAI-compatible). MacBook Pro = primary, Mac Mini = hot standby.
hermes_omlx_macbook_url: "http://192.168.50.93:8000/v1"
hermes_omlx_macmini_url: "http://192.168.50.94:8000/v1"
# Convenience alias for primary server (used in profile base_url).
hermes_omlx_base_url: "{{ hermes_omlx_macbook_url }}"
# Legacy Ollama alias retained for any non-hermes playbooks that still reference it.
hermes_ollama_base_url: "{{ hermes_omlx_macmini_url }}"
# Legacy fallback only; store the real key in vault_hermes_omlx_api_key.
hermes_omlx_api_key: "example"

hermes_cifs_credentials_file: "/etc/samba/credentials/nas"
hermes_cifs_shares:
  - path: "/mnt/hermes"
    src: "//192.168.50.10/Hermes"
    opts: "credentials={{ hermes_cifs_credentials_file }},uid={{ hermes_user }},gid={{ hermes_group }},iocharset=utf8,vers=3.1.1,_netdev,nofail,x-systemd.automount,x-systemd.idle-timeout=5min,rw"
  - path: "/mnt/content"
    src: "//192.168.50.4/Content"
    opts: "credentials={{ hermes_cifs_credentials_file }},uid={{ hermes_user }},gid={{ hermes_group }},iocharset=utf8,vers=3.1.1,_netdev,nofail,x-systemd.automount,x-systemd.idle-timeout=5min,ro"
  - path: "/mnt/recordings"
    src: "//192.168.50.10/Recordings"
    opts: "credentials={{ hermes_cifs_credentials_file }},uid={{ hermes_user }},gid={{ hermes_group }},iocharset=utf8,vers=3.1.1,_netdev,nofail,x-systemd.automount,ro"

# Profile-first Hermes deployment.
# Single-bot-first approach: only primary ingress profile runs gateway + Discord.
# Worker profiles stay available for Kanban/task delegation with isolated state.
hermes_primary_profile: "chat"
hermes_dashboard_instance: "chat"
hermes_profiles:
  - name: chat
    gateway_enabled: true
    provider: "custom"
    base_url: "{{ hermes_omlx_macbook_url }}"
    model: "gpt-oss-20b-MXFP4-Q8"
    cli_toolsets:
      - "hermes-cli"
      - "kanban-orchestrator"
    discord_enabled: true
    discord_require_mention: true
    discord_home_channel: "1500086740352766063"
    fallback_providers:
      - provider: "custom"
        base_url: "{{ hermes_omlx_macmini_url }}"
        model: "gpt-oss-20b-MLX-8bit"
