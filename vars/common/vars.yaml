# Nexus nginx reverse-proxy settings (override per-environment as needed)
# Set to true to enable nginx provisioning and proxy configuration
# Enable nginx reverse proxy for Nexus
nexus_nginx_enable: true
# Public hostname for Nexus (used to issue certificates and nginx server_name)
nexus_nginx_server_name: "nexus.taylor.lan"
nexus_docker_registry_enable: true
nexus_docker_registry_host: "docker.nexus.taylor.lan"
nexus_docker_repository_name: "docker-hosted"
# If true, nginx will be configured to use HTTPS and certs from the paths below
nexus_nginx_use_ssl: false
