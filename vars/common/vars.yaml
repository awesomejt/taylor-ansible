# Common variables
technitium_api_url: "http://192.168.50.53:5380"
technitium_username: "admin"
technitium_password: "{{ vault_technitium_password | default('admin') }}"

k3s_external_dns_rfc2136_tsig_keyname_stage: "external-dns-stage"
k3s_external_dns_rfc2136_tsig_keyname_prod: "external-dns-prod"

nexus_username: "admin"
nexus_password: "{{ vault_nexus_password | default('admin') }}"

# Nexus nginx reverse-proxy settings (override per-environment as needed)
# Set to true to enable nginx provisioning and proxy configuration
# Enable nginx reverse proxy for Nexus
nexus_nginx_enable: true
# Public hostname for Nexus (used to issue certificates and nginx server_name)
nexus_nginx_server_name: "nexus.taylor.lan"
nexus_docker_registry_enable: true
nexus_docker_registry_host: "docker.nexus.taylor.lan"
nexus_docker_repository_name: "docker-hosted"
# If true, nginx will be configured to use HTTPS and certs from the paths below
nexus_nginx_use_ssl: false
# Optional: enable Let's Encrypt provisioning via certbot (webroot)
nexus_nginx_letsencrypt_enable: false
nexus_nginx_letsencrypt_email: ""

## Secrets - located in vars/common/secrets.yaml (not committed to Git)
# vault_technitium_password
# vault_external_dns_stage_rfc2136_tsig_secret
# vault_external_dns_prod_rfc2136_tsig_secret
# vault_argocd_gitops_admin_password
# vault_harbor_admin_password
# vault_headlamp_oidc_client_id
# vault_headlamp_oidc_client_secret
# vault_headlamp_oidc_issuer_url
# vault_headlamp_oidc_scopes
# vault_headlamp_oidc_callback_url
# vault_headlamp_oidc_validator_client_id
# vault_headlamp_oidc_validator_issuer_url
# vault_headlamp_oidc_use_access_token
# vault_headlamp_oidc_use_pkce
# vault_headlamp_oidc_me_user_info_url

technitium_zones: 
  - name: "prod.lab"
    type: "Primary"
    # allow updates authenticated by TSIG `external-dns-prod` key for A/AAAA records
    update: "UseSpecifiedNetworkACL"
    update_network_acl: []
    update_security_policies:
      - tsigKeyName: "{{ k3s_external_dns_rfc2136_tsig_keyname_prod }}"
        domain: "prod.lab"
        allowedTypes:
          - "A"
          - "AAAA"
          - "CNAME"
  - name: "stage.lab"
    type: "Primary"
    # allow updates authenticated by TSIG `external-dns-stage` key for A/AAAA records
    update: "UseSpecifiedNetworkACL"
    update_network_acl: []
    update_security_policies:
      - tsigKeyName: "{{ k3s_external_dns_rfc2136_tsig_keyname_stage }}"
        domain: "stage.lab"
        allowedTypes:
          - "A"
          - "AAAA"
          - "CNAME"
technitium_tsig_keys:
  - keyName: "{{ k3s_external_dns_rfc2136_tsig_keyname_stage }}"
    sharedSecret: "{{ vault_external_dns_stage_rfc2136_tsig_secret }}"
    algorithmName: "hmac-sha256"
  - keyName: "{{ k3s_external_dns_rfc2136_tsig_keyname_prod }}"
    sharedSecret: "{{ vault_external_dns_prod_rfc2136_tsig_secret }}"
    algorithmName: "hmac-sha256"
