# Copy this file to secrets.yaml and populate with real values.
# Encrypt with: ansible-vault encrypt vars/common/secrets.yaml

vault_technitium_password: ""
vault_external_dns_dev_rfc2136_tsig_secret: ""
vault_external_dns_stage_rfc2136_tsig_secret: ""
vault_external_dns_prod_rfc2136_tsig_secret: ""
vault_argocd_gitops_admin_password: ""
# Required when k3s_harbor_admin_secret_enabled: true
vault_harbor_admin_password: ""
# Headlamp OIDC — only needed if you have an IdP and set k3s_headlamp_oidc_secret_enabled: true
# vault_headlamp_oidc_client_id: ""
# vault_headlamp_oidc_client_secret: ""
# vault_headlamp_oidc_issuer_url: ""

vault_step_ca_password: "MySuperSecretPassword"
vault_step_ca_provisioner_password: "AnotherSuperSecretPassword"
vault_step_ca_admin_email: "admin@jasongtaylor.com"

# OpenClaw — Discord bot credentials
# Create a Discord application and bot at https://discord.com/developers/applications
openclaw_discord_token: ""
openclaw_discord_server_id: ""
openclaw_discord_users:
  - ""  # Add Discord user IDs who are allowed to DM the bot

# Hermes AI Agent (Nous Research) secrets
# Docs: https://github.com/NousResearch/hermes-agent/blob/main/.env.example

# REQUIRED: OpenRouter API key - all LLM calls route through OpenRouter
# Get at: https://openrouter.ai/keys
vault_hermes_openrouter_api_key: ""

# REQUIRED if hermes_nginx_auth_enable: true
# Password for HTTP Basic Auth protecting the dashboard web UI
vault_hermes_dashboard_password: ""

# OPTIONAL: Telegram gateway - get token from @BotFather at https://t.me/BotFather
# Enable with: hermes_telegram_enabled: true in vars.yaml
# vault_hermes_telegram_bot_token: ""

# OPTIONAL: Discord gateway - create bot at https://discord.com/developers/applications
# Enable with: hermes_discord_enabled: true in vars.yaml
# vault_hermes_discord_token: ""

# OPTIONAL: Slack gateway - requires both a bot token (xoxb-) and app token (xapp-)
# Create app at: https://api.slack.com/apps (enable Socket Mode)
# Enable with: hermes_slack_enabled: true in vars.yaml
# vault_hermes_slack_bot_token: ""
# vault_hermes_slack_app_token: ""