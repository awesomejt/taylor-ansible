# Copy this file to secrets.yaml and populate with real values.
# Encrypt with: ansible-vault encrypt vars/common/secrets.yaml

# ── HashiCorp Vault bootstrap (vault-configure.yaml) ──────────────────────
# Root token from `vault operator init`. Required for first run of
# vault-configure.yaml. Retire this token after vault_admin_token is stored.
vault_root_token: ""

# Long-lived admin token created by vault-configure.yaml on first run.
# The playbook prints the value — add it here, then future runs skip creation.
# Once set, you can optionally switch vault_configure_token to use this instead.
vault_admin_token: ""

# ESO AppRole credentials created by vault-configure.yaml on first run.
# The playbook prints both values — add them here to skip regeneration.
# vault_eso_role_id is not sensitive (it's like a username), but store it here
# for reference and to pass to the ESO ClusterSecretStore manifest.
vault_eso_role_id: ""
# vault_eso_secret_id IS sensitive — treat like a password.
# Generate a new one: ansible-playbook vault-configure.yaml (clear this field first)
vault_eso_secret_id: ""

vault_technitium_password: ""
vault_external_dns_dev_rfc2136_tsig_secret: ""
vault_external_dns_stage_rfc2136_tsig_secret: ""
vault_external_dns_prod_rfc2136_tsig_secret: ""

# Grafana admin passwords per k3s cluster environment.
# Written to Vault KV at secret/k3s/<env>/grafana by vault-populate.yaml.
# Generate with: openssl rand -base64 24 | tr -d '=+/' | head -c 32
vault_grafana_admin_password_dev: ""
vault_grafana_admin_password_stage: ""
vault_grafana_admin_password_prod: ""

vault_argocd_gitops_admin_password: ""
# Required when k3s_harbor_admin_secret_enabled: true
vault_harbor_admin_password: ""
# Harbor PostgreSQL password for external DB user/database (`harbor` on postgres_prod).
# Generate with: openssl rand -hex 24
vault_harbor_db_password: ""
# Harbor robot account secrets — used by harbor.yaml to create system-level robot accounts.
# Each secret is set once; Harbor stores it as a bcrypt hash. You cannot retrieve it later.
# Generate with: openssl rand -hex 20
vault_harbor_robot_local_secret: ""
vault_harbor_robot_opencode_secret: ""
vault_harbor_robot_hermes_secret: ""
vault_harbor_robot_ci_builder_secret: ""
# Headlamp OIDC — only needed if you have an IdP and set k3s_headlamp_oidc_secret_enabled: true
# vault_headlamp_oidc_client_id: ""
# vault_headlamp_oidc_client_secret: ""
# vault_headlamp_oidc_issuer_url: ""

vault_step_ca_password: ""
vault_step_ca_provisioner_password: ""
vault_step_ca_admin_email: "admin@example.com"

# Note: vault_step_ca_intermediate_key is NOT required here.
# k3s-bootstrap decrypts the intermediate CA key from the step-ca host at run
# time using vault_step_ca_password. No manual key export needed.

# AI stack secrets
# AI stack secrets — new per-service names (recommended for new deployments)
# Generate master key: openssl rand -hex 32
vault_litellm_master_key: ""
# Generate with: openssl rand -hex 24
vault_litellm_postgres_password: ""
# Open WebUI web-blocklist PostgreSQL password for openwebui_blocklist user/database.
# Generate with: openssl rand -hex 24
vault_openwebui_blocklist_postgres_password: ""
# Open WebUI web-memory PostgreSQL password for openwebui_web_memory user/database.
# Generate with: openssl rand -hex 24
vault_openwebui_web_memory_postgres_password: ""
# Generate with: openssl rand -hex 32
vault_searxng_secret_key: ""
# Generate with: openssl rand -hex 32
vault_n8n_encryption_key: ""
vault_omlx_api_key: ""
# Grafana admin password for Compose-host Grafana role.
# Generate with: openssl rand -hex 20
vault_grafana_admin_password: ""
# pgAdmin default admin password for Compose-host pgAdmin role.
# Generate with: openssl rand -hex 20
vault_pgadmin_admin_password: ""
# Vikunja service secret for kanban deployment.
# Generate with: openssl rand -hex 32
vault_vikunja_service_secret: ""
# Vikunja PostgreSQL password for common/prod postgres server backend.
# Generate with: openssl rand -hex 24
vault_vikunja_db_password: ""

# Legacy names (kept for backward compatibility — new installs should use names above)
vault_openwebui_litellm_master_key: ""
vault_openwebui_postgres_password: ""
vault_openwebui_searxng_secret_key: ""
vault_openwebui_n8n_encryption_key: ""
vault_openwebui_omlx_api_key: ""

# OpenCode AI coding assistant VM — GitHub SSH access
# RSA 4096 keypair generated once, stored in Vault at secret/infra/opencode/github-ssh-key.
# Register the public key in GitHub: Settings → SSH keys (or repo deploy key).
# Generate a new pair: ssh-keygen -t rsa -b 4096 -C "opencode@taylor.lan" -f /tmp/opencode_rsa -N ""
vault_opencode_github_ssh_private_key: |
  -----BEGIN OPENSSH PRIVATE KEY-----
  # paste private key here
  -----END OPENSSH PRIVATE KEY-----
vault_opencode_github_ssh_public_key: "ssh-rsa AAAA... opencode@taylor.lan"

# OpenClaw — Discord bot credentials
# Create a Discord application and bot at https://discord.com/developers/applications
openclaw_discord_token: ""
openclaw_discord_server_id: ""
openclaw_discord_users:
  - ""  # Add Discord user IDs who are allowed to DM the bot

# Hermes AI Agent (Nous Research) secrets
# Docs: https://github.com/NousResearch/hermes-agent/blob/main/.env.example
vault_hermes_openrouter_api_key: ""  # Optional fallback provider key
vault_hermes_openai_api_key: ""     # Optional direct OpenAI fallback provider key
vault_hermes_omlx_api_key: ""        # API key for OpenAI-compatible custom endpoints (oMLX)
vault_hermes_omlx_monitor_webhook: "" # Discord webhook URL for oMLX server status alerts
vault_hermes_gh_token: ""           # GitHub PAT for cloning private ai-agents repo
vault_hermes_dashboard_password: ""  # Basic auth password for nginx dashboard proxy (hermes_nginx_auth_user)
# SMB/CIFS credentials for Hermes NAS mounts (written to /etc/samba/credentials/nas by roles/hermes).
# Use an account with least-privilege access to the shares in hermes_cifs_shares.
vault_hermes_cifs_username: ""
vault_hermes_cifs_password: ""

# Discord bot tokens — required only for gateway-enabled profiles.
# Current profile plan: define admin and jessica tokens.
vault_hermes_discord_tokens:
  admin: ""      # Required for admin gateway profile
  jessica: ""    # Required for jessica gateway profile
  # rachel: ""   # Optional for future gateway-enabled profile

# GitHub Actions self-hosted runner — PAT for runner registration API calls.
# Fine-grained token: Organization → Self-hosted runners: Read and write
# Classic token: admin:org scope (includes manage_runners:org)
# Create at: https://github.com/settings/tokens
vault_gh_runner_pat: ""

# LLDAP — Lightweight LDAP server (ldap.taylor.lan / 192.168.50.50)
# JWT secret: generate with `openssl rand -hex 32`
vault_lldap_jwt_secret: ""
# LDAP admin bind password (shared by LDAP clients like Vikunja, Grafana, pgAdmin, and Open WebUI): generate with `openssl rand -hex 16`
vault_lldap_ldap_user_pass: ""
# PostgreSQL password for the lldap database user: generate with `openssl rand -hex 24`
vault_lldap_db_password: ""
