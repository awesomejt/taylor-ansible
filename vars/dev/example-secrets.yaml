# Copy this file to secrets.yaml and populate with real values.
# Encrypt with: ansible-vault encrypt vars/dev/secrets.yaml

# K3s cluster token — shared across all nodes in this environment.
# Generate with: openssl rand -hex 32
vault_k3s_token: ""

# ArgoCD GitOps repository SSH deploy key (ed25519 recommended).
# Generate with: ssh-keygen -t ed25519 -C "argocd-homelab-k3s" -f /tmp/argocd_key -N ""
# Add the public key as a deploy key on the homelab-k3s GitHub repo (read access only).
vault_argocd_gitops_repo_ssh_private_key: |
  -----BEGIN OPENSSH PRIVATE KEY-----
  # paste key here
  -----END OPENSSH PRIVATE KEY-----

# External DNS RFC2136 TSIG secret for the dev.lab zone.
# Must match the keyName configured in Technitium DNS (k3s_external_dns_rfc2136_tsig_keyname_dev).
# Generate with: openssl rand -base64 32
# Note: migrate this to Vault KV (secret/k3s/dev/external-dns-tsig) and remove from here
# once ESO is bootstrapped and External DNS is GitOps-managed.
vault_external_dns_rfc2136_tsig_secret_alg: "hmac-sha256"
vault_external_dns_rfc2136_tsig_secret: ""

vault_reposilite_admin_password: ""

# Grafana admin password for the dev cluster.
# Written to Vault KV at secret/k3s/dev/grafana by vault-populate.yaml.
# The k3s-bootstrap ESO ExternalSecret reads it from Vault — not directly used by Ansible.
# Generate with: openssl rand -base64 24 | tr -d '=+/' | head -c 32
# NOTE: This key lives in vars/common/secrets.yaml as vault_grafana_admin_password_dev.
#       See vars/common/example-secrets.yaml for the canonical entry.
