# Environment: prod
k3s_domain_name: taylor.lan
k3s_server_name: k3s-prod-server1
k3s_fqdn: "{{ k3s_server_name }}.{{ k3s_domain_name }}"
k3s_server_count: 3
k3s_worker_count: 5

postgresql_db_user: "postgres"
postgresql_listen_addresses: "*"
postgresql_allowed_client_cidrs:
  - "192.168.50.0/24"
postgresql_users:
  - cman
  - resolve
postgresql_databases:
  - name: course_manager
    owner: cman
    encoding: UTF-8
  - name: resolve-training
    owner: resolve
    encoding: UTF-8

k3s_registration_address: "{{ k3s_fqdn }}"
k3s_api_check_host: "192.168.50.17"  # k3s-prod-server1 IP — used by wait_for to bypass DNS on joining servers
k3s_external_dns_rfc2136_tsig_keyname: "external-dns-prod"
k3s_prod_ha: true
k3s_enable_cert_manager: true
k3s_enable_argocd: true
k3s_argocd_bootstrap_app_name: "homelab-prod"
k3s_argocd_bootstrap_path: "clusters/prod"
k3s_argocd_gitops_repo_url: "git@github.com:awesomejt/homelab-k3s.git"
k3s_argocd_gitops_repo_target_revision: main

k3s_server_disable_components: []
k3s_server_tls_sans:
  - "{{ k3s_registration_address }}"
k3s_server_extra_args: []
k3s_agent_extra_args: []

reposilite_admin_username: "admin"
grafana_admin_username: "admin"


