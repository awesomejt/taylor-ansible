# Vault-sourced secrets.
# Loaded after vars/common/vars.yaml and vars/common/secrets.yaml so these
# values override any stubs that remain in secrets.yaml.
#
# Prerequisites:
#   vault_api_addr    — defined in vars/common/vars.yaml
#   vault_admin_token — bootstrap credential in vars/common/secrets.yaml
#
# Install the collection once on the Ansible host before running playbooks:
#   ansible-galaxy collection install -r requirements.yaml
#
# Do NOT add this file to playbooks that run before Vault is operational
# (vault.yaml, vault-configure.yaml, step-ca.yml, dns.yaml, baseline.yaml).

# ── Traefik ───────────────────────────────────────────────────────────────────
vault_traefik_tls_cert: >-
  {{ lookup('community.hashi_vault.hashi_vault',
     'secret/data/infra/traefik/wildcard-tls',
     url=vault_api_addr, auth_method='token', token=vault_admin_token)['tls.crt'] }}

vault_traefik_tls_key: >-
  {{ lookup('community.hashi_vault.hashi_vault',
     'secret/data/infra/traefik/wildcard-tls',
     url=vault_api_addr, auth_method='token', token=vault_admin_token)['tls.key'] }}

