---
- name: Install Hermes AI Agent Orchestrator
  hosts: hermes
  become: true
  gather_facts: true
  vars_files:
    - "vars/common/vars.yaml"
    - "vars/common/secrets.yaml"
  pre_tasks:
    - name: Wait for apt locks to be released
      ansible.builtin.shell: |
        while fuser /var/lib/apt/lists/lock \
                    /var/lib/dpkg/lock \
                    /var/lib/dpkg/lock-frontend \
                    /var/cache/apt/archives/lock >/dev/null 2>&1; do
          echo "Waiting for apt lock..."
          sleep 10
        done
      changed_when: false
      timeout: 600

    - name: Validate Hermes Discord token is defined when Discord is enabled
      ansible.builtin.assert:
        that:
          - (vault_hermes_discord_token | default('') | length) > 0
        fail_msg: "Define vault_hermes_discord_token in vars/common/secrets.yaml when hermes_discord_enabled=true"
      when: hermes_discord_enabled | default(false) | bool
  roles:
    - updates
    - common
    - { role: hermes, tags: ["hermes"] }
