---
- name: Install Hermes AI Agent Orchestrator
  hosts: hermes
  become: true
  gather_facts: true
  vars_files:
    - "vars/common/vars.yaml"
    - "vars/common/secrets.yaml"
  pre_tasks:
    - name: Wait for apt locks to be released
      ansible.builtin.shell: |
        while fuser /var/lib/apt/lists/lock \
                    /var/lib/dpkg/lock \
                    /var/lib/dpkg/lock-frontend \
                    /var/cache/apt/archives/lock >/dev/null 2>&1; do
          echo "Waiting for apt lock..."
          sleep 10
        done
      changed_when: false
      timeout: 600

    - name: Validate Discord bot tokens exist for all Discord-enabled instances
      ansible.builtin.assert:
        that:
          - vault_hermes_discord_tokens is defined
          - (vault_hermes_discord_tokens[item.name] | default('') | length) > 0
        fail_msg: "Define vault_hermes_discord_tokens.{{ item.name }} in vars/common/secrets.yaml"
      loop: "{{ hermes_instances | selectattr('discord_enabled', 'equalto', true) | list }}"
      loop_control:
        label: "{{ item.name }}"
  roles:
    - updates
    - common
    - { role: hermes, tags: ["hermes"] }
