- name: Validate K3s inventory and environment settings
  hosts: localhost
  gather_facts: false
  vars:
    target_env: "{{ env | default('prod') }}"
    k3s_server_group: "k3s_{{ target_env }}_servers"
  vars_files:
    - "vars/common/vars.yaml"
    - "vars/common/secrets.yaml"
    - "vars/{{ env | default('prod') }}/vars.yaml"
    - "vars/{{ env | default('prod') }}/secrets.yaml"
  tasks:
    - name: Ensure vault_k3s_token is defined
      ansible.builtin.assert:
        that:
          - vault_k3s_token is defined
          - (vault_k3s_token | string | length) > 0
        fail_msg: "Define vault_k3s_token in vars/{{ env | default('prod') }}/secrets.yaml"

    - name: Ensure K3s server group exists and has hosts
      ansible.builtin.assert:
        that:
          - groups[k3s_server_group] is defined
          - (groups[k3s_server_group] | length) > 0
        fail_msg: "Inventory group {{ k3s_server_group }} must exist and include at least one host."

    - name: Ensure prod HA has at least three server nodes when enabled
      ansible.builtin.assert:
        that:
          - (groups[k3s_server_group] | length) >= 3
        fail_msg: "Prod HA is enabled. Add at least 3 hosts in {{ k3s_server_group }}."
      when:
        - target_env == 'prod'
        - k3s_prod_ha | default(true) | bool

    - name: Ensure K3s registration address is configured
      ansible.builtin.assert:
        that:
          - (k3s_registration_address | default('') | string | length) > 0
        fail_msg: "Set k3s_registration_address in vars/{{ env | default('prod') }}/vars.yaml"

- name: Bootstrap first K3s control-plane server
  hosts: "k3s_{{ env | default('prod') }}_servers[0]"
  become: true
  vars_files:
    - "vars/common/vars.yaml"
    - "vars/common/secrets.yaml"
    - "vars/{{ env | default('prod') }}/vars.yaml"
    - "vars/{{ env | default('prod') }}/secrets.yaml"
  roles:
    - common
    - role: k3s-server
      vars:
        k3s_mode: server
        k3s_server_init: true

- name: Join additional K3s control-plane servers
  hosts: "k3s_{{ env | default('prod') }}_servers[1:]"
  serial: 1
  become: true
  vars_files:
    - "vars/common/vars.yaml"
    - "vars/common/secrets.yaml"
    - "vars/{{ env | default('prod') }}/vars.yaml"
    - "vars/{{ env | default('prod') }}/secrets.yaml"
  roles:
    - common
    - role: k3s-server
      vars:
        k3s_mode: server
        k3s_server_init: false

- name: Join K3s agent nodes
  hosts: "k3s_{{ env | default('prod') }}_agents"
  serial: 1
  become: true
  vars_files:
    - "vars/common/vars.yaml"
    - "vars/common/secrets.yaml"
    - "vars/{{ env | default('prod') }}/vars.yaml"
    - "vars/{{ env | default('prod') }}/secrets.yaml"
  roles:
    - common
    - role: k3s-server
      vars:
        k3s_mode: agent

- name: Install cert-manager on first control-plane server when enabled
  hosts: "k3s_{{ env | default('prod') }}_servers[0]"
  become: true
  vars_files:
    - "vars/common/vars.yaml"
    - "vars/common/secrets.yaml"
    - "vars/{{ env | default('prod') }}/vars.yaml"
    - "vars/{{ env | default('prod') }}/secrets.yaml"
  tasks:
    - name: Include cert-manager install tasks
      ansible.builtin.include_role:
        name: k3s-server
        tasks_from: cert-manager
      when: k3s_enable_cert_manager | bool

- name: Install Argo CD on first control-plane server when enabled
  hosts: "k3s_{{ env | default('prod') }}_servers[0]"
  become: true
  vars_files:
    - "vars/common/vars.yaml"
    - "vars/common/secrets.yaml"
    - "vars/{{ env | default('prod') }}/vars.yaml"
    - "vars/{{ env | default('prod') }}/secrets.yaml"
  tasks:
    - name: Include Argo CD install tasks
      ansible.builtin.include_role:
        name: k3s-server
        tasks_from: argocd
      when: k3s_enable_argocd | bool

- name: Create Reposilite secrets on first control-plane server
  hosts: "k3s_{{ env | default('prod') }}_servers[0]"
  become: true
  vars_files:
    - "vars/common/vars.yaml"
    - "vars/common/secrets.yaml"
    - "vars/{{ env | default('prod') }}/vars.yaml"
    - "vars/{{ env | default('prod') }}/secrets.yaml"
  tasks:
    - name: Ensure reposilite namespace exists
      ansible.builtin.shell: |
        set -euo pipefail
        k3s kubectl create namespace reposilite --dry-run=client -o yaml | k3s kubectl apply -f -
      args:
        executable: /bin/bash
      register: reposilite_namespace
      changed_when: "'created' in reposilite_namespace.stdout or 'configured' in reposilite_namespace.stdout"

    - name: Create Reposilite admin secret
      become: true
      ansible.builtin.shell: |
        set -euo pipefail
        k3s kubectl create secret generic reposilite-admin \
          --namespace reposilite \
          --from-literal=username="{{ reposilite_admin_username }}" \
          --from-literal=password="{{ vault_reposilite_admin_password }}" \
          --dry-run=client -o yaml | k3s kubectl apply -f -
      args:
        executable: /bin/bash
      register: reposilite_secret
      changed_when: "'created' in reposilite_secret.stdout or 'configured' in reposilite_secret.stdout"

    - name: Create Grafana admin secret
      become: true
      ansible.builtin.shell: |
        set -euo pipefail
        k3s kubectl create secret generic grafana-admin \
          --namespace monitoring \
          --from-literal=admin-user="{{ grafana_admin_username }}" \
          --from-literal=admin-password="{{ vault_grafana_admin_password }}" \
          --dry-run=client -o yaml | k3s kubectl apply -f -
      args:
        executable: /bin/bash
      register: grafana_secret
      changed_when: "'created' in grafana_secret.stdout or 'configured' in grafana_secret.stdout"