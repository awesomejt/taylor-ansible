- name: PostgreSQL 18 Setup
  hosts: "postgres_{{ env | default('prod') }}"
  vars_files:
    - "vars/{{ env | default('prod') }}/vars.yaml"
    - "vars/{{ env | default('prod') }}/secrets.yaml"
  vars:
    postgresql_use_list_bootstrap: >-
      {{
        (postgresql_users | default([]) | length) > 0
        or (postgresql_databases | default([]) | length) > 0
      }}
  pre_tasks:
    - name: Wait for apt locks to be released
      become: true
      ansible.builtin.shell: |
        while fuser /var/lib/apt/lists/lock \
                    /var/lib/dpkg/lock \
                    /var/lib/dpkg/lock-frontend \
                    /var/cache/apt/archives/lock >/dev/null 2>&1; do
          echo "Waiting for apt lock..."
          sleep 10
        done
      changed_when: false
      timeout: 600

    - name: Ensure vault_postgresql_dbpass is defined when using app bootstrap mode
      ansible.builtin.assert:
        that:
          - vault_postgresql_dbpass is defined
          - (vault_postgresql_dbpass | string | length) > 0
        fail_msg: >-
          Define vault_postgresql_dbpass in vars/{{ env | default('prod') }}/secrets.yaml
          or set postgresql_users/postgresql_databases in vars/{{ env | default('prod') }}/vars.yaml.
      when: not (postgresql_use_list_bootstrap | bool)

    - name: Ensure vault_postgresql_dbpass is defined when using list bootstrap mode
      ansible.builtin.assert:
        that:
          - vault_postgresql_dbpass is defined
          - (vault_postgresql_dbpass | string | length) > 0
        fail_msg: >-
          Define vault_postgresql_dbpass in vars/{{ env | default('prod') }}/secrets.yaml
          to set passwords for users in postgresql_users.
      when: postgresql_use_list_bootstrap | bool
  roles:
    - updates
    - common
    - role: postgresql-18
      vars:
        postgresql_manage_app_db: "{{ not (postgresql_use_list_bootstrap | bool) }}"
        postgresql_db_user_password: "{{ vault_postgresql_dbpass | default('') }}"
  post_tasks:
    - name: Ensure declared PostgreSQL roles exist
      become: true
      become_user: postgres
      community.postgresql.postgresql_user:
        name: "{{ item }}"
        password: "{{ vault_postgresql_dbpass }}"
        role_attr_flags: LOGIN
      no_log: true
      loop: "{{ postgresql_users | default([]) }}"
      when: postgresql_use_list_bootstrap | bool

    - name: Ensure declared PostgreSQL databases exist
      become: true
      become_user: postgres
      community.postgresql.postgresql_db:
        name: "{{ item.name }}"
        owner: "{{ item.owner }}"
        encoding: "{{ (item.encoding | default('UTF8')) | replace('-', '') }}"
        template: "{{ item.template | default('template0') }}"
      loop: "{{ postgresql_databases | default([]) }}"
      when: postgresql_use_list_bootstrap | bool
