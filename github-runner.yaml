---
- name: Deploy GitHub Actions self-hosted runner
  hosts: "{{ target | default('compose') }}"
  become: true
  gather_facts: true
  vars_files:
    - vars/common/vars.yaml
    - vars/common/secrets.yaml
    - vars/vault-secrets.yaml
  vars:
    # GitHub org that owns this runner. Override with -e target= for a different host.
    gh_runner_org: "taylor-family"
  pre_tasks:
    - name: Wait for apt locks to be released
      ansible.builtin.shell: |
        while fuser /var/lib/apt/lists/lock \
                    /var/lib/dpkg/lock \
                    /var/lib/dpkg/lock-frontend \
                    /var/cache/apt/archives/lock >/dev/null 2>&1; do
          echo "Waiting for apt lock..."
          sleep 10
        done
      changed_when: false
      timeout: 600
  roles:
    - updates
    - common
    - docker
    - github-runner
