- name: Install common packages
  become: true
  ansible.builtin.apt:
    name:
      - nano
      - git
      - qemu-guest-agent
      - zip
      - unzip
      - curl
      - wget
      - net-tools
      - openssh-server
      - ca-certificates
      - gnupg
      - lsb-release
      - software-properties-common
      - acl
    state: present
    lock_timeout: 600

- name: Ensure qemu-guest-agent is enabled and started
  become: true
  ansible.builtin.service:
    name: qemu-guest-agent
    enabled: true
    state: started

- name: Clean up APT
  become: true
  ansible.builtin.apt:
    autoclean: true
    autoremove: true
    lock_timeout: 600

- name: Ensure systemd-resolved drop-in directory exists
  become: true
  ansible.builtin.file:
    path: /etc/systemd/resolved.conf.d
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Configure systemd-resolved to route all DNS via local server
  become: true
  ansible.builtin.copy:
    dest: /etc/systemd/resolved.conf.d/10-local-dns.conf
    owner: root
    group: root
    mode: '0644'
    content: |
      [Resolve]
      DNS=192.168.50.53
      Domains=~.
  register: _resolved_dropin

- name: Restart systemd-resolved to apply DNS routing config
  become: true
  ansible.builtin.systemd:
    name: systemd-resolved
    state: restarted
  when: _resolved_dropin.changed
  failed_when: false
