---
- name: Validate K3s role variables
  ansible.builtin.assert:
    that:
      - k3s_mode in ['server', 'agent']
      - vault_k3s_token is defined
      - (vault_k3s_token | string | length) > 0
      - not (k3s_mode == 'agent' and (k3s_registration_address | string | length) == 0)
      - not (k3s_mode == 'server' and not (k3s_server_init | bool) and (k3s_registration_address | string | length) == 0)
    fail_msg: >-
      Invalid K3s configuration. Ensure vault_k3s_token is defined in vars/<env>/secrets.yaml,
      and set k3s_registration_address when joining additional server or agent nodes.

- name: Install K3s prerequisites
  become: true
  ansible.builtin.apt:
    name:
      - curl
      - ca-certificates
    state: present
    update_cache: true

- name: Set K3s service metadata
  ansible.builtin.set_fact:
    k3s_service_name: "{{ 'k3s' if k3s_mode == 'server' else 'k3s-agent' }}"
    k3s_service_unit_path: "{{ '/etc/systemd/system/k3s.service' if k3s_mode == 'server' else '/etc/systemd/system/k3s-agent.service' }}"

- name: Check if K3s service unit already exists
  become: true
  ansible.builtin.stat:
    path: "{{ k3s_service_unit_path }}"
  register: k3s_service_unit

- name: Gather service facts
  become: true
  ansible.builtin.service_facts:

- name: Determine whether K3s service is currently active
  ansible.builtin.set_fact:
    k3s_service_active: >-
      {{
        (ansible_facts.services[k3s_service_name + '.service'] is defined)
        and (ansible_facts.services[k3s_service_name + '.service'].state == 'running')
      }}

- name: Check installed K3s version
  become: true
  ansible.builtin.command: /usr/local/bin/k3s --version
  register: k3s_version_check
  changed_when: false
  failed_when: false

- name: Determine installed K3s version and whether upgrade is needed
  ansible.builtin.set_fact:
    k3s_installed_version: >-
      {{
        (
          k3s_version_check.stdout | default('')
          | regex_findall('k3s version\s+(v[^\s]+)')
          | first
          | default('')
        )
      }}
    k3s_upgrade_needed: >-
      {{
        (k3s_version | default('') | string | length) > 0
        and
        (
          (
            k3s_version_check.stdout | default('')
            | regex_findall('k3s version\s+(v[^\s]+)')
            | first
            | default('')
          ) != (k3s_version | string)
        )
      }}

- name: Report K3s version state
  ansible.builtin.debug:
    msg: >-
      host={{ inventory_hostname }} installed={{ k3s_installed_version | default('not-installed') }}
      desired={{ ((k3s_version | default('') | string | length) > 0) | ternary(k3s_version, 'channel-default') }}
      upgrade_needed={{ k3s_upgrade_needed | bool }}

- name: Build K3s server install command
  ansible.builtin.set_fact:
    k3s_install_exec: >-
      server
      {% if k3s_server_init | bool %}
      --cluster-init
      {% else %}
      --server https://{{ k3s_api_check_host if (k3s_api_check_host | string | length) > 0 else k3s_registration_address }}:6443
      {% endif %}
      --write-kubeconfig-mode {{ k3s_kubeconfig_mode }}
      {% for component in k3s_server_disable_components %}
      --disable {{ component }}
      {% endfor %}
      {% for tls_san in k3s_server_tls_sans %}
      --tls-san {{ tls_san }}
      {% endfor %}
      {% for arg in k3s_server_extra_args %}
      {{ arg }}
      {% endfor %}
  when: k3s_mode == 'server'

- name: Build K3s agent install command
  ansible.builtin.set_fact:
    k3s_install_exec: >-
      agent
      {% for arg in k3s_agent_extra_args %}
      {{ arg }}
      {% endfor %}
  when: k3s_mode == 'agent'

- name: Install K3s server
  when:
    - k3s_mode == 'server'
    - not k3s_service_unit.stat.exists or not k3s_service_active or k3s_upgrade_needed or (k3s_force_reinstall | bool)
  block:
    - name: Run K3s server installer
      become: true
      ansible.builtin.shell: |
        set -euo pipefail
        timeout --signal=TERM {{ k3s_task_timeout_seconds | int }}s \
          bash -o pipefail -c "curl -sfL {{ k3s_install_script_url }} | sh -"
      args:
        executable: /bin/bash
      environment:
        INSTALL_K3S_EXEC: "{{ k3s_install_exec | trim }}"
        INSTALL_K3S_VERSION: "{{ k3s_version }}"
        K3S_TOKEN: "{{ vault_k3s_token }}"
      register: k3s_server_install
      changed_when: true
      failed_when: k3s_server_install.rc not in [0, 124]

    - name: Gather service facts after K3s server installer timeout
      become: true
      ansible.builtin.service_facts:
      when: k3s_server_install.rc == 124

    - name: Fail when K3s server installer timed out and service is not active
      ansible.builtin.fail:
        msg: >-
          K3s server installer timed out after {{ k3s_task_timeout_seconds }} seconds
          on {{ inventory_hostname }} and service is not active.
          stdout={{ k3s_server_install.stdout | default('') | trim }}
          stderr={{ k3s_server_install.stderr | default('') | trim }}
      when:
        - k3s_server_install.rc == 124
        - ansible_facts.services['k3s.service'] is not defined or ansible_facts.services['k3s.service'].state != 'running'
  rescue:
    - name: Collect K3s server service status
      become: true
      ansible.builtin.command: systemctl status k3s --no-pager -l
      register: k3s_server_status
      changed_when: false
      failed_when: false

    - name: Collect K3s server journal logs
      become: true
      ansible.builtin.command: journalctl -u k3s -n 200 --no-pager
      register: k3s_server_journal
      changed_when: false
      failed_when: false

    - name: Fail with K3s server diagnostics
      ansible.builtin.fail:
        msg: |-
          K3s server install failed on {{ inventory_hostname }}.

          systemctl status k3s:
          {{ k3s_server_status.stdout | default('') }}

          journalctl -u k3s -n 200:
          {{ k3s_server_journal.stdout | default('') }}

- name: Install K3s agent
  become: true
  ansible.builtin.shell: |
    set -euo pipefail
    timeout --signal=TERM {{ k3s_task_timeout_seconds | int }}s \
      bash -o pipefail -c "curl -sfL {{ k3s_install_script_url }} | sh -"
  args:
    executable: /bin/bash
  environment:
    INSTALL_K3S_EXEC: "{{ k3s_install_exec | trim }}"
    INSTALL_K3S_VERSION: "{{ k3s_version }}"
    K3S_URL: "https://{{ k3s_api_check_host if (k3s_api_check_host | string | length) > 0 else k3s_registration_address }}:6443"
    K3S_TOKEN: "{{ vault_k3s_token }}"
  register: k3s_agent_install
  when:
    - k3s_mode == 'agent'
    - not k3s_service_unit.stat.exists or not k3s_service_active or k3s_upgrade_needed or (k3s_force_reinstall | bool)
  changed_when: true
  failed_when: k3s_agent_install.rc not in [0, 124]

- name: Gather service facts after K3s agent installer timeout
  become: true
  ansible.builtin.service_facts:
  when:
    - k3s_mode == 'agent'
    - k3s_agent_install is defined
    - k3s_agent_install.rc is defined
    - k3s_agent_install.rc == 124

- name: Fail when K3s agent installer timed out and service is not active
  ansible.builtin.fail:
    msg: >-
      K3s agent installer timed out after {{ k3s_task_timeout_seconds }} seconds
      on {{ inventory_hostname }} and service is not active.
      stdout={{ k3s_agent_install.stdout | default('') | trim }}
      stderr={{ k3s_agent_install.stderr | default('') | trim }}
  when:
    - k3s_mode == 'agent'
    - k3s_agent_install is defined
    - k3s_agent_install.rc is defined
    - k3s_agent_install.rc == 124
    - ansible_facts.services['k3s-agent.service'] is not defined or ansible_facts.services['k3s-agent.service'].state != 'running'

- name: Ensure K3s service is enabled and running
  become: true
  ansible.builtin.systemd:
    name: "{{ k3s_service_name }}"
    enabled: true
    state: started

- name: Wait for K3s API to be reachable on server nodes
  ansible.builtin.wait_for:
    host: >-
      {{ '127.0.0.1' if (k3s_server_init | bool) else
         (k3s_api_check_host if (k3s_api_check_host | string | length) > 0
          else k3s_registration_address) }}
    port: 6443
    delay: 3
    timeout: "{{ k3s_api_wait_timeout }}"
  when: k3s_mode == 'server'
