---
- name: Rebuild AWB
  ansible.builtin.command:
    cmd: docker compose -f "{{ awb_compose_server_file }}" build
    chdir: "{{ awb_project_dir }}"
  changed_when: true

- name: Restart AWB
  ansible.builtin.systemd:
    name: "{{ awb_systemd_unit }}"
    state: restarted
    daemon_reload: true
