---
awb_project_dir: /opt/agent-workbench
awb_git_repo: "git@github.com:awesomejt/agent-workbench.git"
awb_git_branch: main
awb_github_ssh_key_path: /root/.ssh/compose_deploy_id_rsa
awb_github_ssh_private_key: "{{ vault_compose_github_deploy_key_private | default('') }}"

awb_api_hostname: awb-api.taylor.lan
awb_web_hostname: awb-web.taylor.lan
awb_traefik_entrypoint: websecure
awb_network_name: traefik_proxy
awb_api_port: 8000
awb_web_port: 3000

awb_db_host: 192.168.50.15
awb_db_password: "{{ vault_awb_db_password | default('change-me') }}"
awb_secret_key: "{{ vault_awb_secret_key | default('dev-insecure-change-me') }}"

awb_compose_server_file: "{{ awb_project_dir }}/compose.server.yaml"
awb_systemd_unit: agent-workbench.service
awb_systemd_unit_path: "/etc/systemd/system/{{ awb_systemd_unit }}"
