- name: Ensure docker role runs on Debian-family systems
  ansible.builtin.assert:
    that:
      - ansible_os_family == "Debian"
    fail_msg: "docker role currently supports Debian/Ubuntu only"

- name: Install packages required to configure Docker repository
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - python3-debian
    state: present
    update_cache: true
    lock_timeout: 600

- name: Create apt keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Configure Docker APT repository
  ansible.builtin.deb822_repository:
    name: "{{ docker_apt_repository_name }}"
    types:
      - deb
    uris:
      - "{{ docker_apt_repository_url }}"
    suites:
      - "{{ ansible_distribution_release }}"
    components:
      - stable
    architectures:
      - "{{ docker_apt_arch }}"
    signed_by: "{{ docker_apt_repository_key_url }}"
    state: present

- name: Update apt cache after configuring Docker repository
  ansible.builtin.apt:
    update_cache: true
    lock_timeout: 600

- name: Install Docker Engine and compose tooling
  ansible.builtin.apt:
    name: "{{ docker_packages }}"
    state: present
    update_cache: true
    lock_timeout: 600

- name: Ensure docker group exists
  ansible.builtin.group:
    name: docker
    state: present

- name: Add primary user to docker group
  ansible.builtin.user:
    name: "{{ docker_primary_user }}"
    groups: docker
    append: true

- name: Ensure docker service is enabled and running
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started

- name: Ensure compose project directory exists
  ansible.builtin.file:
    path: "{{ docker_compose_project_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: docker_compose_example_enabled | bool

- name: Deploy example Docker compose file
  ansible.builtin.template:
    src: compose.yaml.j2
    dest: "{{ docker_compose_file_path }}"
    owner: root
    group: root
    mode: "0644"
  when: docker_compose_example_enabled | bool

- name: Deploy example environment file
  ansible.builtin.copy:
    dest: "{{ docker_compose_env_path }}"
    content: "# Environment overrides for {{ docker_compose_project_name }}\n"
    owner: root
    group: root
    mode: "0644"
    force: false
  when: docker_compose_example_enabled | bool

- name: Deploy systemd unit for compose project
  ansible.builtin.template:
    src: docker-compose.service.j2
    dest: "{{ docker_compose_systemd_unit_path }}"
    owner: root
    group: root
    mode: "0644"
  when: docker_compose_example_enabled | bool
  notify: Reload systemd

- name: Ensure compose systemd unit is enabled and stopped by default
  ansible.builtin.systemd:
    name: "{{ docker_compose_systemd_unit_name }}"
    enabled: true
    state: stopped
  when: docker_compose_example_enabled | bool
