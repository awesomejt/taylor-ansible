- name: Ensure role runs on Debian-family systems
  ansible.builtin.assert:
    that:
      - ansible_os_family == "Debian"
    fail_msg: "postgresql-18 role currently supports Debian/Ubuntu only"

- name: Install packages required to configure PGDG repository
  become: true
  ansible.builtin.apt:
    name:
      - acl
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: yes

- name: Create PGDG key directory
  become: true
  ansible.builtin.file:
    path: "{{ postgresql_repo_dir }}"
    state: directory
    mode: "0755"

- name: Download PGDG repository signing key
  become: true
  ansible.builtin.get_url:
    url: https://www.postgresql.org/media/keys/ACCC4CF8.asc
    dest: "{{ postgresql_repo_key_path }}"
    mode: "0644"

- name: Configure PGDG APT repository
  become: true
  ansible.builtin.apt_repository:
    repo: "deb [signed-by={{ postgresql_repo_key_path }}] https://apt.postgresql.org/pub/repos/apt {{ ansible_distribution_release }}-pgdg main"
    state: present
    filename: pgdg
    update_cache: yes

- name: Install PostgreSQL 18 packages
  become: true
  ansible.builtin.apt:
    name: "{{ postgresql_packages }}"
    state: present
    update_cache: yes

- name: Configure PostgreSQL listen_addresses
  become: true
  ansible.builtin.lineinfile:
    path: "{{ postgresql_conf_dir }}/postgresql.conf"
    regexp: '^\s*#?\s*listen_addresses\s*='
    line: "listen_addresses = '{{ postgresql_listen_addresses }}'"
  register: postgresql_listen_addresses_result

- name: Configure PostgreSQL port
  become: true
  ansible.builtin.lineinfile:
    path: "{{ postgresql_conf_dir }}/postgresql.conf"
    regexp: '^\s*#?\s*port\s*='
    line: "port = {{ postgresql_port }}"
  register: postgresql_port_result

- name: Configure PostgreSQL host-based auth rules for allowed client CIDRs
  become: true
  ansible.builtin.blockinfile:
    path: "{{ postgresql_conf_dir }}/pg_hba.conf"
    marker: "# {mark} ANSIBLE MANAGED NETWORK ACCESS"
    block: |
      {% for cidr in postgresql_allowed_client_cidrs %}
      host    all             all             {{ cidr }}            {{ postgresql_host_auth_method }}
      {% endfor %}
  when: (postgresql_allowed_client_cidrs | length) > 0
  register: postgresql_hba_present_result

- name: Remove managed PostgreSQL host-based auth block when CIDR list is empty
  become: true
  ansible.builtin.blockinfile:
    path: "{{ postgresql_conf_dir }}/pg_hba.conf"
    marker: "# {mark} ANSIBLE MANAGED NETWORK ACCESS"
    state: absent
  when: (postgresql_allowed_client_cidrs | length) == 0
  register: postgresql_hba_absent_result

- name: Restart PostgreSQL when network configuration changes
  become: true
  ansible.builtin.systemd:
    name: "{{ postgresql_service_name }}"
    state: restarted
  when:
    - postgresql_listen_addresses_result.changed
      or postgresql_port_result.changed
      or (postgresql_hba_present_result is defined and postgresql_hba_present_result.changed)
      or (postgresql_hba_absent_result is defined and postgresql_hba_absent_result.changed)

- name: Ensure PostgreSQL service is enabled and running
  become: true
  ansible.builtin.systemd:
    name: "{{ postgresql_service_name }}"
    enabled: true
    state: started

- name: Install Python driver required by community.postgresql modules
  become: true
  ansible.builtin.apt:
    name: "{{ postgresql_python_packages }}"
    state: present

- name: Ensure application DB password is provided when bootstrap is enabled
  ansible.builtin.assert:
    that:
      - (postgresql_db_user_password | string | length) > 0
    fail_msg: "Set postgresql_db_user_password (for example from vault_postgresql_dbpass)."
  when: postgresql_manage_app_db | bool

- name: Ensure application PostgreSQL role exists
  become: true
  become_user: postgres
  community.postgresql.postgresql_user:
    name: "{{ postgresql_db_user }}"
    password: "{{ postgresql_db_user_password }}"
    role_attr_flags: LOGIN
  no_log: true
  when: postgresql_manage_app_db | bool

- name: Ensure application database exists
  become: true
  become_user: postgres
  community.postgresql.postgresql_db:
    name: "{{ postgresql_db_name }}"
    owner: "{{ postgresql_db_owner }}"
    encoding: "{{ postgresql_db_encoding }}"
    template: "{{ postgresql_db_template }}"
  when: postgresql_manage_app_db | bool
