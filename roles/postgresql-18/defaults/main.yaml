postgresql_major_version: "18"
postgresql_repo_key_path: /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc
postgresql_repo_dir: /usr/share/postgresql-common/pgdg

postgresql_packages:
  - postgresql-common
  - "postgresql-{{ postgresql_major_version }}"
  - "postgresql-contrib-{{ postgresql_major_version }}"

postgresql_python_packages:
  - python3-psycopg2

postgresql_service_name: postgresql
postgresql_cluster_name: main
postgresql_conf_dir: "/etc/postgresql/{{ postgresql_major_version }}/{{ postgresql_cluster_name }}"
postgresql_listen_addresses: "localhost"
postgresql_port: 5432
postgresql_host_auth_method: scram-sha-256
postgresql_allowed_client_cidrs: []

postgresql_manage_app_db: true
postgresql_db_name: app
postgresql_db_user: app
postgresql_db_owner: "{{ postgresql_db_user }}"
postgresql_db_user_password: ""
postgresql_db_encoding: UTF8
postgresql_db_template: template0
