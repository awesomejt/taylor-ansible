---
- name: Ensure role runs on Debian-family systems
  ansible.builtin.assert:
    that:
      - ansible_facts['os_family'] == "Debian"
    fail_msg: "anythingllm role currently supports Debian/Ubuntu only"

- name: Ensure AnythingLLM project directory exists
  ansible.builtin.file:
    path: "{{ anythingllm_project_dir }}"
    state: directory
    owner: "{{ anythingllm_primary_user }}"
    group: "{{ anythingllm_primary_user }}"
    mode: "0755"

- name: Ensure AnythingLLM storage directory exists and is writable by container user
  ansible.builtin.file:
    path: "{{ anythingllm_storage_dir }}"
    state: directory
    owner: "1000"
    group: "1000"
    mode: "0777"

- name: Deploy AnythingLLM Docker Compose file
  ansible.builtin.template:
    src: compose.yaml.j2
    dest: "{{ anythingllm_compose_file }}"
    owner: "{{ anythingllm_primary_user }}"
    group: "{{ anythingllm_primary_user }}"
    mode: "0644"
  notify: Restart anythingllm service

- name: Deploy AnythingLLM systemd unit
  ansible.builtin.template:
    src: anythingllm.service.j2
    dest: "{{ anythingllm_systemd_unit_path }}"
    owner: root
    group: root
    mode: "0644"
  notify: Restart anythingllm service

- name: Ensure AnythingLLM service is enabled and running
  ansible.builtin.systemd:
    name: "{{ anythingllm_systemd_unit }}"
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for AnythingLLM to be ready
  ansible.builtin.uri:
    url: "http://127.0.0.1/"
    headers:
      Host: "{{ anythingllm_traefik_hostname }}"
    status_code:
      - 200
      - 404
      - 301
      - 302
      - 307
      - 308
  register: anythingllm_ready
  until: anythingllm_ready is succeeded
  retries: 24
  delay: 5
