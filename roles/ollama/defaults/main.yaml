---
# Ollama image and runtime
ollama_image: ollama/ollama:latest
ollama_container_name: ollama
ollama_restart_policy: unless-stopped

# Directory layout
ollama_primary_user: root
ollama_project_name: ollama
ollama_project_dir: "/opt/{{ ollama_project_name }}"
ollama_data_dir: "{{ ollama_project_dir }}/data"
ollama_models_dir: "{{ ollama_data_dir }}/models"

# Docker compose
ollama_compose_file: "{{ ollama_project_dir }}/compose.yaml"
ollama_systemd_unit: ollama.service
ollama_systemd_unit_path: "/etc/systemd/system/{{ ollama_systemd_unit }}"

# Service settings
ollama_bind_address: "0.0.0.0"
ollama_port: 11434

# Optional nginx reverse proxy for browser-friendly access
ollama_nginx_enable: false
ollama_nginx_server_name: "ollama.taylor.lan"
ollama_nginx_http_port: 80
ollama_nginx_proxy_host: "127.0.0.1"
ollama_nginx_proxy_port: "{{ ollama_port }}"

# Model pulling (optional)
# Set to pull models after container starts (useful for seeding inference endpoints)
ollama_models_to_pull:
  - llama3.2:latest
  - hermes3:latest
  - qwen3.5:latest
  - qwen3:14b
  - gemma4:latest
  - deepseek-coder-v2:latest
