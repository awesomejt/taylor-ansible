---
- name: Ensure role runs on Debian-family systems
  ansible.builtin.assert:
    that:
      - ansible_facts['os_family'] == "Debian"
    fail_msg: "ollama role currently supports Debian/Ubuntu only"

- name: Ensure Ollama project directory exists
  ansible.builtin.file:
    path: "{{ ollama_project_dir }}"
    state: directory
    owner: "{{ ollama_primary_user }}"
    group: "{{ ollama_primary_user }}"
    mode: "0755"

- name: Ensure Ollama data and models directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ollama_primary_user }}"
    group: "{{ ollama_primary_user }}"
    mode: "0755"
  loop:
    - "{{ ollama_data_dir }}"
    - "{{ ollama_models_dir }}"
    - "{{ ollama_nginx_config_dir }}"
  loop_control:
    label: "{{ item }}"

- name: Deploy nginx reverse proxy configuration for Ollama compose sidecar
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: "{{ ollama_nginx_config_path }}"
    owner: "{{ ollama_primary_user }}"
    group: "{{ ollama_primary_user }}"
    mode: "0644"
  when: ollama_nginx_enable | bool
  notify: Restart ollama service

- name: Deploy Ollama Docker Compose file
  ansible.builtin.template:
    src: compose.yaml.j2
    dest: "{{ ollama_compose_file }}"
    owner: "{{ ollama_primary_user }}"
    group: "{{ ollama_primary_user }}"
    mode: "0644"
  notify: Restart ollama service

- name: Deploy Ollama systemd unit
  ansible.builtin.template:
    src: ollama.service.j2
    dest: "{{ ollama_systemd_unit_path }}"
    owner: root
    group: root
    mode: "0644"
  notify: Restart ollama service

- name: Ensure Ollama service is enabled and running
  ansible.builtin.systemd:
    name: "{{ ollama_systemd_unit }}"
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for Ollama service to be ready
  ansible.builtin.wait_for:
    host: "{{ ollama_bind_address if ollama_bind_address != '0.0.0.0' else '127.0.0.1' }}"
    port: "{{ ollama_port }}"
    timeout: 60
  retries: 5
  delay: 5

- name: Wait for nginx reverse proxy port to be ready
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ ollama_nginx_http_port }}"
    timeout: 60
  when: ollama_nginx_enable | bool

- name: Deploy ollama CLI wrapper script
  ansible.builtin.copy:
    dest: /usr/local/bin/ollama
    owner: root
    group: root
    mode: "0755"
    content: |
      #!/bin/sh
      if [ -t 0 ]; then
        exec docker exec -it {{ ollama_container_name }} ollama "$@"
      else
        exec docker exec -i {{ ollama_container_name }} ollama "$@"
      fi

- name: Pull Ollama models (if configured)
  ansible.builtin.shell:
    cmd: |
      docker exec {{ ollama_container_name }} ollama pull {{ item }}
  loop: "{{ ollama_models_to_pull }}"
  when: ollama_models_to_pull | length > 0
  retries: 3
  delay: 10
  register: ollama_model_pull_result
  changed_when: "'pulling' in ollama_model_pull_result.stdout"
  ignore_errors: true
