---
minecraft_primary_user: jason
minecraft_project_name: minecraft
minecraft_project_dir: /opt/minecraft
minecraft_compose_file: "{{ minecraft_project_dir }}/compose.yaml"

minecraft_restart_policy: unless-stopped

# Game server image (itzg) — switch minecraft_image_registry to harbor.taylor.lan/proxy once Harbor proxy project is created
minecraft_image_registry: docker.io
minecraft_server_image: "{{ minecraft_image_registry }}/itzg/minecraft-server:java25"

# Velocity proxy image — separate from itzg; TYPE=VELOCITY was removed from itzg/minecraft-server
minecraft_proxy_image: "{{ minecraft_image_registry }}/papermc/velocity:latest"

# Harbor authentication — credentials written to ~jason/.docker/config.json
minecraft_harbor_url: harbor.taylor.lan
minecraft_harbor_username: admin
minecraft_harbor_password: "{{ vault_harbor_admin_password | default('change-me') }}"

# Velocity proxy — listens internally on 25577, exposed to LAN on minecraft_velocity_port
minecraft_velocity_secret: "{{ vault_minecraft_velocity_secret | default('change-me') }}"
# Moved off 25565 while Velocity 1.7.x lacks 26.x support — restore to 25565 once compatible
minecraft_velocity_port: 25580
minecraft_velocity_container_name: velocity
minecraft_velocity_data_dir: "{{ minecraft_project_dir }}/velocity"
minecraft_velocity_motd: "A Minecraft Server"
minecraft_velocity_max_players: 500
minecraft_velocity_online_mode: true
# Which server players land on when they first connect
minecraft_velocity_try:
  - vanilla

# Game servers — each entry becomes one compose service under /opt/minecraft/<name>/data
# TYPE: PAPER | FABRIC | FORGE | VANILLA — see itzg/minecraft-server docs
# VELOCITY_SECRET is injected into Paper servers automatically by the itzg image.
# Fabric/Forge modded servers require FabricProxy-Lite (or equivalent) installed as a mod.
minecraft_servers:
  - name: vanilla
    container_name: mc-vanilla
    type: VANILLA
    version: "26.2"
    direct_port: 25565
    seed: 3502492030175085738
    level: "cold-start"
    memory: 4G
    difficulty: hard
    hardcore: false
    max_players: 20
    motd: "Vanilla Survival"
  - name: modded
    container_name: mc-modded
    version: "26.2"
    type: FABRIC
    direct_port: 25566
    memory: 6G
    seed: 4359669564523485218
    level: "stony-start-modded"
    difficulty: hard
    hardcore: false
    max_players: 20
    motd: "Modded"
    modrinth_allowed_version_type: beta
    modrinth_projects:
      - fabric-api
      - xaeros-minimap
      - appleskin
      - balm
      - waystones
      - servercore
      - trade-cycling
      - pneumono_core
      - pneumono_gravestones
      - veinminer-plus-plus
      - tiered-backpacks
      - fzzy-config
      - fabric-language-kotlin
      - shogi
      - uncharted-upgrades
      - sleeping-bag-mod
      - xaeros-world-map
  - name: hardcore
    container_name: mc-hardcore
    type: VANILLA
    version: "26.2"
    direct_port: 25567
    memory: 3G
    difficulty: hard
    hardcore: true
    max_players: 20
    motd: "Hardcore"
  - name: world-challenge
    container_name: mc-world-challenge
    type: VANILLA
    version: "26.2"
    direct_port: 25568
    memory: 3G
    difficulty: hard
    hardcore: false
    max_players: 20
    motd: "World Challenge"

minecraft_network_name: minecraft_net

minecraft_systemd_unit: minecraft.service
minecraft_systemd_unit_path: "/etc/systemd/system/{{ minecraft_systemd_unit }}"
