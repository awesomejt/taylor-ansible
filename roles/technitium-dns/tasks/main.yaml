- name: Install packages required for Technitium DNS
  become: true
  ansible.builtin.apt:
    name:
      - curl
      - ca-certificates
      - dnsutils
    state: present
    update_cache: yes

- name: Disable systemd-resolved so Technitium can bind port 53
  become: true
  ansible.builtin.systemd:
    name: systemd-resolved
    enabled: false
    state: stopped

- name: Set temporary resolver config for installer connectivity
  become: true
  ansible.builtin.copy:
    dest: /etc/resolv.conf
    mode: '0644'
    content: |
      nameserver {{ technitium_bootstrap_nameserver_primary }}
      nameserver {{ technitium_bootstrap_nameserver_secondary }}

- name: Check whether Technitium DNS is already installed
  become: true
  ansible.builtin.stat:
    path: /opt/technitium/dns/start.sh
  register: technitium_install_stat

- name: Install or upgrade Technitium DNS
  become: true
  ansible.builtin.shell: |
    set -euo pipefail
    curl -sSL {{ technitium_install_script_url }} | bash
  args:
    executable: /bin/bash
  when: technitium_force_upgrade | bool or not technitium_install_stat.stat.exists

- name: Ensure Technitium dns.service is enabled and running
  become: true
  ansible.builtin.systemd:
    name: dns.service
    enabled: true
    state: started

- name: Configure host resolver to use local Technitium DNS
  become: true
  ansible.builtin.copy:
    dest: /etc/resolv.conf
    mode: '0644'
    content: |
      nameserver {{ technitium_local_nameserver }}
      nameserver {{ technitium_fallback_nameserver }}

- name: Restart Technitium DNS service after resolver update
  become: true
  ansible.builtin.systemd:
    name: dns.service
    state: restarted

# DNS Zone Management Tasks
- name: Login to Technitium DNS API
  uri:
    url: "{{ technitium_api_url }}/api/user/login"
    method: POST
    body_format: form-urlencoded
    body:
      user: "{{ technitium_username }}"
      pass: "{{ technitium_password }}"
    status_code: 200
  register: technitium_login
  when: technitium_zones | length > 0

- name: Set API token fact
  set_fact:
    technitium_token: "{{ technitium_login.json.token }}"
  when: technitium_zones | length > 0 and technitium_login is succeeded

# Fetch current DNS settings so we can add TSIG keys if requested
- name: Get current DNS settings
  uri:
    url: "{{ technitium_api_url }}/api/settings/get?token={{ technitium_token }}"
    method: GET
    return_content: yes
    status_code: 200
  register: technitium_settings
  when: technitium_tsig_keys | length > 0

- name: Initialize settings payload
  set_fact:
    technitium_settings_payload: "{{ technitium_settings.json.response | default({}) }}"
  when: technitium_tsig_keys | length > 0

- name: Set debug var current_tsigs
  set_fact:
    _current_tsigs: "{{ technitium_settings.json.response.tsigKeys | default([]) }}"
  when: technitium_tsig_keys | length > 0

- name: Debug current TSIG keys returned by server
  ansible.builtin.debug:
    var: _current_tsigs
  when: technitium_tsig_keys | length > 0

- name: Debug technitium_settings_payload (before adding keys)
  ansible.builtin.debug:
    var: technitium_settings_payload
  when: technitium_tsig_keys | length > 0

- name: Ensure TSIG keys are present in settings payload
  set_fact:
    technitium_settings_payload: >-
      {{ technitium_settings_payload | combine({'tsigKeys': ((technitium_settings_payload.tsigKeys | default([])) | rejectattr('keyName', 'equalto', item.keyName) | list) + [ {'keyName': item.keyName, 'sharedSecret': (item.sharedSecret | b64encode), 'algorithmName': (item.algorithmName | default('hmac-sha256')) } ] }) }}
  loop: "{{ technitium_tsig_keys }}"

- name: Push updated DNS settings (reconcile TSIG keys)
  uri:
    url: "{{ technitium_api_url }}/api/settings/set?token={{ technitium_token }}"
    method: POST
    body_format: json
    body: "{{ {'tsigKeys': technitium_settings_payload.tsigKeys} }}"
    status_code: 200
  when: >-
    technitium_tsig_keys | length > 0
    and (technitium_settings_payload.tsigKeys | to_json)
        != ((technitium_settings.json.response.tsigKeys | default([])) | to_json)

- name: Set debug counts for payload and server tsigKeys
  set_fact:
    _payload_count: "{{ technitium_settings_payload.tsigKeys | default([]) | length }}"
    _server_count: "{{ technitium_settings.json.response.tsigKeys | default([]) | length }}"
  when: technitium_tsig_keys | length > 0

- name: Debug technitium_settings_payload vs server tsigKeys counts
  ansible.builtin.debug:
    msg: "payload_count={{ _payload_count }}, server_count={{ _server_count }}"
  when: technitium_tsig_keys | length > 0

- name: Debug technitium_settings_payload (after adding keys)
  ansible.builtin.debug:
    var: technitium_settings_payload
  when: technitium_tsig_keys | length > 0

- name: Create DNS zones
  uri:
    url: "{{ technitium_api_url }}/api/zones/create"
    method: POST
    body_format: form-urlencoded
    body:
      token: "{{ technitium_token }}"
      zone: "{{ item.name }}"
      type: "{{ item.type }}"
    status_code: 200
  loop: "{{ technitium_zones }}"
  when: technitium_zones | length > 0
  ignore_errors: true  # Zone might already exist

- name: Configure DNS zone options
  uri:
    url: "{{ technitium_api_url }}/api/zones/options/set?token={{ technitium_token }}"
    method: POST
    body_format: json
    body: >-
      {{ {
        'token': technitium_token,
        'zone': item.name,
        'queryAccess': item.get('query_access',''),
        'queryAccessNetworkACL': (((item.get('query_access_network_acl') or []) | length) > 0) and ((item.get('query_access_network_acl') or []) | join(',')) or 'false',
        'zoneTransfer': item.get('zone_transfer',''),
        'zoneTransferNetworkACL': (((item.get('zone_transfer_network_acl') or []) | length) > 0) and ((item.get('zone_transfer_network_acl') or []) | join(',')) or 'false',
        'notify': item.get('notify',''),
        'notifyNameServers': (((item.get('notify_name_servers') or []) | length) > 0) and ((item.get('notify_name_servers') or []) | join(',')) or 'false',
        'update': item.get('update',''),
        'updateNetworkACL': (((item.get('update_network_acl') or []) | length) > 0) and ((item.get('update_network_acl') or []) | join(',')) or 'false',
        'updateSecurityPolicies': item.get('update_security_policies',[])
      } }}
    status_code: 200
  loop: "{{ technitium_zones }}"
  when: technitium_zones | length > 0

- name: Add DNS records to zones
  uri:
    url: "{{ technitium_api_url }}/api/zones/records/add"
    method: POST
    body_format: form-urlencoded
    body:
      token: "{{ technitium_token }}"
      domain: "{{ item.1.domain }}"
      zone: "{{ item.0.name }}"
      type: "{{ item.1.type }}"
      ttl: "{{ item.1.ttl | default(3600) }}"
      ipAddress: "{{ item.1.ipAddress | default('') }}"
      cname: "{{ item.1.cname | default('') }}"
      nameServer: "{{ item.1.nameServer | default('') }}"
      ptrName: "{{ item.1.ptrName | default('') }}"
      text: "{{ item.1.text | default('') }}"
      preference: "{{ item.1.preference | default('') }}"
      exchange: "{{ item.1.exchange | default('') }}"
      priority: "{{ item.1.priority | default('') }}"
      weight: "{{ item.1.weight | default('') }}"
      port: "{{ item.1.port | default('') }}"
      target: "{{ item.1.target | default('') }}"
    status_code: 200
  loop: "{{ technitium_zones | subelements('records', skip_missing=True) }}"
  when: technitium_zones | length > 0 and item.1.domain is defined
  ignore_errors: true  # Record might already exist
