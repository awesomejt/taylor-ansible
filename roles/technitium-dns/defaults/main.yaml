technitium_install_script_url: https://download.technitium.com/dns/install.sh
technitium_force_upgrade: false

technitium_bootstrap_nameserver_primary: 1.1.1.1
technitium_bootstrap_nameserver_secondary: 8.8.8.8

technitium_local_nameserver: 127.0.0.1
technitium_fallback_nameserver: 1.1.1.1

# DNS Zone Management
technitium_api_url: "http://localhost:5380"
technitium_username: "admin"
technitium_password: "admin"

# Define zones to create/manage
# Set to empty list [] to disable automated zone/record management
# Each zone can optionally set RFC2136 update policy with:
#   update: Deny|Allow|AllowOnlyZoneNameServers|UseSpecifiedNetworkACL|AllowZoneNameServersAndUseSpecifiedNetworkACL
#   update_network_acl:
#     - 192.168.50.0/24
#     - !192.168.50.53
# Technitium DNS zone config for this environment
technitium_zones: []

# TSIG keys to configure on the Technitium server (managed via API)

technitium_tsig_keys: []