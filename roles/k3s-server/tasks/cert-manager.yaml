- name: Wait for K3s API to be ready before cert-manager installation
  become: true
  ansible.builtin.command: k3s kubectl get --raw=/readyz
  register: cert_manager_readyz
  retries: 20
  delay: 6
  until: cert_manager_readyz.rc == 0
  changed_when: false

- name: Install cert-manager manifests
  become: true
  ansible.builtin.command:
    cmd: "k3s kubectl apply --server-side --force-conflicts -f {{ k3s_cert_manager_manifest_url }}"
  register: cert_manager_install
  retries: 3
  delay: 5
  until: cert_manager_install.rc == 0
  changed_when: >-
    'created' in cert_manager_install.stdout
    or 'configured' in cert_manager_install.stdout
    or 'patched' in cert_manager_install.stdout

- name: Wait for cert-manager deployments to be available
  become: true
  ansible.builtin.command:
    cmd: "k3s kubectl -n {{ k3s_cert_manager_namespace }} rollout status deployment/{{ item }} --timeout={{ k3s_cert_manager_rollout_timeout }}"
  changed_when: false
  loop: "{{ k3s_cert_manager_deployments }}"