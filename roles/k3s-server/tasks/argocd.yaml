- name: Wait for K3s API to be ready before Argo CD installation
  become: true
  ansible.builtin.command: k3s kubectl get --raw=/readyz
  register: k3s_readyz
  retries: 20
  delay: 6
  until: k3s_readyz.rc == 0
  changed_when: false

- name: Ensure argocd namespace exists
  become: true
  ansible.builtin.shell: |
    set -euo pipefail
    k3s kubectl create namespace argocd --dry-run=client -o yaml | k3s kubectl apply -f -
  args:
    executable: /bin/bash
  register: argocd_namespace
  changed_when: "'created' in argocd_namespace.stdout or 'configured' in argocd_namespace.stdout"

- name: Install Argo CD manifests
  become: true
  ansible.builtin.command:
    cmd: "k3s kubectl apply --server-side --force-conflicts -n argocd -f {{ k3s_argocd_manifest_url }}"
  register: argocd_install
  retries: 3
  delay: 5
  until: argocd_install.rc == 0
  changed_when: "'created' in argocd_install.stdout or 'configured' in argocd_install.stdout"

- name: Read Argo CD server insecure setting
  become: true
  ansible.builtin.command:
    cmd: "k3s kubectl -n argocd get configmap argocd-cmd-params-cm -o jsonpath={.data.server\\.insecure}"
  register: argocd_server_insecure_current
  changed_when: false
  failed_when: false
  when:
    - k3s_argocd_ingress_enabled | bool
    - k3s_argocd_server_insecure_when_ingress | bool

- name: Enable Argo CD server insecure mode behind ingress
  become: true
  ansible.builtin.command:
    cmd: "k3s kubectl -n argocd patch configmap argocd-cmd-params-cm --type merge -p '{\"data\":{\"server.insecure\":\"true\"}}'"
  register: argocd_server_insecure_patch
  changed_when: "'patched' in argocd_server_insecure_patch.stdout"
  when:
    - k3s_argocd_ingress_enabled | bool
    - k3s_argocd_server_insecure_when_ingress | bool
    - argocd_server_insecure_current.stdout != 'true'

- name: Restart Argo CD server deployment when insecure mode changes
  become: true
  ansible.builtin.command:
    cmd: "k3s kubectl -n argocd rollout restart deployment argocd-server"
  when:
    - argocd_server_insecure_patch is defined
    - argocd_server_insecure_patch is changed

- name: Wait for Argo CD server rollout after insecure mode update
  become: true
  ansible.builtin.command:
    cmd: "k3s kubectl -n argocd rollout status deployment argocd-server --timeout=180s"
  changed_when: false
  when:
    - argocd_server_insecure_patch is defined
    - argocd_server_insecure_patch is changed

- name: Validate Argo CD ingress settings when enabled
  ansible.builtin.assert:
    that:
      - (k3s_argocd_ingress_host | default('') | string | length) > 0
      - not ('traefik' in (k3s_server_disable_components | default([])))
      - (k3s_argocd_ingress_service_name | default('') | string | length) > 0
      - (k3s_argocd_ingress_service_port | int) > 0
    fail_msg: >-
      Argo CD ingress is enabled but not correctly configured.
      Set host/service/port values and ensure Traefik is not disabled.
  when: k3s_argocd_ingress_enabled | bool

- name: Apply Argo CD ingress for Traefik
  become: true
  ansible.builtin.shell: |
    set -euo pipefail
    cat <<'EOF' | k3s kubectl apply -f -
    apiVersion: networking.k8s.io/v1
    kind: Ingress
    metadata:
      name: argocd-server
      namespace: argocd
      annotations:
        traefik.ingress.kubernetes.io/router.entrypoints: {{ k3s_argocd_ingress_entrypoints }}
        traefik.ingress.kubernetes.io/router.tls: "{{ (k3s_argocd_ingress_tls | bool) | ternary('true', 'false') }}"
    {% if (k3s_argocd_ingress_backend_scheme | default('') | string | length) > 0 %}
        traefik.ingress.kubernetes.io/service.serversscheme: {{ k3s_argocd_ingress_backend_scheme }}
    {% endif %}
    spec:
      ingressClassName: {{ k3s_argocd_ingress_class_name }}
      rules:
        - host: {{ k3s_argocd_ingress_host }}
          http:
            paths:
              - path: /
                pathType: Prefix
                backend:
                  service:
                    name: {{ k3s_argocd_ingress_service_name }}
                    port:
                      number: {{ k3s_argocd_ingress_service_port | int }}
    EOF
  args:
    executable: /bin/bash
  register: argocd_ingress
  changed_when: "'created' in argocd_ingress.stdout or 'configured' in argocd_ingress.stdout"
  when: k3s_argocd_ingress_enabled | bool

- name: Wait for Argo CD control-plane workloads to be available
  become: true
  ansible.builtin.command:
    cmd: "k3s kubectl -n argocd rollout status {{ item.kind }}/{{ item.name }} --timeout=300s"
  changed_when: false
  loop: "{{ k3s_argocd_rollout_resources }}"

- name: Validate Argo CD GitOps bootstrap settings when enabled
  ansible.builtin.assert:
    that:
      - (k3s_argocd_gitops_repo_url | default('') | string | length) > 0
      - (k3s_argocd_gitops_repo_target_revision | default('') | string | length) > 0
      - (k3s_argocd_bootstrap_path | default('') | string | length) > 0
      - k3s_argocd_gitops_repo_url is not match('^(git@|ssh://)') or (k3s_argocd_gitops_repo_ssh_private_key | default('') | string | length) > 0
      - k3s_argocd_gitops_repo_url is not match('^(git@|ssh://)') or (k3s_argocd_gitops_repo_ssh_known_hosts | default('') | string | length) > 0
    fail_msg: >-
      Argo CD GitOps bootstrap is enabled but missing required repo settings.
      Set the repo URL, target revision, bootstrap path, and provide
      vault_argocd_gitops_repo_ssh_private_key when using SSH.
  when: k3s_argocd_bootstrap_enabled | bool

- name: Validate Harbor admin password settings when secret seeding is enabled
  ansible.builtin.assert:
    that:
      - (k3s_harbor_admin_password | default('') | string | length) > 0
    fail_msg: >-
      Harbor secret seeding is enabled but harbor admin password is missing.
      Define vault_harbor_admin_password in vars/common/secrets.yaml
      or vars/<env>/secrets.yaml.
  when:
    - k3s_argocd_bootstrap_enabled | bool
    - k3s_harbor_admin_secret_enabled | bool

- name: Validate Headlamp OIDC settings when secret seeding is enabled
  ansible.builtin.assert:
    that:
      - (k3s_headlamp_oidc_client_id | default('') | string | length) > 0
      - (k3s_headlamp_oidc_client_secret | default('') | string | length) > 0
      - (k3s_headlamp_oidc_issuer_url | default('') | string | length) > 0
      - (k3s_headlamp_oidc_scopes | default('') | string | length) > 0
    fail_msg: >-
      Headlamp OIDC secret seeding is enabled but required values are missing.
      Define vault_headlamp_oidc_client_id,
      vault_headlamp_oidc_client_secret,
      vault_headlamp_oidc_issuer_url,
      and optionally vault_headlamp_oidc_scopes in vars/common/secrets.yaml
      or vars/<env>/secrets.yaml.
  when:
    - k3s_argocd_bootstrap_enabled | bool
    - k3s_headlamp_oidc_secret_enabled | bool

- name: Validate ExternalDNS RFC2136 TSIG settings when secret seeding is enabled
  ansible.builtin.assert:
    that:
      - (k3s_external_dns_rfc2136_tsig_keyname | default('') | string | length) > 0
      - (k3s_external_dns_rfc2136_tsig_secret | default('') | string | length) > 0
      - (k3s_external_dns_rfc2136_tsig_secret_alg | default('') | string | length) > 0
    fail_msg: >-
      ExternalDNS secret seeding is enabled but required TSIG values are missing.
      Define vault_external_dns_rfc2136_tsig_keyname,
      vault_external_dns_rfc2136_tsig_secret,
      and optionally vault_external_dns_rfc2136_tsig_secret_alg in vars/common/secrets.yaml
      or vars/<env>/secrets.yaml.
  when:
    - k3s_argocd_bootstrap_enabled | bool
    - k3s_external_dns_secret_enabled | bool

- name: Ensure Harbor namespace exists for secret seeding
  become: true
  ansible.builtin.shell: |
    set -euo pipefail
    k3s kubectl create namespace {{ k3s_harbor_namespace }} --dry-run=client -o yaml | k3s kubectl apply -f -
  args:
    executable: /bin/bash
  register: harbor_namespace
  changed_when: >-
    'created' in harbor_namespace.stdout
    or 'configured' in harbor_namespace.stdout
  when:
    - k3s_argocd_bootstrap_enabled | bool
    - k3s_harbor_admin_secret_enabled | bool

- name: Render Harbor admin password secret
  become: true
  ansible.builtin.template:
    src: harbor-admin-secret.yaml.j2
    dest: /tmp/harbor-admin-secret.yaml
    mode: "0600"
  no_log: true
  when:
    - k3s_argocd_bootstrap_enabled | bool
    - k3s_harbor_admin_secret_enabled | bool

- name: Apply Harbor admin password secret
  become: true
  ansible.builtin.command:
    cmd: k3s kubectl apply -f /tmp/harbor-admin-secret.yaml
  register: harbor_admin_secret
  changed_when: >-
    'created' in harbor_admin_secret.stdout
    or 'configured' in harbor_admin_secret.stdout
  no_log: true
  when:
    - k3s_argocd_bootstrap_enabled | bool
    - k3s_harbor_admin_secret_enabled | bool

- name: Ensure Headlamp namespace exists
  become: true
  ansible.builtin.shell: |
    set -euo pipefail
    k3s kubectl create namespace {{ k3s_headlamp_namespace }} --dry-run=client -o yaml | k3s kubectl apply -f -
  args:
    executable: /bin/bash
  register: headlamp_namespace
  changed_when: >-
    'created' in headlamp_namespace.stdout
    or 'configured' in headlamp_namespace.stdout
  when:
    - k3s_argocd_bootstrap_enabled | bool
    - k3s_headlamp_admin_token_enabled | bool or k3s_headlamp_oidc_secret_enabled | bool

- name: Render Headlamp admin service account and token secret
  become: true
  ansible.builtin.template:
    src: headlamp-admin-token.yaml.j2
    dest: /tmp/headlamp-admin-token.yaml
    mode: "0600"
  when:
    - k3s_argocd_bootstrap_enabled | bool
    - k3s_headlamp_admin_token_enabled | bool

- name: Apply Headlamp admin service account and token secret
  become: true
  ansible.builtin.command:
    cmd: k3s kubectl apply -f /tmp/headlamp-admin-token.yaml
  register: headlamp_admin_token_apply
  changed_when: "'created' in headlamp_admin_token_apply.stdout"
  when:
    - k3s_argocd_bootstrap_enabled | bool
    - k3s_headlamp_admin_token_enabled | bool

- name: Wait for Headlamp admin token to be populated
  become: true
  ansible.builtin.shell: |
    k3s kubectl -n {{ k3s_headlamp_namespace }} get secret {{ k3s_headlamp_admin_token_secret_name }} \
      -o jsonpath='{.data.token}' 2>/dev/null | base64 -d
  args:
    executable: /bin/bash
  register: headlamp_admin_token_value
  retries: 10
  delay: 3
  until: headlamp_admin_token_value.stdout | length > 0
  changed_when: false
  when:
    - k3s_argocd_bootstrap_enabled | bool
    - k3s_headlamp_admin_token_enabled | bool

- name: Display Headlamp admin token
  ansible.builtin.debug:
    msg: >-
      Headlamp admin token (paste into the Headlamp login page):
      {{ headlamp_admin_token_value.stdout }}
  when:
    - k3s_argocd_bootstrap_enabled | bool
    - k3s_headlamp_admin_token_enabled | bool

- name: Render Headlamp OIDC secret
  become: true
  ansible.builtin.template:
    src: headlamp-oidc-secret.yaml.j2
    dest: /tmp/headlamp-oidc-secret.yaml
    mode: "0600"
  no_log: true
  when:
    - k3s_argocd_bootstrap_enabled | bool
    - k3s_headlamp_oidc_secret_enabled | bool

- name: Apply Headlamp OIDC secret
  become: true
  ansible.builtin.command:
    cmd: k3s kubectl apply -f /tmp/headlamp-oidc-secret.yaml
  register: headlamp_oidc_secret
  changed_when: >-
    'created' in headlamp_oidc_secret.stdout
    or 'configured' in headlamp_oidc_secret.stdout
  no_log: true
  when:
    - k3s_argocd_bootstrap_enabled | bool
    - k3s_headlamp_oidc_secret_enabled | bool

- name: Ensure ExternalDNS namespace exists for secret seeding
  become: true
  ansible.builtin.shell: |
    set -euo pipefail
    k3s kubectl create namespace {{ k3s_external_dns_namespace }} --dry-run=client -o yaml | k3s kubectl apply -f -
  args:
    executable: /bin/bash
  register: external_dns_namespace
  changed_when: >-
    'created' in external_dns_namespace.stdout
    or 'configured' in external_dns_namespace.stdout
  when:
    - k3s_argocd_bootstrap_enabled | bool
    - k3s_external_dns_secret_enabled | bool

- name: Render ExternalDNS RFC2136 TSIG secret
  become: true
  ansible.builtin.template:
    src: external-dns-rfc2136-secret.yaml.j2
    dest: /tmp/external-dns-rfc2136-secret.yaml
    mode: "0600"
  no_log: true
  when:
    - k3s_argocd_bootstrap_enabled | bool
    - k3s_external_dns_secret_enabled | bool

- name: Apply ExternalDNS RFC2136 TSIG secret
  become: true
  ansible.builtin.command:
    cmd: k3s kubectl apply -f /tmp/external-dns-rfc2136-secret.yaml
  register: external_dns_secret
  changed_when: >-
    'created' in external_dns_secret.stdout
    or 'configured' in external_dns_secret.stdout
  no_log: true
  when:
    - k3s_argocd_bootstrap_enabled | bool
    - k3s_external_dns_secret_enabled | bool

- name: Render Argo CD SSH known hosts config for GitOps repo
  become: true
  ansible.builtin.template:
    src: argocd-ssh-known-hosts-cm.yaml.j2
    dest: /tmp/argocd-ssh-known-hosts-cm.yaml
    mode: "0600"
  when:
    - k3s_argocd_bootstrap_enabled | bool
    - k3s_argocd_gitops_repo_url is match('^(git@|ssh://)')

- name: Apply Argo CD SSH known hosts config for GitOps repo
  become: true
  ansible.builtin.command:
    cmd: k3s kubectl apply -f /tmp/argocd-ssh-known-hosts-cm.yaml
  register: argocd_gitops_known_hosts
  changed_when: >-
    'created' in argocd_gitops_known_hosts.stdout
    or 'configured' in argocd_gitops_known_hosts.stdout
  when:
    - k3s_argocd_bootstrap_enabled | bool
    - k3s_argocd_gitops_repo_url is match('^(git@|ssh://)')

- name: Render Argo CD GitOps repository secret
  become: true
  ansible.builtin.template:
    src: argocd-gitops-repository-secret.yaml.j2
    dest: /tmp/argocd-gitops-repository-secret.yaml
    mode: "0600"
  when:
    - k3s_argocd_bootstrap_enabled | bool
    - k3s_argocd_gitops_repo_url is match('^(git@|ssh://)')

- name: Apply Argo CD GitOps repository secret
  become: true
  ansible.builtin.command:
    cmd: k3s kubectl apply -f /tmp/argocd-gitops-repository-secret.yaml
  register: argocd_gitops_repository
  changed_when: >-
    'created' in argocd_gitops_repository.stdout
    or 'configured' in argocd_gitops_repository.stdout
  when:
    - k3s_argocd_bootstrap_enabled | bool
    - k3s_argocd_gitops_repo_url is match('^(git@|ssh://)')

- name: Render Argo CD root application
  become: true
  ansible.builtin.template:
    src: argocd-root-application.yaml.j2
    dest: /tmp/argocd-root-application.yaml
    mode: "0600"
  when: k3s_argocd_bootstrap_enabled | bool

- name: Apply Argo CD root application
  become: true
  ansible.builtin.command:
    cmd: k3s kubectl apply -f /tmp/argocd-root-application.yaml
  register: argocd_root_application
  changed_when: >-
    'created' in argocd_root_application.stdout
    or 'configured' in argocd_root_application.stdout
    or 'unchanged' not in argocd_root_application.stdout
  when: k3s_argocd_bootstrap_enabled | bool

# Admin password management
- name: Ensure python3-bcrypt is available for ArgoCD admin password management
  become: true
  ansible.builtin.apt:
    name: python3-bcrypt
    state: present
  when: k3s_argocd_admin_password | default('') | length > 0

- name: Read current ArgoCD admin password hash
  become: true
  ansible.builtin.shell: |
    k3s kubectl -n argocd get secret argocd-secret \
      -o jsonpath='{.data.admin\.password}' 2>/dev/null | base64 -d || echo ""
  args:
    executable: /bin/bash
  register: argocd_current_password_hash
  changed_when: false
  no_log: true
  when: k3s_argocd_admin_password | default('') | length > 0

- name: Check if current ArgoCD admin password already matches
  ansible.builtin.shell: |
    python3 -c "import bcrypt,os,sys; sys.exit(0 if bcrypt.checkpw(os.environ['ARGOCD_ADMIN_PASSWORD'].encode(), os.environ['ARGOCD_STORED_HASH'].encode()) else 1)"
  environment:
    ARGOCD_ADMIN_PASSWORD: "{{ k3s_argocd_admin_password }}"
    ARGOCD_STORED_HASH: "{{ argocd_current_password_hash.stdout | default('') }}"
  register: argocd_password_matches
  failed_when: false
  changed_when: false
  no_log: true
  when:
    - k3s_argocd_admin_password | default('') | length > 0
    - argocd_current_password_hash.stdout | default('') | length > 0

- name: Set ArgoCD admin password
  become: true
  ansible.builtin.shell: |
    set -euo pipefail
    NEW_HASH=$(python3 -c "import bcrypt,os; print(bcrypt.hashpw(os.environ['ARGOCD_ADMIN_PASSWORD'].encode(), bcrypt.gensalt(rounds=10)).decode())")
    MTIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
    k3s kubectl -n argocd patch secret argocd-secret \
      --type merge \
      -p "{\"stringData\":{\"admin.password\":\"${NEW_HASH}\",\"admin.passwordMtime\":\"${MTIME}\"}}"
  args:
    executable: /bin/bash
  environment:
    ARGOCD_ADMIN_PASSWORD: "{{ k3s_argocd_admin_password }}"
  no_log: true
  changed_when: true
  when:
    - k3s_argocd_admin_password | default('') | length > 0
    - argocd_password_matches.rc | default(1) != 0