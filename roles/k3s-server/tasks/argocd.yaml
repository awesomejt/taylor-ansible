- name: Wait for K3s API to be ready before Argo CD installation
  become: true
  ansible.builtin.command: k3s kubectl get --raw=/readyz
  register: k3s_readyz
  retries: 20
  delay: 6
  until: k3s_readyz.rc == 0
  changed_when: false

- name: Ensure argocd namespace exists
  become: true
  ansible.builtin.shell: |
    set -euo pipefail
    k3s kubectl create namespace argocd --dry-run=client -o yaml | k3s kubectl apply -f -
  args:
    executable: /bin/bash
  register: argocd_namespace
  changed_when: "'created' in argocd_namespace.stdout or 'configured' in argocd_namespace.stdout"

- name: Install Argo CD manifests
  become: true
  ansible.builtin.command:
    cmd: "k3s kubectl apply -n argocd -f {{ k3s_argocd_manifest_url }}"
  register: argocd_install
  retries: 3
  delay: 5
  until: argocd_install.rc == 0
  changed_when: "'created' in argocd_install.stdout or 'configured' in argocd_install.stdout"