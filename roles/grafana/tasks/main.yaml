---
- name: Ensure role runs on Debian-family systems
  ansible.builtin.assert:
    that:
      - ansible_facts['os_family'] == "Debian"
    fail_msg: "grafana role currently supports Debian/Ubuntu only"

- name: Ensure Grafana directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ grafana_primary_user }}"
    group: "{{ grafana_primary_user }}"
    mode: "0755"
  loop:
    - "{{ grafana_project_dir }}"
    - "{{ grafana_provisioning_dir }}"
    - "{{ grafana_datasources_dir }}"

- name: Ensure Grafana data directory has container-write permissions
  ansible.builtin.file:
    path: "{{ grafana_data_dir }}"
    state: directory
    owner: "{{ grafana_container_uid }}"
    group: "{{ grafana_container_gid }}"
    mode: "0755"

- name: Deploy Grafana datasource provisioning
  ansible.builtin.template:
    src: datasource.yaml.j2
    dest: "{{ grafana_datasource_path }}"
    owner: "{{ grafana_primary_user }}"
    group: "{{ grafana_primary_user }}"
    mode: "0644"
  notify: Restart grafana service

- name: Deploy Grafana Docker Compose file
  ansible.builtin.template:
    src: compose.yaml.j2
    dest: "{{ grafana_compose_file }}"
    owner: "{{ grafana_primary_user }}"
    group: "{{ grafana_primary_user }}"
    mode: "0644"
  notify: Restart grafana service

- name: Deploy Grafana systemd unit
  ansible.builtin.template:
    src: grafana.service.j2
    dest: "{{ grafana_systemd_unit_path }}"
    owner: root
    group: root
    mode: "0644"
  notify: Restart grafana service

- name: Ensure Grafana service is enabled and running
  ansible.builtin.systemd:
    name: "{{ grafana_systemd_unit }}"
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for Grafana to be ready
  ansible.builtin.command: >-
    docker exec {{ grafana_container_name }}
    wget -qO- http://127.0.0.1:3000/api/health
  register: grafana_ready
  changed_when: false
  until:
    - grafana_ready.rc == 0
    - "'ok' in grafana_ready.stdout"
  retries: 24
  delay: 5
