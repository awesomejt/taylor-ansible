  
---
- name: Ensure Java is installed
  ansible.builtin.package:
    name: "{{ nexus_java_package }}"
    state: present
  become: true

- name: Ensure nexus group exists
  ansible.builtin.group:
    name: "{{ nexus_group }}"
    state: present

- name: Ensure nexus user exists
  ansible.builtin.user:
    name: "{{ nexus_user }}"
    group: "{{ nexus_group }}"
    system: true
    create_home: false
    shell: /bin/false

- name: Ensure install directory exists
  ansible.builtin.file:
    path: "{{ nexus_install_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Download Nexus archive
  ansible.builtin.get_url:
    url: "{{ nexus_download_url }}"
    dest: "/tmp/nexus-{{ nexus_version }}.tar.gz"
    mode: '0644'
    force: false

- name: Extract Nexus archive
  ansible.builtin.unarchive:
    src: "/tmp/nexus-{{ nexus_version }}.tar.gz"
    dest: "{{ nexus_install_dir }}"
    remote_src: true
    creates: "{{ nexus_install_dir }}/nexus-{{ nexus_version }}"

- name: Determine extracted Nexus directory name
  ansible.builtin.command: >
    bash -lc "ls -1 {{ nexus_install_dir }} | grep '^nexus-' | sort -V | tail -n1"
  register: nexus_dir_name
  changed_when: false

- name: Set extracted nexus path fact
  ansible.builtin.set_fact:
    nexus_extracted_path: "{{ nexus_install_dir }}/{{ nexus_dir_name.stdout }}"
  when: nexus_dir_name.stdout != ''

- name: Ensure nexus data directory exists
  ansible.builtin.file:
    path: "{{ nexus_data_dir }}"
    state: directory
    owner: "{{ nexus_user }}"
    group: "{{ nexus_group }}"
    mode: '0755'

- name: Optionally move existing sonatype-work to data dir and create symlink
  block:
    - name: Stop nexus if running before move
      ansible.builtin.systemd:
        name: nexus
        state: stopped
      ignore_errors: true

    - name: Check for existing sonatype-work
      ansible.builtin.stat:
        path: "{{ nexus_install_dir }}/sonatype-work"
      register: sonatype_work_stat

    - name: Move existing sonatype-work to nexus_data_dir
      ansible.builtin.command: >
        mv {{ nexus_install_dir }}/sonatype-work {{ nexus_data_dir }}
      args:
        removes: "{{ nexus_install_dir }}/sonatype-work"
      when: sonatype_work_stat.stat.exists | default(false)

    - name: Ensure symlink from install sonatype-work to data dir
      ansible.builtin.file:
        src: "{{ nexus_data_dir }}"
        dest: "{{ nexus_install_dir }}/sonatype-work"
        state: link
        force: yes
      notify: Restart nexus
  when: nexus_enable_blobstore_move | bool

- name: Ensure symlink to current nexus
  ansible.builtin.file:
    src: "{{ nexus_extracted_path | default(nexus_install_dir ~ '/nexus-' ~ nexus_version) }}"
    dest: "{{ nexus_install_dir }}/nexus"
    state: link
    force: true
    owner: "{{ nexus_user }}"
    group: "{{ nexus_group }}"

- name: Ensure ownership of nexus directories
  ansible.builtin.file:
    path: "{{ nexus_extracted_path | default(nexus_install_dir ~ '/nexus-' ~ nexus_version) }}"
    owner: "{{ nexus_user }}"
    group: "{{ nexus_group }}"
    recurse: yes

- name: Configure nexus run user
  ansible.builtin.lineinfile:
    path: "{{ nexus_install_dir }}/nexus/bin/nexus.rc"
    regexp: '^run_as_user'
    line: "run_as_user='{{ nexus_user }}'"
    create: yes

- name: Install systemd unit for nexus
  ansible.builtin.template:
    src: "nexus.service.j2"
    dest: "/etc/systemd/system/nexus.service"
    mode: '0644'
    owner: root
    group: root
  notify:
    - Reload systemd
    - Restart nexus

- name: Ensure nexus directories ownership and permissions
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ nexus_user }}"
    group: "{{ nexus_group }}"
    mode: '0755'
    recurse: yes
  loop:
    - "{{ nexus_data_dir }}"
    - "{{ nexus_extracted_path | default(nexus_install_dir ~ '/nexus-' ~ nexus_version) }}"
    - "{{ nexus_install_dir }}"

- name: Verify nexus can write to data directory as nexus user
  ansible.builtin.command: >
    runuser -u {{ nexus_user }} -- bash -lc "touch {{ nexus_data_dir }}/.ansible_write_test && rm -f {{ nexus_data_dir }}/.ansible_write_test"
  become: true
  register: nexus_write_test
  failed_when: nexus_write_test.rc != 0

- name: Enable and start nexus
  ansible.builtin.systemd:
    name: nexus
    enabled: true
    state: started

- name: Wait for Nexus HTTP API to be available after start
  ansible.builtin.uri:
    url: "http://127.0.0.1:8081/service/rest/v1/status"
    method: GET
    return_content: no
    status_code: 200
  register: nexus_up_check_poststart
  retries: 20
  delay: 10
  until: nexus_up_check_poststart.status == 200
  when: not (nexus_admin_marker.stat.exists | default(false))

# Pre-initialize admin password using common vars if not already set
- name: Check for admin init marker
  ansible.builtin.stat:
    path: "{{ nexus_data_dir }}/.ansible_nexus_admin_set"
  register: nexus_admin_marker

- name: Wait for Nexus HTTP API to be available
  ansible.builtin.uri:
    url: "http://127.0.0.1:8081/service/rest/v1/status"
    method: GET
    return_content: no
    status_code: 200
  register: nexus_up_check
  retries: 30
  delay: 10
  until: nexus_up_check.status == 200
  when: not (nexus_admin_marker.stat.exists | default(false))

- name: Check for initial admin password file
  ansible.builtin.stat:
    path: "{{ nexus_data_dir }}/admin.password"
  register: nexus_admin_pass_file
  when: not (nexus_admin_marker.stat.exists | default(false))

- name: Read initial admin password
  ansible.builtin.slurp:
    src: "{{ nexus_data_dir }}/admin.password"
  register: nexus_admin_pass_raw
  when: (nexus_admin_pass_file.stat.exists | default(false)) and not (nexus_admin_marker.stat.exists | default(false))

- name: Set initial_admin_password fact
  ansible.builtin.set_fact:
    initial_admin_password: "{{ (nexus_admin_pass_raw.content | b64decode).splitlines()[0] }}"
  when: nexus_admin_pass_raw is defined and nexus_admin_pass_raw.content is defined

- name: Notify initial admin password present
  ansible.builtin.debug:
    msg: "Initial admin password detected; please set admin password manually or re-run with automated change enabled."
  when: initial_admin_password is defined and not (nexus_admin_marker.stat.exists | default(false))

- name: Verify password change by attempting login with new password
  ansible.builtin.uri:
    url: "http://127.0.0.1:8081/service/rest/v1/status"
    method: GET
    user: "{{ nexus_username }}"
    password: "{{ nexus_password }}"
    force_basic_auth: yes
    return_content: no
    status_code: 200
  register: nexus_login_verify
  retries: 3
  delay: 5
  until: nexus_login_verify.status == 200
  when: initial_admin_password is defined and not (nexus_admin_marker.stat.exists | default(false))

- name: Create admin init marker file
  ansible.builtin.file:
    path: "{{ nexus_data_dir }}/.ansible_nexus_admin_set"
    state: touch
    owner: "{{ nexus_user }}"
    group: "{{ nexus_group }}"
    mode: '0600'
  when: (nexus_login_verify is defined) and ((nexus_login_verify.status | default(0)) == 200)

# Backups: install cron job and backup script when enabled
- name: Ensure backup directory exists
  ansible.builtin.file:
    path: "{{ nexus_backup_dir }}"
    state: directory
    owner: "{{ nexus_user }}"
    group: "{{ nexus_group }}"
    mode: '0755'
  when: nexus_backup_enabled | bool

- name: Install nexus backup script
  ansible.builtin.template:
    src: "backup-nexus.sh.j2"
    dest: "/usr/local/bin/backup-nexus.sh"
    mode: '0755'
    owner: root
    group: root
  when: nexus_backup_enabled | bool

- name: Install cron entry for nexus backups
  ansible.builtin.template:
    src: "cron-nexus-backup.j2"
    dest: "/etc/cron.d/nexus-backup"
    mode: '0644'
  when: nexus_backup_enabled | bool

# Simple healthcheck script
- name: Install nexus healthcheck script
  ansible.builtin.template:
    src: "nexus-healthcheck.sh.j2"
    dest: "/usr/local/bin/nexus-healthcheck.sh"
    mode: '0755'
  notify: Restart nexus

- name: Ensure curl package is present for healthcheck
  ansible.builtin.package:
    name: curl
    state: present

# Optional nginx reverse proxy for Nexus
- name: Install nginx package
  ansible.builtin.package:
    name: nginx
    state: present
  when: nexus_nginx_enable | bool

- name: Deploy nginx site for Nexus
  ansible.builtin.template:
    src: nginx-nexus.conf.j2
    dest: /etc/nginx/sites-available/nexus
    owner: root
    group: root
    mode: '0644'
  notify: Reload nginx
  when: nexus_nginx_enable | bool

- name: Ensure nginx site enabled
  ansible.builtin.file:
    src: /etc/nginx/sites-available/nexus
    dest: /etc/nginx/sites-enabled/nexus
    state: link
    force: yes
  notify: Reload nginx
  when: nexus_nginx_enable | bool

- name: Remove default nginx site if present
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: Reload nginx
  when: nexus_nginx_enable | bool

- name: Test nginx configuration
  ansible.builtin.command: nginx -t
  register: nginx_test
  failed_when: nginx_test.rc != 0
  changed_when: false
  when: nexus_nginx_enable | bool

# Let's Encrypt certificate provisioning (webroot)
- name: Ensure ACME webroot directory exists
  ansible.builtin.file:
    path: /var/www/letsencrypt
    state: directory
    owner: root
    group: root
    mode: '0755'
  when: nexus_nginx_enable | bool and nexus_nginx_letsencrypt_enable | bool

- name: Install certbot packages
  ansible.builtin.package:
    name:
      - certbot
      - python3-certbot-nginx
    state: present
  when: nexus_nginx_enable | bool and nexus_nginx_letsencrypt_enable | bool

- name: Check for existing Let's Encrypt cert
  ansible.builtin.stat:
    path: "/etc/letsencrypt/live/{{ nexus_nginx_server_name }}/fullchain.pem"
  register: letsencrypt_cert_stat
  when: nexus_nginx_enable | bool and nexus_nginx_letsencrypt_enable | bool

- name: Obtain Let's Encrypt certificate (webroot)
  ansible.builtin.command: >
    certbot certonly --webroot -w /var/www/letsencrypt -d {{ nexus_nginx_server_name }}
    --email {{ nexus_nginx_letsencrypt_email }} --agree-tos --non-interactive
    {% if nexus_nginx_letsencrypt_staging | bool %} --staging {% endif %}
  register: certbot_result
  changed_when: "'Congratulations' in (certbot_result.stdout + certbot_result.stderr)"
  failed_when: certbot_result.rc != 0 and not ('Certificate not yet due for renewal' in (certbot_result.stdout + certbot_result.stderr))
  when: nexus_nginx_enable | bool and nexus_nginx_letsencrypt_enable | bool and not letsencrypt_cert_stat.stat.exists | default(false)

- name: Set LetsEncrypt cert paths facts if present
  ansible.builtin.set_fact:
    nexus_nginx_ssl_cert: "/etc/letsencrypt/live/{{ nexus_nginx_server_name }}/fullchain.pem"
    nexus_nginx_ssl_key: "/etc/letsencrypt/live/{{ nexus_nginx_server_name }}/privkey.pem"
  when: nexus_nginx_enable | bool and nexus_nginx_letsencrypt_enable | bool and (letsencrypt_cert_stat.stat.exists | default(false) or (certbot_result is defined and certbot_result.rc == 0))

- name: Redeploy nginx site to include obtained certs
  ansible.builtin.template:
    src: nginx-nexus.conf.j2
    dest: /etc/nginx/sites-available/nexus
    owner: root
    group: root
    mode: '0644'
  notify: Reload nginx
  when: nexus_nginx_enable | bool and nexus_nginx_letsencrypt_enable | bool

