---
- name: Ensure role runs on Debian-family systems
  ansible.builtin.assert:
    that:
      - ansible_facts['os_family'] == "Debian"
    fail_msg: "traefik role currently supports Debian/Ubuntu only"

- name: Ensure Traefik project directory exists
  ansible.builtin.file:
    path: "{{ traefik_project_dir }}"
    state: directory
    owner: "{{ traefik_primary_user }}"
    group: "{{ traefik_primary_user }}"
    mode: "0755"

- name: Deploy Traefik Docker Compose file
  ansible.builtin.template:
    src: compose.yaml.j2
    dest: "{{ traefik_compose_file }}"
    owner: "{{ traefik_primary_user }}"
    group: "{{ traefik_primary_user }}"
    mode: "0644"
  notify: Restart traefik service

- name: Deploy Traefik systemd unit
  ansible.builtin.template:
    src: traefik.service.j2
    dest: "{{ traefik_systemd_unit_path }}"
    owner: root
    group: root
    mode: "0644"
  notify: Restart traefik service

- name: Ensure Traefik TLS cert directory exists
  ansible.builtin.file:
    path: "{{ traefik_tls_cert_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0750'
  when: traefik_tls_enabled | bool

- name: Ensure Traefik dynamic config directory exists
  ansible.builtin.file:
    path: "{{ traefik_tls_dynamic_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  when: traefik_tls_enabled | bool

- name: Deploy TLS certificate
  ansible.builtin.copy:
    dest: "{{ traefik_tls_cert_dir }}/{{ traefik_tls_cert_file }}"
    content: "{{ vault_traefik_tls_cert }}"
    owner: root
    group: root
    mode: '0644'
  when: traefik_tls_enabled | bool
  notify: Restart traefik service

- name: Deploy TLS private key
  ansible.builtin.copy:
    dest: "{{ traefik_tls_cert_dir }}/{{ traefik_tls_key_file }}"
    content: "{{ vault_traefik_tls_key }}"
    owner: root
    group: root
    mode: '0600'
  when: traefik_tls_enabled | bool
  no_log: true
  notify: Restart traefik service

- name: Deploy Traefik dynamic TLS config
  ansible.builtin.template:
    src: tls.yaml.j2
    dest: "{{ traefik_tls_dynamic_dir }}/tls.yaml"
    owner: root
    group: root
    mode: '0644'
  when: traefik_tls_enabled | bool
  notify: Restart traefik service

- name: Ensure Traefik service is enabled and running
  ansible.builtin.systemd:
    name: "{{ traefik_systemd_unit }}"
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for Traefik HTTP port to be ready
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ traefik_http_port }}"
    timeout: 60
