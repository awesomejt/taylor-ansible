---
# Dedicated service user and group
openclaw_user: "openclaw"
openclaw_group: "openclaw"
openclaw_ssh_key_type: "rsa"
openclaw_ssh_key_bits: 4096

# Runtime selection
openclaw_nodejs_major_version: "24"

# Python runtime selection.
# Ubuntu 26.04+ uses distro packages directly; older Ubuntu releases use deadsnakes PPA.
openclaw_python_version: "3.14"

# Override if the OpenClaw CLI package name differs.
openclaw_cli_npm_package: "openclaw"

# Gateway settings
openclaw_gateway_port: 18789
openclaw_gateway_bind: "loopback"   # "loopback" keeps gateway on 127.0.0.1; use nginx for LAN access.

# Workspace and AI provider
openclaw_workspace_dir: "/home/openclaw/workspace"
openclaw_provider: "ollama"
openclaw_ollama_host: ""            # Override in vars: IP of your Ollama server (no http://)
openclaw_ollama_model: ""           # Override in vars: e.g. "gemma4:31b"

# Nginx reverse proxy (exposes gateway dashboard on port 80)
openclaw_nginx_enable: true
openclaw_nginx_server_name: "openclaw.taylor.lan"

# Discord channel — set in vars/common/secrets.yaml (not committed)
openclaw_discord_token: ""
openclaw_discord_server_id: ""
openclaw_discord_users: []
