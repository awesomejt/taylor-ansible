---
- name: Ensure apt dependencies for OpenClaw repositories are installed
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - software-properties-common
    state: present
    update_cache: true
    lock_timeout: 600

- name: Ensure OpenClaw role runs on Ubuntu hosts
  ansible.builtin.assert:
    that:
      - ansible_distribution == "Ubuntu"
    fail_msg: "openclaw role currently supports Ubuntu only"

- name: Determine whether deadsnakes PPA is needed for Python {{ openclaw_python_version }}
  ansible.builtin.set_fact:
    openclaw_use_deadsnakes_ppa: "{{ ansible_distribution_version is version('26.04', '<') }}"

- name: Add deadsnakes PPA for Python {{ openclaw_python_version }}
  ansible.builtin.apt_repository:
    repo: ppa:deadsnakes/ppa
    state: present
  when: openclaw_use_deadsnakes_ppa | bool

- name: Install Python {{ openclaw_python_version }} runtime packages
  ansible.builtin.apt:
    name:
      - "python{{ openclaw_python_version }}"
      - "python{{ openclaw_python_version }}-venv"
      - "python{{ openclaw_python_version }}-dev"
    state: present
    update_cache: true
    lock_timeout: 600

- name: Create keyrings directory for APT repositories
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Download NodeSource repository key
  ansible.builtin.get_url:
    url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
    dest: /tmp/nodesource-repo.gpg.key
    mode: "0644"

- name: Convert NodeSource key to keyring format
  ansible.builtin.command:
    cmd: gpg --dearmor -o /etc/apt/keyrings/nodesource.gpg /tmp/nodesource-repo.gpg.key
  args:
    creates: /etc/apt/keyrings/nodesource.gpg

- name: Add NodeSource repository for Node.js {{ openclaw_nodejs_major_version }}.x
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/nodesource.gpg] https://deb.nodesource.com/node_{{ openclaw_nodejs_major_version }}.x nodistro main"
    filename: nodesource
    state: present

- name: Install Node.js {{ openclaw_nodejs_major_version }} LTS
  ansible.builtin.apt:
    name: nodejs
    state: present
    update_cache: true
    lock_timeout: 600

- name: Upgrade npm to latest
  ansible.builtin.command:
    cmd: npm install -g npm@latest
  changed_when: true

- name: Install OpenClaw CLI package globally
  ansible.builtin.command:
    cmd: npm install -g {{ openclaw_cli_npm_package }}
  changed_when: true

- name: Ensure OpenClaw state directory exists
  ansible.builtin.file:
    path: "{{ openclaw_setup_marker | dirname }}"
    state: directory
    mode: "0755"

- name: Check whether OpenClaw setup already completed
  ansible.builtin.stat:
    path: "{{ openclaw_setup_marker }}"
  register: openclaw_setup_state

- name: Run OpenClaw non-interactive install without onboarding
  ansible.builtin.shell: "{{ openclaw_setup_command }}"
  environment:
    CI: "true"
  when: not openclaw_setup_state.stat.exists

- name: Mark OpenClaw setup complete
  ansible.builtin.file:
    path: "{{ openclaw_setup_marker }}"
    state: touch
    mode: "0644"
  when: not openclaw_setup_state.stat.exists
