---
- name: Ensure apt dependencies for OpenClaw repositories are installed
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - software-properties-common
    state: present
    update_cache: true
    lock_timeout: 600

- name: Ensure OpenClaw role runs on Ubuntu hosts
  ansible.builtin.assert:
    that:
      - ansible_facts['distribution'] == "Ubuntu"
    fail_msg: "openclaw role currently supports Ubuntu only"

- name: Ensure openclaw group exists
  ansible.builtin.group:
    name: "{{ openclaw_group }}"
    state: present
    system: true

- name: Ensure openclaw user exists with SSH key
  ansible.builtin.user:
    name: "{{ openclaw_user }}"
    group: "{{ openclaw_group }}"
    system: true
    shell: /bin/bash
    home: "/home/{{ openclaw_user }}"
    create_home: true
    generate_ssh_key: true
    ssh_key_type: "{{ openclaw_ssh_key_type }}"
    ssh_key_bits: "{{ openclaw_ssh_key_bits }}"
    ssh_key_comment: "{{ openclaw_user }}@{{ inventory_hostname }}"
    state: present

- name: Determine whether deadsnakes PPA is needed for Python {{ openclaw_python_version }}
  ansible.builtin.set_fact:
    openclaw_use_deadsnakes_ppa: "{{ ansible_facts['distribution_version'] is version('26.04', '<') }}"

- name: Add deadsnakes PPA for Python {{ openclaw_python_version }}
  ansible.builtin.apt_repository:
    repo: ppa:deadsnakes/ppa
    state: present
  when: openclaw_use_deadsnakes_ppa | bool

- name: Install Python {{ openclaw_python_version }} runtime packages
  ansible.builtin.apt:
    name:
      - "python{{ openclaw_python_version }}"
      - "python{{ openclaw_python_version }}-venv"
      - "python{{ openclaw_python_version }}-dev"
    state: present
    update_cache: true
    lock_timeout: 600

- name: Create keyrings directory for APT repositories
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Download NodeSource repository key
  ansible.builtin.get_url:
    url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
    dest: /tmp/nodesource-repo.gpg.key
    mode: "0644"

- name: Convert NodeSource key to keyring format
  ansible.builtin.command:
    cmd: gpg --dearmor -o /etc/apt/keyrings/nodesource.gpg /tmp/nodesource-repo.gpg.key
  args:
    creates: /etc/apt/keyrings/nodesource.gpg

- name: Add NodeSource repository for Node.js {{ openclaw_nodejs_major_version }}.x
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/nodesource.gpg] https://deb.nodesource.com/node_{{ openclaw_nodejs_major_version }}.x nodistro main"
    filename: nodesource
    state: present

- name: Install Node.js {{ openclaw_nodejs_major_version }} LTS
  ansible.builtin.apt:
    name: nodejs
    state: present
    update_cache: true
    lock_timeout: 600

- name: Upgrade npm to latest
  ansible.builtin.command:
    cmd: npm install -g npm@latest
  changed_when: true

- name: Install OpenClaw CLI package globally
  ansible.builtin.command:
    cmd: npm install -g {{ openclaw_cli_npm_package }}
  changed_when: true

### User privileges ###

- name: Grant openclaw user passwordless sudo rights
  ansible.builtin.copy:
    dest: /etc/sudoers.d/openclaw
    content: "{{ openclaw_user }} ALL=(ALL) NOPASSWD:ALL\n"
    owner: root
    group: root
    mode: "0440"
    validate: "visudo -cf %s"

### Directories ###

- name: Ensure openclaw workspace directory exists
  ansible.builtin.file:
    path: "{{ openclaw_workspace_dir }}"
    state: directory
    mode: "0755"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_group }}"

- name: Ensure openclaw state directory exists
  ansible.builtin.file:
    path: /var/lib/openclaw
    state: directory
    mode: "0755"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_group }}"

- name: Ensure .openclaw config directory exists
  ansible.builtin.file:
    path: "/home/{{ openclaw_user }}/.openclaw"
    state: directory
    mode: "0700"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_group }}"

### Configuration ###

- name: Deploy openclaw.json gateway configuration
  ansible.builtin.template:
    src: openclaw.json.j2
    dest: "/home/{{ openclaw_user }}/.openclaw/openclaw.json"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_group }}"
    mode: "0600"
  notify: Restart openclaw service

- name: Deploy openclaw.json.last-good gateway configuration backup
  ansible.builtin.template:
    src: openclaw.json.j2
    dest: "/home/{{ openclaw_user }}/.openclaw/openclaw.json.last-good"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_group }}"
    mode: "0600"
  notify: Restart openclaw service

- name: Deploy openclaw environment secrets file
  ansible.builtin.template:
    src: openclaw.env.j2
    dest: "/home/{{ openclaw_user }}/.openclaw/.env"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_group }}"
    mode: "0600"
  notify: Restart openclaw service

### Systemd service ###

- name: Discover npm global prefix for openclaw binary path
  ansible.builtin.command:
    cmd: npm prefix -g
  register: _openclaw_npm_prefix
  changed_when: false

- name: Set openclaw binary path fact
  ansible.builtin.set_fact:
    openclaw_bin: "{{ _openclaw_npm_prefix.stdout | trim }}/bin/openclaw"

- name: Deploy openclaw gateway systemd service unit
  ansible.builtin.template:
    src: openclaw.service.j2
    dest: /etc/systemd/system/openclaw.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart openclaw service

- name: Enable and start openclaw gateway service
  ansible.builtin.systemd:
    name: openclaw
    enabled: true
    state: started
    daemon_reload: true

### Nginx reverse proxy ###

- name: Install nginx
  ansible.builtin.apt:
    name: nginx
    state: present
    lock_timeout: 600
  when: openclaw_nginx_enable | bool

- name: Deploy openclaw nginx reverse proxy configuration
  ansible.builtin.template:
    src: openclaw-nginx.conf.j2
    dest: /etc/nginx/sites-available/openclaw
    owner: root
    group: root
    mode: "0644"
  when: openclaw_nginx_enable | bool
  notify: Reload nginx

- name: Enable openclaw nginx site
  ansible.builtin.file:
    src: /etc/nginx/sites-available/openclaw
    dest: /etc/nginx/sites-enabled/openclaw
    state: link
  when: openclaw_nginx_enable | bool
  notify: Reload nginx

- name: Remove default nginx site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  when: openclaw_nginx_enable | bool
  notify: Reload nginx

- name: Enable and start nginx
  ansible.builtin.systemd:
    name: nginx
    enabled: true
    state: started
  when: openclaw_nginx_enable | bool
