---
- name: Ensure harbor role runs on Debian-family systems
  ansible.builtin.assert:
    that:
      - ansible_facts['os_family'] == 'Debian'
    fail_msg: "harbor role currently supports Debian/Ubuntu only"

- name: Ensure required Harbor secrets are defined
  ansible.builtin.assert:
    that:
      - harbor_admin_password != 'change-me'
      - harbor_database_password != 'change-me'
    fail_msg: "Set vault_harbor_admin_password and vault_harbor_db_password in vars/common/secrets.yaml"

- name: Ensure LDAP bind password is set when Harbor LDAP config is enabled
  ansible.builtin.assert:
    that:
      - harbor_ldap_search_password != 'change-me'
    fail_msg: "Set vault_lldap_ldap_user_pass in vars/common/secrets.yaml before enabling Harbor LDAP config"
  when: harbor_ldap_enabled | bool

- name: Ensure Harbor project directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ harbor_primary_user }}"
    group: "{{ harbor_primary_user }}"
    mode: "0750"
  loop:
    - "{{ harbor_project_dir }}"
    - "{{ harbor_data_volume }}"
    - "{{ harbor_log_dir }}"

- name: Check whether Harbor installer payload is present
  ansible.builtin.stat:
    path: "{{ harbor_install_dir }}/install.sh"
  register: harbor_install_script

- name: Read Harbor installer version marker
  ansible.builtin.command: "cat {{ harbor_project_dir }}/.harbor-installer-version"
  register: harbor_installer_version_current
  changed_when: false
  failed_when: false

- name: Determine whether Harbor installer extraction is required
  ansible.builtin.set_fact:
    harbor_installer_extract_required: >-
      {{
        (not harbor_install_script.stat.exists)
        or ((harbor_installer_version_current.stdout | trim) != harbor_version)
      }}

- name: Download Harbor online installer archive
  ansible.builtin.get_url:
    url: "{{ harbor_installer_url }}"
    dest: "{{ harbor_installer_archive }}"
    mode: "0644"

- name: Extract Harbor installer
  ansible.builtin.unarchive:
    src: "{{ harbor_installer_archive }}"
    dest: "{{ harbor_project_dir }}"
    remote_src: true
  when: harbor_installer_extract_required | bool
  notify:
    - Prepare harbor configuration
    - Prepare harbor configuration without trivy
    - Restart harbor service

- name: Persist Harbor installer version marker
  ansible.builtin.copy:
    dest: "{{ harbor_project_dir }}/.harbor-installer-version"
    content: "{{ harbor_version }}\n"
    owner: "{{ harbor_primary_user }}"
    group: "{{ harbor_primary_user }}"
    mode: "0640"

- name: Deploy Harbor configuration file
  ansible.builtin.template:
    src: harbor.yml.j2
    dest: "{{ harbor_install_dir }}/harbor.yml"
    owner: "{{ harbor_primary_user }}"
    group: "{{ harbor_primary_user }}"
    mode: "0640"
  notify:
    - Prepare harbor configuration
    - Prepare harbor configuration without trivy
    - Restart harbor service

- name: Deploy Harbor Compose override for Traefik
  ansible.builtin.template:
    src: docker-compose.override.yml.j2
    dest: "{{ harbor_compose_override_file }}"
    owner: "{{ harbor_primary_user }}"
    group: "{{ harbor_primary_user }}"
    mode: "0640"
  notify: Restart harbor service

- name: Deploy Harbor systemd unit
  ansible.builtin.template:
    src: harbor.service.j2
    dest: "{{ harbor_systemd_unit_path }}"
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart harbor service

- name: Apply pending handlers before readiness checks
  ansible.builtin.meta: flush_handlers

- name: Ensure Harbor service is enabled and running
  ansible.builtin.systemd:
    name: "{{ harbor_service_name }}"
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for Harbor UI endpoint to be ready
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ harbor_http_port }}/"
    method: GET
    status_code:
      - 200
      - 301
      - 302
      - 303
      - 307
      - 308
  register: harbor_ui_ready
  retries: 30
  delay: 10
  until: harbor_ui_ready.status in [200, 301, 302, 303, 307, 308]

- name: Wait for Harbor API endpoint to be ready
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ harbor_http_port }}/api/v2.0/ping"
    method: GET
    status_code: 200
  register: harbor_api_ready
  retries: 30
  delay: 10
  until: harbor_api_ready.status == 200

- name: Attempt Harbor LDAP configuration via API
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ harbor_http_port }}/api/v2.0/configurations"
    method: PUT
    force_basic_auth: true
    user: "{{ harbor_admin_username }}"
    password: "{{ harbor_admin_password }}"
    body_format: json
    body:
      auth_mode: ldap_auth
      ldap_url: "{{ harbor_ldap_url }}"
      ldap_search_dn: "{{ harbor_ldap_search_dn }}"
      ldap_search_password: "{{ harbor_ldap_search_password }}"
      ldap_base_dn: "{{ harbor_ldap_base_dn }}"
      ldap_filter: "{{ harbor_ldap_filter }}"
      ldap_uid: "{{ harbor_ldap_uid }}"
      ldap_scope: "{{ harbor_ldap_scope | int }}"
      ldap_timeout: "{{ harbor_ldap_timeout | int }}"
      ldap_verify_cert: "{{ harbor_ldap_verify_cert | bool | lower }}"
      ldap_group_base_dn: "{{ harbor_ldap_group_base_dn }}"
      ldap_group_filter: "{{ harbor_ldap_group_filter }}"
      ldap_group_gid: "{{ harbor_ldap_group_gid }}"
      ldap_group_member_uid: "{{ harbor_ldap_group_member_uid }}"
    status_code:
      - 200
      - 400
      - 412
      - 422
  register: harbor_ldap_configure
  changed_when: harbor_ldap_configure.status == 200
  failed_when: >-
    (harbor_ldap_configure.status not in [200, 400, 412, 422])
    or (
      (harbor_ldap_enforce | bool)
      and (harbor_ldap_configure.status != 200)
    )
  no_log: true
  when: harbor_ldap_enabled | bool

- name: Report Harbor LDAP API response when not applied
  ansible.builtin.debug:
    msg: >-
      Harbor LDAP configuration request did not return success (status={{ harbor_ldap_configure.status }}).
      LDAP may require manual setup in Harbor UI depending on Harbor version/API behavior.
  when:
    - harbor_ldap_enabled | bool
    - harbor_ldap_configure is defined
    - harbor_ldap_configure.status != 200

- name: Ensure Harbor projects exist
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ harbor_http_port }}/api/v2.0/projects"
    method: POST
    force_basic_auth: true
    user: "{{ harbor_admin_username }}"
    password: "{{ harbor_admin_password }}"
    body_format: json
    body:
      project_name: "{{ item.name }}"
      public: "{{ item.public | bool }}"
      metadata:
        public: "{{ item.public | bool | lower }}"
    status_code:
      - 201
      - 409
  loop: "{{ harbor_projects }}"
  loop_control:
    label: "{{ item.name }}"
  register: _harbor_project_result
  changed_when: _harbor_project_result.status == 201
  no_log: true
  when: harbor_projects | length > 0

- name: Ensure Harbor robot account secrets are configured
  ansible.builtin.assert:
    that:
      - item.secret != 'change-me'
    fail_msg: >-
      Set vault_harbor_robot_{{ item.name }}_secret in vars/common/secrets.yaml
      before running. Generate with: openssl rand -hex 20
  loop: "{{ harbor_robot_accounts }}"
  loop_control:
    label: "{{ item.name }}"
  no_log: true
  when: harbor_robot_accounts | length > 0

- name: Fetch existing Harbor system robot accounts
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ harbor_http_port }}/api/v2.0/robots?level=system&page_size=100"
    method: GET
    force_basic_auth: true
    user: "{{ harbor_admin_username }}"
    password: "{{ harbor_admin_password }}"
    status_code: 200
  register: _harbor_existing_robots
  no_log: true
  when: harbor_robot_accounts | length > 0

- name: Create Harbor system robot accounts
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ harbor_http_port }}/api/v2.0/robots"
    method: POST
    force_basic_auth: true
    user: "{{ harbor_admin_username }}"
    password: "{{ harbor_admin_password }}"
    body_format: json
    body:
      name: "{{ item.name }}"
      level: system
      secret: "{{ item.secret }}"
      description: "{{ item.description | default('') }}"
      disable: false
      duration: -1
      permissions: "{{ harbor_robot_permissions }}"
    status_code: 201
  loop: "{{ harbor_robot_accounts }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - harbor_robot_accounts | length > 0
    - >-
      ('robot$' + item.name) not in
      (_harbor_existing_robots.json | map(attribute='name') | list)
  no_log: true
  changed_when: true

- name: Update permissions on existing Harbor system robot accounts
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ harbor_http_port }}/api/v2.0/robots/{{ _existing_robot.id }}"
    method: PUT
    force_basic_auth: true
    user: "{{ harbor_admin_username }}"
    password: "{{ harbor_admin_password }}"
    body_format: json
    body:
      name: "robot${{ item.name }}"
      level: system
      description: "{{ item.description | default('') }}"
      disable: false
      duration: -1
      permissions: "{{ harbor_robot_permissions }}"
    status_code: 200
  vars:
    _existing_robot: >-
      {{
        _harbor_existing_robots.json
        | selectattr('name', 'equalto', 'robot$' + item.name)
        | first
      }}
  loop: "{{ harbor_robot_accounts }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - harbor_robot_accounts | length > 0
    - >-
      ('robot$' + item.name) in
      (_harbor_existing_robots.json | map(attribute='name') | list)
  no_log: true
  changed_when: true
