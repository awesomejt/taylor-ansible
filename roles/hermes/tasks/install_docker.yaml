---
- name: Ensure docker service is running
  become: true
  ansible.builtin.systemd_service:
    name: docker
    state: started
    enabled: true

- name: Clone hermes-agent source repository
  become: true
  ansible.builtin.git:
    repo: "{{ hermes_git_repo }}"
    dest: "{{ hermes_install_dir }}/src"
    version: "{{ hermes_git_version }}"
    force: false
    update: true
  register: hermes_git_clone
  notify: rebuild hermes image

- name: Build hermes Docker image from source
  become: true
  community.docker.docker_image:
    name: hermes-agent
    tag: local
    source: build
    build:
      path: "{{ hermes_install_dir }}/src"
      pull: true
    state: present
    force_source: "{{ hermes_git_clone.changed }}"
  register: hermes_image_built
