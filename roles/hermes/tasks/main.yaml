---
- name: Ensure apt dependencies for Hermes repositories are installed
  ansible.builtin.apt:
    name:
      - build-essential
      - ca-certificates
      - cmake
      - curl
      - cifs-utils
      - gh
      - git
      - gnupg
      - software-properties-common
    state: present
    update_cache: true
    lock_timeout: 600

- name: Ensure Hermes role runs on Ubuntu hosts
  ansible.builtin.assert:
    that:
      - ansible_facts['distribution'] == "Ubuntu"
    fail_msg: "hermes role currently supports Ubuntu only"

- name: Ensure hermes group exists
  ansible.builtin.group:
    name: "{{ hermes_group }}"
    state: present
    system: true

- name: Ensure hermes user exists with SSH key
  ansible.builtin.user:
    name: "{{ hermes_user }}"
    group: "{{ hermes_group }}"
    system: true
    shell: /bin/bash
    home: "/home/{{ hermes_user }}"
    create_home: true
    generate_ssh_key: true
    ssh_key_type: "{{ hermes_ssh_key_type }}"
    ssh_key_bits: "{{ hermes_ssh_key_bits }}"
    ssh_key_comment: "{{ hermes_user }}@{{ inventory_hostname }}"
    state: present

- name: Determine whether deadsnakes PPA is needed for Python {{ hermes_python_version }}
  ansible.builtin.set_fact:
    hermes_use_deadsnakes_ppa: "{{ ansible_facts['distribution_version'] is version('26.04', '<') }}"

- name: Add deadsnakes PPA for Python {{ hermes_python_version }}
  ansible.builtin.apt_repository:
    repo: ppa:deadsnakes/ppa
    state: present
  when: hermes_use_deadsnakes_ppa | bool

- name: Install Python {{ hermes_python_version }} runtime packages
  ansible.builtin.apt:
    name:
      - "python{{ hermes_python_version }}"
      - "python{{ hermes_python_version }}-venv"
      - "python{{ hermes_python_version }}-dev"
    state: present
    update_cache: true
    lock_timeout: 600

- name: Add Go PPA
  ansible.builtin.command: add-apt-repository -y "{{ hermes_go_ppa }}"
  args:
    creates: "/etc/apt/sources.list.d/longsleep-ubuntu-golang-backports-{{ ansible_distribution_release }}.sources"
  when: hermes_install_go | bool

- name: Update apt cache after adding Go PPA
  ansible.builtin.apt:
    update_cache: true
    lock_timeout: 600
  when: hermes_install_go | bool

- name: Install Go (latest from PPA)
  ansible.builtin.apt:
    name: "{{ hermes_go_package }}"
    state: latest
    lock_timeout: 600
  # noqa: package-latest
  when: hermes_install_go | bool

- name: Check installed Go version
  ansible.builtin.command: go version
  register: _hermes_go_version
  changed_when: false
  when: hermes_install_go | bool

- name: Assert required Go series is installed
  ansible.builtin.assert:
    that:
      - "'go{{ hermes_go_required_series }}.' in _hermes_go_version.stdout"
    fail_msg: >-
      Expected Go {{ hermes_go_required_series }}.x from {{ hermes_go_ppa }},
      got: {{ _hermes_go_version.stdout | default('unknown') }}
  when:
    - hermes_install_go | bool
    - (hermes_go_required_series | default('') | length) > 0

- name: Install uv toolchain manager
  ansible.builtin.get_url:
    url: https://astral.sh/uv/install.sh
    dest: /tmp/uv-installer.sh
    mode: "0755"
  when: hermes_install_uv | bool

- name: Install uv into /usr/local/bin
  ansible.builtin.command:
    cmd: /tmp/uv-installer.sh
  environment:
    UV_INSTALL_DIR: /usr/local/bin
  args:
    creates: /usr/local/bin/uv
  when: hermes_install_uv | bool

- name: Check installed NVM version
  become: true
  become_user: "{{ hermes_user }}"
  ansible.builtin.shell:
    cmd: "bash -c 'source {{ hermes_home_dir }}/.nvm/nvm.sh && nvm --version'"
  environment:
    HOME: "{{ hermes_home_dir }}"
    NVM_DIR: "{{ hermes_home_dir }}/.nvm"
  register: _hermes_nvm_installed_version
  changed_when: false
  failed_when: false
  when: hermes_install_nvm | bool

- name: Download NVM install script
  ansible.builtin.get_url:
    url: "https://raw.githubusercontent.com/nvm-sh/nvm/v{{ hermes_nvm_version }}/install.sh"
    dest: /tmp/nvm-install.sh
    mode: "0755"
    force: true
  when:
    - hermes_install_nvm | bool
    - _hermes_nvm_installed_version.rc != 0 or hermes_nvm_version not in _hermes_nvm_installed_version.stdout

- name: Install NVM for Hermes user
  become: true
  become_user: "{{ hermes_user }}"
  ansible.builtin.command: bash /tmp/nvm-install.sh
  environment:
    HOME: "{{ hermes_home_dir }}"
    NVM_DIR: "{{ hermes_home_dir }}/.nvm"
  args:
    creates: "{{ hermes_home_dir }}/.nvm/nvm.sh"
  when:
    - hermes_install_nvm | bool
    - _hermes_nvm_installed_version.rc != 0 or hermes_nvm_version not in _hermes_nvm_installed_version.stdout

- name: Install Node.js versions via NVM
  become: true
  become_user: "{{ hermes_user }}"
  ansible.builtin.shell:
    cmd: "bash -lc 'source {{ hermes_home_dir }}/.nvm/nvm.sh && nvm install {{ item }}'"
  environment:
    HOME: "{{ hermes_home_dir }}"
    NVM_DIR: "{{ hermes_home_dir }}/.nvm"
  loop: "{{ hermes_node_versions }}"
  register: _hermes_nvm_install
  changed_when: "'is already installed' not in _hermes_nvm_install.stdout"
  when: hermes_install_nvm | bool

- name: Set default Node.js version
  become: true
  become_user: "{{ hermes_user }}"
  ansible.builtin.shell:
    cmd: "bash -lc 'source {{ hermes_home_dir }}/.nvm/nvm.sh && nvm alias default {{ hermes_node_default }} && nvm use default'"
  environment:
    HOME: "{{ hermes_home_dir }}"
    NVM_DIR: "{{ hermes_home_dir }}/.nvm"
  changed_when: false
  when: hermes_install_nvm | bool

- name: Upgrade npm to latest for installed Node.js versions
  become: true
  become_user: "{{ hermes_user }}"
  ansible.builtin.shell:
    cmd: "bash -lc 'source {{ hermes_home_dir }}/.nvm/nvm.sh && nvm use {{ item }} >/dev/null && npm install -g npm@latest'"
  environment:
    HOME: "{{ hermes_home_dir }}"
    NVM_DIR: "{{ hermes_home_dir }}/.nvm"
  loop: "{{ hermes_node_versions }}"
  changed_when: false
  when: hermes_install_nvm | bool

- name: Check installed global npm packages
  become: true
  become_user: "{{ hermes_user }}"
  ansible.builtin.shell:
    cmd: "bash -lc 'source {{ hermes_home_dir }}/.nvm/nvm.sh && nvm use default >/dev/null && npm list -g --depth=0 --json'"
  environment:
    HOME: "{{ hermes_home_dir }}"
    NVM_DIR: "{{ hermes_home_dir }}/.nvm"
  register: _hermes_npm_global_list
  changed_when: false
  failed_when: false
  when: hermes_install_nvm | bool

- name: Install global npm packages
  become: true
  become_user: "{{ hermes_user }}"
  ansible.builtin.shell:
    cmd: "bash -lc 'source {{ hermes_home_dir }}/.nvm/nvm.sh && nvm use default >/dev/null && npm install -g {{ item }}'"
  environment:
    HOME: "{{ hermes_home_dir }}"
    NVM_DIR: "{{ hermes_home_dir }}/.nvm"
  loop: "{{ hermes_npm_global_packages }}"
  register: _hermes_npm_global_install
  changed_when: "'added' in (_hermes_npm_global_install.stdout | default('')) or 'changed' in (_hermes_npm_global_install.stdout | default(''))"
  when:
    - hermes_install_nvm | bool
    - item not in (_hermes_npm_global_list.stdout | default('{}'))

- name: Grant hermes user sudo rights
  ansible.builtin.copy:
    dest: /etc/sudoers.d/hermes
    content: "{{ hermes_user }} ALL=(ALL) {% if hermes_sudo_nopasswd | bool %}NOPASSWD:{% endif %}ALL\n"
    owner: root
    group: root
    mode: "0440"
    validate: "visudo -cf %s"

- name: Configure Hermes git user.name
  become_user: "{{ hermes_user }}"
  ansible.builtin.command:
    cmd: "git config --global user.name {{ hermes_git_user_name | quote }}"
  changed_when: false

- name: Configure Hermes git user.email
  become_user: "{{ hermes_user }}"
  ansible.builtin.command:
    cmd: "git config --global user.email {{ hermes_git_user_email | quote }}"
  changed_when: false

- name: Build effective Hermes profile list
  ansible.builtin.set_fact:
    hermes_profiles_effective: "{{ hermes_profiles if (hermes_profiles | default([]) | length > 0) else (hermes_instances | default([])) }}"

- name: Build effective Hermes dashboard profile
  ansible.builtin.set_fact:
    hermes_dashboard_profile_effective: "{{ hermes_primary_profile if (hermes_primary_profile | default('') | length > 0) else (hermes_dashboard_instance | default('default')) }}"

- name: Validate Hermes profile list is non-empty
  ansible.builtin.assert:
    that:
      - hermes_profiles_effective | length > 0
    fail_msg: "Define at least one entry in hermes_profiles (preferred) or hermes_instances (legacy) in vars/common/vars.yaml"

- name: Ensure Hermes install directory exists
  ansible.builtin.file:
    path: "{{ hermes_install_dir }}"
    state: directory
    owner: "{{ hermes_user }}"
    group: "{{ hermes_group }}"
    mode: "0755"

- name: Ensure Hermes workspace directory exists
  ansible.builtin.file:
    path: "{{ hermes_workspace_dir }}"
    state: directory
    owner: "{{ hermes_user }}"
    group: "{{ hermes_group }}"
    mode: "0755"

- name: Ensure CIFS mount point directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ hermes_user }}"
    group: "{{ hermes_group }}"
    mode: "0755"
  loop: "{{ hermes_cifs_shares }}"

- name: Ensure CIFS credentials directory exists
  ansible.builtin.file:
    path: "{{ hermes_cifs_credentials_file | dirname }}"
    state: directory
    owner: root
    group: root
    mode: "0700"
  when:
    - hermes_cifs_shares | length > 0

- name: Write Hermes CIFS credentials file from vault secrets
  ansible.builtin.copy:
    dest: "{{ hermes_cifs_credentials_file }}"
    content: |
      username={{ vault_hermes_cifs_username }}
      password={{ vault_hermes_cifs_password }}
    owner: root
    group: root
    mode: "0600"
  no_log: true
  when:
    - hermes_cifs_shares | length > 0
    - (vault_hermes_cifs_username | default('') | length) > 0
    - (vault_hermes_cifs_password | default('') | length) > 0

- name: Verify CIFS credentials file exists
  ansible.builtin.stat:
    path: "{{ hermes_cifs_credentials_file }}"
  register: hermes_cifs_credentials_file_stat

- name: Assert CIFS credentials file exists before mounting
  ansible.builtin.assert:
    that:
      - hermes_cifs_credentials_file_stat.stat.exists
      - hermes_cifs_credentials_file_stat.stat.isreg
    fail_msg: >-
      Missing CIFS credentials file at {{ hermes_cifs_credentials_file }}.
      Set vault_hermes_cifs_username and vault_hermes_cifs_password in
      vars/common/secrets.yaml or stage the credentials file manually.
  when:
    - hermes_cifs_shares | length > 0
    - hermes_cifs_require_credentials | default(true) | bool

- name: Skip CIFS mounts when credentials file is missing and mounts are optional
  ansible.builtin.debug:
    msg: "Skipping Hermes CIFS mounts because {{ hermes_cifs_credentials_file }} is missing and hermes_cifs_require_credentials is false"
  when:
    - hermes_cifs_shares | length > 0
    - not (hermes_cifs_credentials_file_stat.stat.exists and hermes_cifs_credentials_file_stat.stat.isreg)
    - not (hermes_cifs_require_credentials | default(true) | bool)

- name: Configure and mount Hermes CIFS shares
  ansible.posix.mount:
    path: "{{ item.path }}"
    src: "{{ item.src }}"
    fstype: cifs
    opts: "{{ item.opts }}"
    state: mounted
  loop: "{{ hermes_cifs_shares }}"
  when:
    - hermes_cifs_shares | length > 0
    - hermes_cifs_credentials_file_stat.stat.exists
    - hermes_cifs_credentials_file_stat.stat.isreg

- name: Ensure Hermes config directory exists
  ansible.builtin.file:
    path: "{{ hermes_config_dir }}"
    state: directory
    owner: "{{ hermes_user }}"
    group: "{{ hermes_group }}"
    mode: "0700"

- name: Clone Hermes agent repository
  become_user: "{{ hermes_user }}"
  ansible.builtin.git:
    repo: "{{ hermes_git_repo }}"
    dest: "{{ hermes_install_dir }}"
    version: "{{ hermes_git_version }}"
    update: true

- name: Ensure Hermes virtualenv exists
  become_user: "{{ hermes_user }}"
  ansible.builtin.command:
    cmd: "python{{ hermes_python_version }} -m venv {{ hermes_venv_dir }}"
  args:
    creates: "{{ hermes_venv_dir }}/bin/activate"

- name: Install Hermes agent into virtualenv
  become_user: "{{ hermes_user }}"
  ansible.builtin.pip:
    name: "{{ '.' ~ ('[' ~ hermes_python_extras ~ ']' if (hermes_python_extras | default('') | length > 0) else '') }}"
    chdir: "{{ hermes_install_dir }}"
    editable: true
    virtualenv: "{{ hermes_venv_dir }}"
    virtualenv_command: "python{{ hermes_python_version }} -m venv"

- name: Link Hermes CLI into /usr/local/bin
  ansible.builtin.file:
    src: "{{ hermes_venv_dir }}/bin/hermes"
    dest: /usr/local/bin/hermes
    state: link
    force: true

- name: Install Hermes RAG query helper
  ansible.builtin.copy:
    src: hermes-rag-query.py
    dest: "{{ hermes_rag_query_cmd | default('/usr/local/bin/hermes-rag-query') }}"
    owner: root
    group: root
    mode: "0755"

- name: Stop and disable legacy single-instance gateway services
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: false
    state: stopped
    daemon_reload: true
  loop:
    - hermes-gateway
    - hermes
  failed_when: false

- name: Build expected Hermes gateway unit list for active profile names
  ansible.builtin.set_fact:
    hermes_expected_gateway_units: >-
      {{ hermes_profiles_effective
      | map(attribute='name')
      | map('regex_replace', '^(.*)$', 'hermes-gateway-\1.service')
      | list }}

- name: Discover existing Hermes per-profile gateway unit files
  ansible.builtin.find:
    paths: /etc/systemd/system
    patterns: "hermes-gateway-*.service"
    file_type: file
  register: hermes_existing_gateway_units

- name: Stop and disable stale Hermes per-profile gateway services
  ansible.builtin.systemd:
    name: "{{ (item.path | basename) | regex_replace('\\.service$', '') }}"
    enabled: false
    state: stopped
    daemon_reload: true
  loop: "{{ hermes_existing_gateway_units.files | default([]) }}"
  loop_control:
    label: "{{ item.path | basename }}"
  failed_when: false
  when: (item.path | basename) not in hermes_expected_gateway_units

- name: Remove stale Hermes per-profile gateway unit files
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ hermes_existing_gateway_units.files | default([]) }}"
  loop_control:
    label: "{{ item.path | basename }}"
  register: hermes_stale_gateway_unit_removals
  when: (item.path | basename) not in hermes_expected_gateway_units

- name: Reload systemd after removing stale Hermes gateway units
  ansible.builtin.systemd:
    daemon_reload: true
  when: (hermes_stale_gateway_unit_removals.results | default([]) | selectattr('changed') | list | length) > 0

# --- Per-profile config, env, and optional gateway service ---

- name: Deploy per-profile Hermes config, env, and optional gateway service
  ansible.builtin.include_tasks: instance.yaml
  loop: "{{ hermes_profiles_effective }}"
  loop_control:
    loop_var: hermes_instance
    label: "{{ hermes_instance.name }}"

# --- Global default Hermes config (used when no profile is specified) ---

- name: Check whether global Hermes .env exists
  ansible.builtin.stat:
    path: "{{ hermes_config_dir }}/.env"
  register: hermes_global_env_stat

- name: Check whether global Hermes config.yaml exists
  ansible.builtin.stat:
    path: "{{ hermes_config_dir }}/config.yaml"
  register: hermes_global_config_stat

- name: Ensure SEARXNG_URL is set in global Hermes .env
  ansible.builtin.lineinfile:
    path: "{{ hermes_config_dir }}/.env"
    regexp: '^SEARXNG_URL='
    line: "SEARXNG_URL={{ hermes_searxng_url }}"
    create: false
  when:
    - hermes_config_dir is defined
    - hermes_global_env_stat.stat.exists
    - hermes_global_env_stat.stat.isreg

- name: Ensure web search backend is configured in global Hermes config.yaml
  ansible.builtin.blockinfile:
    path: "{{ hermes_config_dir }}/config.yaml"
    marker: "# {mark} ANSIBLE MANAGED - web search backend"
    block: |
      web:
        backend: "{{ hermes_web_backend }}"
        search_backend: "{{ hermes_web_search_backend }}"
    create: false
  when:
    - hermes_config_dir is defined
    - hermes_global_config_stat.stat.exists
    - hermes_global_config_stat.stat.isreg

- name: Deploy GitHub credential file for Hermes user
  ansible.builtin.template:
    src: netrc.j2
    dest: "{{ hermes_home_dir }}/.netrc"
    owner: "{{ hermes_user }}"
    group: "{{ hermes_group }}"
    mode: "0600"

- name: Clone AI agent profile repository
  become_user: "{{ hermes_user }}"
  ansible.builtin.git:
    repo: "https://github.com/awesomejt/ai-agents.git"
    dest: "{{ hermes_soul_clone_dir }}"
    version: "{{ hermes_soul_version }}"
    update: true
    accept_newhostkey: true

- name: Install SOUL profile files from AI agent repository
  ansible.builtin.copy:
    src: "{{ hermes_soul_clone_dir }}/{{ item.src }}"
    dest: "{{ item.dest }}"
    remote_src: true
    owner: "{{ hermes_user }}"
    group: "{{ hermes_group }}"
    mode: "0600"
  loop: "{{ hermes_soul_files }}"
  when: not ansible_check_mode

# --- Dashboard (single instance pointing at hermes_dashboard_instance) ---

- name: Deploy Hermes dashboard systemd unit
  ansible.builtin.template:
    src: hermes-dashboard.service.j2
    dest: "/etc/systemd/system/{{ hermes_dashboard_service_name }}.service"
    owner: root
    group: root
    mode: "0644"
  notify: Restart hermes dashboard service

- name: Ensure Hermes dashboard service is enabled and running
  ansible.builtin.systemd:
    name: "{{ hermes_dashboard_service_name }}"
    enabled: true
    state: started
    daemon_reload: true

# --- Nginx reverse proxy for dashboard ---

- name: Install nginx and apache2-utils for Hermes dashboard proxy
  ansible.builtin.apt:
    name:
      - nginx
      - apache2-utils
    state: present
    lock_timeout: 600
  when: hermes_nginx_enable | bool

- name: Assert dashboard password is set when nginx auth is enabled
  ansible.builtin.assert:
    that:
      - vault_hermes_dashboard_password is defined
      - (vault_hermes_dashboard_password | length) > 0
    fail_msg: "Set vault_hermes_dashboard_password in vars/common/secrets.yaml when hermes_nginx_auth_enable is true"
  when: hermes_nginx_enable | bool and hermes_nginx_auth_enable | bool

- name: Deploy Hermes dashboard htpasswd file
  ansible.builtin.command:
    cmd: >-
      htpasswd -bc {{ hermes_nginx_htpasswd_file }}
      {{ hermes_nginx_auth_user | quote }}
      {{ vault_hermes_dashboard_password | quote }}
  when: hermes_nginx_enable | bool and hermes_nginx_auth_enable | bool
  notify: Reload nginx

- name: Set permissions on Hermes dashboard htpasswd file
  ansible.builtin.file:
    path: "{{ hermes_nginx_htpasswd_file }}"
    owner: root
    group: www-data
    mode: "0640"
  when: hermes_nginx_enable | bool and hermes_nginx_auth_enable | bool

- name: Ensure nginx SSL certificate directory exists
  ansible.builtin.file:
    path: "{{ hermes_nginx_ssl_cert_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"
  when: hermes_nginx_enable | bool and hermes_nginx_ssl_enable | bool

- name: Deploy nginx TLS certificate
  ansible.builtin.copy:
    dest: "{{ hermes_nginx_ssl_cert_file }}"
    content: "{{ vault_traefik_tls_cert }}"
    owner: root
    group: root
    mode: "0644"
  when: hermes_nginx_enable | bool and hermes_nginx_ssl_enable | bool
  notify: Reload nginx

- name: Deploy nginx TLS private key
  ansible.builtin.copy:
    dest: "{{ hermes_nginx_ssl_key_file }}"
    content: "{{ vault_traefik_tls_key }}"
    owner: root
    group: root
    mode: "0600"
  no_log: true
  when: hermes_nginx_enable | bool and hermes_nginx_ssl_enable | bool
  notify: Reload nginx

- name: Deploy Hermes nginx site config
  ansible.builtin.template:
    src: hermes-nginx.conf.j2
    dest: /etc/nginx/sites-available/hermes
    owner: root
    group: root
    mode: "0644"
  when: hermes_nginx_enable | bool
  notify: Reload nginx

- name: Enable Hermes nginx site
  ansible.builtin.file:
    src: /etc/nginx/sites-available/hermes
    dest: /etc/nginx/sites-enabled/hermes
    state: link
  when: hermes_nginx_enable | bool
  notify: Reload nginx

- name: Disable nginx default site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  when: hermes_nginx_enable | bool
  notify: Reload nginx

- name: Ensure nginx is enabled and running
  ansible.builtin.systemd:
    name: nginx
    enabled: true
    state: started
    daemon_reload: true
  when: hermes_nginx_enable | bool

# --- oMLX server monitor ---

- name: Ensure /etc/hermes directory exists
  ansible.builtin.file:
    path: /etc/hermes
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Ensure oMLX monitor state directory exists
  ansible.builtin.file:
    path: /var/lib/hermes-monitor
    state: directory
    owner: "{{ hermes_user }}"
    group: "{{ hermes_group }}"
    mode: "0755"
    recurse: true

- name: Ensure oMLX monitor log file exists
  ansible.builtin.file:
    path: /var/log/hermes-monitor.log
    state: touch
    owner: "{{ hermes_user }}"
    group: "{{ hermes_group }}"
    mode: "0644"
  changed_when: false

- name: Deploy oMLX monitor script
  ansible.builtin.copy:
    src: omlx-monitor.sh
    dest: /usr/local/bin/omlx-monitor.sh
    owner: root
    group: root
    mode: "0755"

- name: Deploy oMLX monitor environment file
  ansible.builtin.template:
    src: omlx-monitor.env.j2
    dest: /etc/hermes/omlx-monitor.env
    owner: root
    group: "{{ hermes_group }}"
    mode: "0640"

- name: Remove legacy root oMLX monitor cron job
  ansible.builtin.cron:
    name: "oMLX server status monitor"
    user: root
    state: absent

- name: Remove legacy root oMLX monitor daily heartbeat cron job
  ansible.builtin.cron:
    name: "oMLX server daily heartbeat"
    user: root
    state: absent

- name: Install oMLX monitor cron job
  ansible.builtin.cron:
    name: "oMLX server status monitor"
    minute: "*/5"
    job: >-
      . /etc/hermes/omlx-monitor.env && /usr/local/bin/omlx-monitor.sh
      >> /var/log/hermes-monitor.log 2>&1
    user: "{{ hermes_user }}"
    state: "{{ 'present' if hermes_omlx_monitor_enable | default(true) | bool else 'absent' }}"

- name: Install oMLX monitor daily heartbeat cron job
  ansible.builtin.cron:
    name: "oMLX server daily heartbeat"
    minute: "{{ hermes_omlx_monitor_heartbeat_minute }}"
    hour: "{{ hermes_omlx_monitor_heartbeat_hour }}"
    job: >-
      . /etc/hermes/omlx-monitor.env && /usr/local/bin/omlx-monitor.sh --heartbeat
      >> /var/log/hermes-monitor.log 2>&1
    user: "{{ hermes_user }}"
    state: "{{ 'present' if hermes_omlx_monitor_enable | default(true) | bool else 'absent' }}"
  when: hermes_omlx_monitor_heartbeat_enable | bool
