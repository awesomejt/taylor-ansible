---
- name: Ensure apt dependencies for Hermes repositories are installed
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - cifs-utils
      - gh
      - git
      - gnupg
      - software-properties-common
    state: present
    update_cache: true
    lock_timeout: 600

- name: Ensure Hermes role runs on Ubuntu hosts
  ansible.builtin.assert:
    that:
      - ansible_facts['distribution'] == "Ubuntu"
    fail_msg: "hermes role currently supports Ubuntu only"

- name: Ensure hermes group exists
  ansible.builtin.group:
    name: "{{ hermes_group }}"
    state: present
    system: true

- name: Ensure hermes user exists with SSH key
  ansible.builtin.user:
    name: "{{ hermes_user }}"
    group: "{{ hermes_group }}"
    system: true
    shell: /bin/bash
    home: "/home/{{ hermes_user }}"
    create_home: true
    generate_ssh_key: true
    ssh_key_type: "{{ hermes_ssh_key_type }}"
    ssh_key_bits: "{{ hermes_ssh_key_bits }}"
    ssh_key_comment: "{{ hermes_user }}@{{ inventory_hostname }}"
    state: present

- name: Determine whether deadsnakes PPA is needed for Python {{ hermes_python_version }}
  ansible.builtin.set_fact:
    hermes_use_deadsnakes_ppa: "{{ ansible_facts['distribution_version'] is version('26.04', '<') }}"

- name: Add deadsnakes PPA for Python {{ hermes_python_version }}
  ansible.builtin.apt_repository:
    repo: ppa:deadsnakes/ppa
    state: present
  when: hermes_use_deadsnakes_ppa | bool

- name: Install Python {{ hermes_python_version }} runtime packages
  ansible.builtin.apt:
    name:
      - "python{{ hermes_python_version }}"
      - "python{{ hermes_python_version }}-venv"
      - "python{{ hermes_python_version }}-dev"
    state: present
    update_cache: true
    lock_timeout: 600

- name: Create keyrings directory for APT repositories
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Download NodeSource repository key
  ansible.builtin.get_url:
    url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
    dest: /tmp/nodesource-repo.gpg.key
    mode: "0644"

- name: Convert NodeSource key to keyring format
  ansible.builtin.command:
    cmd: gpg --dearmor -o /etc/apt/keyrings/nodesource.gpg /tmp/nodesource-repo.gpg.key
  args:
    creates: /etc/apt/keyrings/nodesource.gpg

- name: Add NodeSource repository for Node.js {{ hermes_nodejs_major_version }}.x
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/nodesource.gpg] https://deb.nodesource.com/node_{{ hermes_nodejs_major_version }}.x nodistro main"
    filename: nodesource
    state: present

- name: Install Node.js {{ hermes_nodejs_major_version }} LTS
  ansible.builtin.apt:
    name: nodejs
    state: present
    update_cache: true
    lock_timeout: 600

- name: Upgrade npm to latest
  ansible.builtin.command:
    cmd: npm install -g npm@latest
  register: _hermes_npm_upgrade
  changed_when: "'up to date' not in (_hermes_npm_upgrade.stdout | default(''))"

- name: Install uv toolchain manager
  ansible.builtin.get_url:
    url: https://astral.sh/uv/install.sh
    dest: /tmp/uv-installer.sh
    mode: "0755"
  when: hermes_install_uv | bool

- name: Install uv into /usr/local/bin
  ansible.builtin.command:
    cmd: /tmp/uv-installer.sh
  environment:
    UV_INSTALL_DIR: /usr/local/bin
  args:
    creates: /usr/local/bin/uv
  when: hermes_install_uv | bool

- name: Grant hermes user sudo rights
  ansible.builtin.copy:
    dest: /etc/sudoers.d/hermes
    content: "{{ hermes_user }} ALL=(ALL) {% if hermes_sudo_nopasswd | bool %}NOPASSWD:{% endif %}ALL\n"
    owner: root
    group: root
    mode: "0440"
    validate: "visudo -cf %s"

- name: Configure Hermes git user.name
  become_user: "{{ hermes_user }}"
  ansible.builtin.command:
    cmd: "git config --global user.name {{ hermes_git_user_name | quote }}"
  changed_when: false

- name: Configure Hermes git user.email
  become_user: "{{ hermes_user }}"
  ansible.builtin.command:
    cmd: "git config --global user.email {{ hermes_git_user_email | quote }}"
  changed_when: false

- name: Build effective Hermes profile list
  ansible.builtin.set_fact:
    hermes_profiles_effective: "{{ hermes_profiles if (hermes_profiles | default([]) | length > 0) else (hermes_instances | default([])) }}"

- name: Build effective Hermes dashboard profile
  ansible.builtin.set_fact:
    hermes_dashboard_profile_effective: "{{ hermes_primary_profile if (hermes_primary_profile | default('') | length > 0) else (hermes_dashboard_instance | default('default')) }}"

- name: Validate Hermes profile list is non-empty
  ansible.builtin.assert:
    that:
      - hermes_profiles_effective | length > 0
    fail_msg: "Define at least one entry in hermes_profiles (preferred) or hermes_instances (legacy) in vars/common/vars.yaml"

- name: Ensure Hermes install directory exists
  ansible.builtin.file:
    path: "{{ hermes_install_dir }}"
    state: directory
    owner: "{{ hermes_user }}"
    group: "{{ hermes_group }}"
    mode: "0755"

- name: Ensure Hermes workspace directory exists
  ansible.builtin.file:
    path: "{{ hermes_workspace_dir }}"
    state: directory
    owner: "{{ hermes_user }}"
    group: "{{ hermes_group }}"
    mode: "0755"

- name: Ensure CIFS mount point directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ hermes_user }}"
    group: "{{ hermes_group }}"
    mode: "0755"
  loop: "{{ hermes_cifs_shares }}"

- name: Verify CIFS credentials file exists
  ansible.builtin.stat:
    path: "{{ hermes_cifs_credentials_file }}"
  register: hermes_cifs_credentials_file_stat

- name: Assert CIFS credentials file exists before mounting
  ansible.builtin.assert:
    that:
      - hermes_cifs_credentials_file_stat.stat.exists
      - hermes_cifs_credentials_file_stat.stat.isreg
    fail_msg: "Missing CIFS credentials file at {{ hermes_cifs_credentials_file }}"

- name: Configure and mount Hermes CIFS shares
  ansible.posix.mount:
    path: "{{ item.path }}"
    src: "{{ item.src }}"
    fstype: cifs
    opts: "{{ item.opts }}"
    state: mounted
  loop: "{{ hermes_cifs_shares }}"

- name: Ensure Hermes config directory exists
  ansible.builtin.file:
    path: "{{ hermes_config_dir }}"
    state: directory
    owner: "{{ hermes_user }}"
    group: "{{ hermes_group }}"
    mode: "0700"

- name: Clone Hermes agent repository
  become_user: "{{ hermes_user }}"
  ansible.builtin.git:
    repo: "{{ hermes_git_repo }}"
    dest: "{{ hermes_install_dir }}"
    version: "{{ hermes_git_version }}"
    update: true

- name: Ensure Hermes virtualenv exists
  become_user: "{{ hermes_user }}"
  ansible.builtin.command:
    cmd: "python{{ hermes_python_version }} -m venv {{ hermes_venv_dir }}"
  args:
    creates: "{{ hermes_venv_dir }}/bin/activate"

- name: Install Hermes agent into virtualenv
  become_user: "{{ hermes_user }}"
  ansible.builtin.pip:
    name: "{{ '.' ~ ('[' ~ hermes_python_extras ~ ']' if (hermes_python_extras | default('') | length > 0) else '') }}"
    chdir: "{{ hermes_install_dir }}"
    editable: true
    virtualenv: "{{ hermes_venv_dir }}"
    virtualenv_command: "python{{ hermes_python_version }} -m venv"

- name: Link Hermes CLI into /usr/local/bin
  ansible.builtin.file:
    src: "{{ hermes_venv_dir }}/bin/hermes"
    dest: /usr/local/bin/hermes
    state: link
    force: true

- name: Stop and disable legacy single-instance gateway services
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: false
    state: stopped
    daemon_reload: true
  loop:
    - hermes-gateway
    - hermes
  failed_when: false

# --- Per-profile config, env, and optional gateway service ---

- name: Deploy per-profile Hermes config, env, and optional gateway service
  ansible.builtin.include_tasks: instance.yaml
  loop: "{{ hermes_profiles_effective }}"
  loop_control:
    loop_var: hermes_instance
    label: "{{ hermes_instance.name }}"

- name: Deploy GitHub credential file for Hermes user
  ansible.builtin.template:
    src: netrc.j2
    dest: "{{ hermes_home_dir }}/.netrc"
    owner: "{{ hermes_user }}"
    group: "{{ hermes_group }}"
    mode: "0600"

- name: Clone AI agent profile repository
  become_user: "{{ hermes_user }}"
  ansible.builtin.git:
    repo: "https://github.com/awesomejt/ai-agents.git"
    dest: "{{ hermes_soul_clone_dir }}"
    version: "{{ hermes_soul_version }}"
    update: true
    accept_newhostkey: true

- name: Install SOUL profile files from AI agent repository
  ansible.builtin.copy:
    src: "{{ hermes_soul_clone_dir }}/{{ item.src }}"
    dest: "{{ item.dest }}"
    remote_src: true
    owner: "{{ hermes_user }}"
    group: "{{ hermes_group }}"
    mode: "0600"
  loop: "{{ hermes_soul_files }}"
  when: not ansible_check_mode

# --- Dashboard (single instance pointing at hermes_dashboard_instance) ---

- name: Deploy Hermes dashboard systemd unit
  ansible.builtin.template:
    src: hermes-dashboard.service.j2
    dest: "/etc/systemd/system/{{ hermes_dashboard_service_name }}.service"
    owner: root
    group: root
    mode: "0644"
  notify: Restart hermes dashboard service

- name: Ensure Hermes dashboard service is enabled and running
  ansible.builtin.systemd:
    name: "{{ hermes_dashboard_service_name }}"
    enabled: true
    state: started
    daemon_reload: true

# --- Nginx reverse proxy for dashboard ---

- name: Install nginx and apache2-utils for Hermes dashboard proxy
  ansible.builtin.apt:
    name:
      - nginx
      - apache2-utils
    state: present
    lock_timeout: 600
  when: hermes_nginx_enable | bool

- name: Assert dashboard password is set when nginx auth is enabled
  ansible.builtin.assert:
    that:
      - vault_hermes_dashboard_password is defined
      - (vault_hermes_dashboard_password | length) > 0
    fail_msg: "Set vault_hermes_dashboard_password in vars/common/secrets.yaml when hermes_nginx_auth_enable is true"
  when: hermes_nginx_enable | bool and hermes_nginx_auth_enable | bool

- name: Deploy Hermes dashboard htpasswd file
  ansible.builtin.command:
    cmd: >-
      htpasswd -bc {{ hermes_nginx_htpasswd_file }}
      {{ hermes_nginx_auth_user | quote }}
      {{ vault_hermes_dashboard_password | quote }}
  when: hermes_nginx_enable | bool and hermes_nginx_auth_enable | bool
  notify: Reload nginx

- name: Set permissions on Hermes dashboard htpasswd file
  ansible.builtin.file:
    path: "{{ hermes_nginx_htpasswd_file }}"
    owner: root
    group: www-data
    mode: "0640"
  when: hermes_nginx_enable | bool and hermes_nginx_auth_enable | bool

- name: Deploy Hermes nginx site config
  ansible.builtin.template:
    src: hermes-nginx.conf.j2
    dest: /etc/nginx/sites-available/hermes
    owner: root
    group: root
    mode: "0644"
  when: hermes_nginx_enable | bool
  notify: Reload nginx

- name: Enable Hermes nginx site
  ansible.builtin.file:
    src: /etc/nginx/sites-available/hermes
    dest: /etc/nginx/sites-enabled/hermes
    state: link
  when: hermes_nginx_enable | bool
  notify: Reload nginx

- name: Disable nginx default site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  when: hermes_nginx_enable | bool
  notify: Reload nginx

- name: Ensure nginx is enabled and running
  ansible.builtin.systemd:
    name: nginx
    enabled: true
    state: started
    daemon_reload: true
  when: hermes_nginx_enable | bool
