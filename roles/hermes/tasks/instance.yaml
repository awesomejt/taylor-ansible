---
- name: "[{{ hermes_instance.name }}] Ensure Hermes profile home directory exists"
  ansible.builtin.file:
    path: "{{ hermes_config_dir }}/profiles/{{ hermes_instance.name }}"
    state: directory
    owner: "{{ hermes_user }}"
    group: "{{ hermes_group }}"
    mode: "0700"

- name: "[{{ hermes_instance.name }}] Check for shared Hermes auth files"
  ansible.builtin.stat:
    path: "{{ hermes_shared_auth_source_dir }}/{{ item }}"
  loop:
    - auth.json
    - auth.lock
  register: hermes_shared_auth_files

- name: "[{{ hermes_instance.name }}] Share Hermes auth files from default profile"
  ansible.builtin.file:
    src: "{{ hermes_shared_auth_source_dir }}/{{ item.item }}"
    dest: "{{ hermes_config_dir }}/profiles/{{ hermes_instance.name }}/{{ item.item }}"
    state: link
    force: true
    owner: "{{ hermes_user }}"
    group: "{{ hermes_group }}"
  loop: "{{ hermes_shared_auth_files.results }}"
  when:
    - hermes_shared_auth_source_dir | default('') | length > 0
    - hermes_shared_auth_source_dir != (hermes_config_dir ~ '/profiles/' ~ hermes_instance.name)
    - item.stat.exists

- name: "[{{ hermes_instance.name }}] Deploy Hermes config.yaml"
  ansible.builtin.template:
    src: hermes-config.yaml.j2
    dest: "{{ hermes_config_dir }}/profiles/{{ hermes_instance.name }}/config.yaml"
    owner: "{{ hermes_user }}"
    group: "{{ hermes_group }}"
    mode: "0600"
  notify:
    - Restart all hermes gateway services
    - Restart hermes dashboard service

- name: "[{{ hermes_instance.name }}] Deploy Hermes .env file"
  ansible.builtin.template:
    src: hermes.env.j2
    dest: "{{ hermes_config_dir }}/profiles/{{ hermes_instance.name }}/.env"
    owner: "{{ hermes_user }}"
    group: "{{ hermes_group }}"
    mode: "0600"
  notify: Restart all hermes gateway services

- name: "[{{ hermes_instance.name }}] Deploy Hermes gateway systemd unit"
  ansible.builtin.template:
    src: hermes-gateway.service.j2
    dest: "/etc/systemd/system/hermes-gateway-{{ hermes_instance.name }}.service"
    owner: root
    group: root
    mode: "0644"
  notify: Restart all hermes gateway services
  when: hermes_instance.gateway_enabled | default(true) | bool

- name: "[{{ hermes_instance.name }}] Ensure gateway service is enabled and running"
  ansible.builtin.systemd:
    name: "hermes-gateway-{{ hermes_instance.name }}"
    enabled: true
    state: started
    daemon_reload: true
  when: hermes_instance.gateway_enabled | default(true) | bool

- name: "[{{ hermes_instance.name }}] Ensure gateway service is stopped and disabled when not enabled"
  ansible.builtin.systemd:
    name: "hermes-gateway-{{ hermes_instance.name }}"
    enabled: false
    state: stopped
  failed_when: false
  when: not (hermes_instance.gateway_enabled | default(true) | bool)

- name: "[{{ hermes_instance.name }}] Remove gateway systemd unit when not enabled"
  ansible.builtin.file:
    path: "/etc/systemd/system/hermes-gateway-{{ hermes_instance.name }}.service"
    state: absent
  register: hermes_gateway_unit_removed
  when: not (hermes_instance.gateway_enabled | default(true) | bool)

- name: "[{{ hermes_instance.name }}] Reload systemd after removing gateway unit"
  ansible.builtin.systemd:
    daemon_reload: true
  when:
    - not (hermes_instance.gateway_enabled | default(true) | bool)
    - hermes_gateway_unit_removed is defined
    - hermes_gateway_unit_removed.changed

- name: "[{{ hermes_instance.name }}] Clear stale failed state for removed gateway unit"
  ansible.builtin.command: "systemctl reset-failed hermes-gateway-{{ hermes_instance.name }}.service"
  changed_when: false
  failed_when: false
  when: not (hermes_instance.gateway_enabled | default(true) | bool)
