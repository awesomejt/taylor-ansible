---
# Hermes Agent by Nous Research
# https://github.com/NousResearch/hermes-agent

# System user for Hermes service
hermes_user: hermes
hermes_group: hermes
hermes_uid: 1500
hermes_gid: 1500

# Installation paths
hermes_install_dir: /opt/hermes
# Data directory maps to ~/.hermes inside the container (/opt/data)
hermes_data_dir: /var/lib/hermes

# Hermes systemd service name
hermes_service_name: hermes
hermes_service_description: "Hermes AI Agent (Nous Research)"

# Source repository — image is built from source, no pre-built image exists
hermes_git_repo: "https://github.com/NousResearch/hermes-agent.git"
hermes_git_version: "main"

# LLM configuration — set in config.yaml, overridable here for vars.yaml
# Model string format: "provider/model" for OpenRouter, or "model" for direct
hermes_default_model: "anthropic/claude-opus-4.6"
hermes_model_provider: "auto"  # auto | openrouter | nous | anthropic | custom

# Terminal backend for agent tool execution
# Options: local, docker, ssh, modal, singularity, daytona
hermes_terminal_backend: "docker"

# Dashboard port (web UI — localhost only, proxied via Nginx)
hermes_dashboard_port: 9119

# Gateway (messaging platform) — runs as a separate Docker service
hermes_gateway_enabled: true

# Messaging platform toggles — set tokens in secrets.yaml when enabling
hermes_telegram_enabled: false
hermes_telegram_allowed_users: []    # List of Telegram user IDs
hermes_telegram_home_channel: ""     # Optional default channel for cron delivery

hermes_discord_enabled: false
hermes_discord_allowed_users: []     # List of Discord user IDs

hermes_slack_enabled: false
# Slack requires both a bot token and app token (for Socket Mode)

# Nginx reverse proxy — exposes dashboard at a clean URL
# SECURITY: Dashboard stores API keys. Auth is strongly recommended.
hermes_nginx_enable: true
hermes_nginx_server_name: "hermes.taylor.lan"
hermes_nginx_http_port: 80
hermes_nginx_https_port: 443
hermes_nginx_ssl_enable: false
hermes_nginx_ssl_cert_path: ""
hermes_nginx_ssl_key_path: ""

# HTTP Basic Auth for dashboard proxy (protects stored API keys)
hermes_nginx_auth_enable: true
hermes_nginx_auth_user: "admin"

# Docker restart policy
hermes_docker_restart_policy: unless-stopped
