---
# Dedicated service user and group
hermes_user: "hermes"
hermes_group: "hermes"
hermes_ssh_key_type: "rsa"
hermes_ssh_key_bits: 4096

# Runtime selection
hermes_python_version: "3.14"
hermes_nodejs_major_version: "24"

# Install uv package manager for Python projects
hermes_install_uv: true

# User privilege configuration
hermes_sudo_nopasswd: true
hermes_git_user_name: "Rogue Daemon"
hermes_git_user_email: "hermes@jasongtaylor.com"

# Hermes source/install paths
hermes_install_dir: "/opt/hermes-agent"
hermes_venv_dir: "{{ hermes_install_dir }}/venv"
hermes_home_dir: "/home/{{ hermes_user }}"
hermes_config_dir: "{{ hermes_home_dir }}/.hermes"
hermes_workspace_dir: "{{ hermes_home_dir }}/workspace"

# SOUL profiles source repository and destination mapping.
# hermes_soul_repo is unused — the git task embeds vault_hermes_gh_token directly.
hermes_soul_version: "main"
hermes_soul_clone_dir: "{{ hermes_home_dir }}/ai-agents"
hermes_soul_files:
  - src: "main/SOUL.md"
    dest: "{{ hermes_config_dir }}/SOUL.md"
  - src: "main/SOUL.md"
    dest: "{{ hermes_home_dir }}/.hermes-chat/SOUL.md"
  - src: "researcher/SOUL.md"
    dest: "{{ hermes_home_dir }}/.hermes-research/SOUL.md"
  - src: "coder/SOUL.md"
    dest: "{{ hermes_home_dir }}/.hermes-coding/SOUL.md"

# Hermes package install extras.
# Use the smallest set needed for the dashboard and Discord gateway.
# Avoid "all" because it pulls optional matrix extras that require local
# build tooling (python-olm/libolm).
hermes_python_extras: "web,messaging"

# Multi-instance Hermes deployment.
# Each instance gets its own HERMES_HOME, gateway service, and cron scheduler.
# Override hermes_instances in vars/common/vars.yaml with the real instance list.
hermes_dashboard_instance: "default"
hermes_instances:
  - name: default
    provider: "custom"
    base_url: "http://127.0.0.1:11434/v1"
    model: "llama3.1:latest"
    discord_enabled: false
    discord_require_mention: true
    discord_home_channel: ""
    fallback_providers: []

# Terminal backend for tool execution
hermes_terminal_backend: "local"
hermes_terminal_timeout: 180
hermes_terminal_lifetime_seconds: 300

# LLM request behavior tuning (helps fail over quickly when a primary endpoint stalls)
hermes_api_timeout_seconds: 45
hermes_api_stale_timeout_seconds: 60
hermes_api_max_retries: 1
hermes_omlx_api_key: "example"
hermes_shared_auth_source_dir: "{{ hermes_home_dir }}/.hermes"

# Shared Discord settings applied to all Discord-enabled instances.
hermes_discord_allowed_users: []
hermes_discord_server_id: ""
hermes_discord_shared_channels: []

# Gateway and dashboard service settings
hermes_dashboard_service_name: "hermes-dashboard"
hermes_dashboard_host: "127.0.0.1"
hermes_dashboard_port: 9119
hermes_dashboard_no_open: true

# Nginx reverse proxy for Hermes dashboard
hermes_nginx_enable: false
hermes_nginx_server_name: "{{ inventory_hostname }}"
hermes_nginx_http_port: 80
hermes_nginx_https_port: 443
hermes_nginx_ssl_enable: false
hermes_nginx_auth_enable: false
hermes_nginx_auth_user: "admin"
hermes_nginx_htpasswd_file: "/etc/nginx/hermes.htpasswd"

# CIFS mounts for shared Hermes content.
hermes_cifs_credentials_file: "/etc/samba/credentials/nas"
hermes_cifs_shares:
  - path: "/mnt/hermes"
    src: "//192.168.50.10/Hermes"
    opts: "credentials={{ hermes_cifs_credentials_file }},uid={{ hermes_user }},gid={{ hermes_group }},iocharset=utf8,vers=3.1.1,_netdev,nofail,x-systemd.automount,x-systemd.idle-timeout=5min,rw"
  - path: "/mnt/content"
    src: "//192.168.50.4/Content"
    opts: "credentials={{ hermes_cifs_credentials_file }},uid={{ hermes_user }},gid={{ hermes_group }},iocharset=utf8,vers=3.1.1,_netdev,nofail,x-systemd.automount,x-systemd.idle-timeout=5min,ro"
  - path: "/mnt/recordings"
    src: "//192.168.50.10/Recordings"
    opts: "credentials={{ hermes_cifs_credentials_file }},uid={{ hermes_user }},gid={{ hermes_group }},iocharset=utf8,vers=3.1.1,_netdev,nofail,x-systemd.automount,ro"
