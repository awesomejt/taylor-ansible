---
- name: Restart all hermes gateway services
  ansible.builtin.systemd:
    name: "hermes-gateway-{{ item.name }}"
    state: restarted
    daemon_reload: true
  loop: "{{ hermes_instances }}"
  loop_control:
    label: "{{ item.name }}"

- name: Restart hermes dashboard service
  ansible.builtin.systemd:
    name: "{{ hermes_dashboard_service_name }}"
    state: restarted
    daemon_reload: true
