---
- name: Ensure role runs on Debian-family systems
  ansible.builtin.assert:
    that:
      - ansible_facts['os_family'] == "Debian"
    fail_msg: "portainer role currently supports Debian/Ubuntu only"

- name: Ensure Portainer directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ portainer_primary_user }}"
    group: "{{ portainer_primary_user }}"
    mode: "0755"
  loop:
    - "{{ portainer_project_dir }}"
    - "{{ portainer_data_dir }}"

- name: Deploy Portainer Docker Compose file
  ansible.builtin.template:
    src: compose.yaml.j2
    dest: "{{ portainer_compose_file }}"
    owner: "{{ portainer_primary_user }}"
    group: "{{ portainer_primary_user }}"
    mode: "0644"
  notify: Restart portainer service

- name: Deploy Portainer systemd unit
  ansible.builtin.template:
    src: portainer.service.j2
    dest: "{{ portainer_systemd_unit_path }}"
    owner: root
    group: root
    mode: "0644"
  notify: Restart portainer service

- name: Ensure Portainer service is enabled and running
  ansible.builtin.systemd:
    name: "{{ portainer_systemd_unit }}"
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for Portainer to be ready
  ansible.builtin.uri:
    url: "http://127.0.0.1/"
    headers:
      Host: "{{ portainer_traefik_hostname }}"
    status_code:
      - 200
      - 301
      - 302
      - 307
      - 308
  register: portainer_ready
  until: portainer_ready is succeeded
  retries: 24
  delay: 5
