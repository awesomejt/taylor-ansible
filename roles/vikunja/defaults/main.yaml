---
vikunja_primary_user: root
vikunja_project_name: vikunja
vikunja_project_dir: "/opt/vikunja"
vikunja_compose_file: "{{ vikunja_project_dir }}/compose.yaml"

vikunja_image: vikunja/vikunja:latest
vikunja_container_name: vikunja
vikunja_restart_policy: unless-stopped

vikunja_files_dir: "{{ vikunja_project_dir }}/files"
vikunja_db_dir: "{{ vikunja_project_dir }}/db"

# Vikunja container defaults to uid 1000.
vikunja_container_uid: "1000"
vikunja_container_gid: "1000"

vikunja_service_public_url: "https://kanban.taylor.lan/"
vikunja_service_secret: "{{ vault_vikunja_service_secret | default('change-me') }}"
vikunja_service_enable_registration: false

# Authentication
vikunja_auth_local_enabled: true
vikunja_auth_ldap_enabled: true
vikunja_auth_ldap_host: lldap
vikunja_auth_ldap_port: 3890
vikunja_auth_ldap_basedn: "dc=taylor,dc=lan"
vikunja_auth_ldap_userfilter: "(uid=%[1]s)"
vikunja_auth_ldap_usetls: false
vikunja_auth_ldap_verifytls: false
vikunja_auth_ldap_binddn: "cn=admin,ou=people,dc=taylor,dc=lan"
vikunja_auth_ldap_bindpassword: "{{ vault_lldap_ldap_user_pass | default('change-me') }}"

# Use common/prod PostgreSQL by default.
vikunja_database_type: postgres
vikunja_database_host: 192.168.50.15
vikunja_database_port: 5432
vikunja_database_name: vikunja
vikunja_database_user: vikunja
vikunja_database_password: "{{ vault_vikunja_db_password | default('change-me') }}"
# Keep sqlite path for optional local override.
vikunja_database_path: /db/vikunja.db

# Traefik integration
vikunja_network_name: traefik_proxy
vikunja_traefik_hostname: "kanban.taylor.lan"
vikunja_traefik_entrypoint: websecure

vikunja_systemd_unit: vikunja.service
vikunja_systemd_unit_path: "/etc/systemd/system/{{ vikunja_systemd_unit }}"
