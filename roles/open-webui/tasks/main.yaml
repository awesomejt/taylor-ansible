- name: Ensure role runs on Debian-family systems
  ansible.builtin.assert:
    that:
      - ansible_facts['os_family'] == "Debian"
    fail_msg: "open-webui role currently supports Debian/Ubuntu only"

- name: Ensure Open WebUI project directory exists
  ansible.builtin.file:
    path: "{{ openwebui_project_dir }}"
    state: directory
    owner: "{{ openwebui_primary_user }}"
    group: "{{ openwebui_primary_user }}"
    mode: "0750"

- name: Ensure Open WebUI data directory exists
  ansible.builtin.file:
    path: "{{ openwebui_data_dir }}"
    state: directory
    owner: "{{ openwebui_primary_user }}"
    group: "{{ openwebui_primary_user }}"
    mode: "0750"

- name: Ensure Open WebUI nginx config directory exists
  ansible.builtin.file:
    path: "{{ openwebui_nginx_conf_dir }}"
    state: directory
    owner: "{{ openwebui_primary_user }}"
    group: "{{ openwebui_primary_user }}"
    mode: "0750"
  when: openwebui_nginx_enable | bool

- name: Ensure Open WebUI ollama proxy config directory exists
  ansible.builtin.file:
    path: "{{ openwebui_ollama_proxy_conf_dir }}"
    state: directory
    owner: "{{ openwebui_primary_user }}"
    group: "{{ openwebui_primary_user }}"
    mode: "0750"
  when: openwebui_ollama_failover_enabled | bool

- name: Ensure Ollama failover endpoints are set when failover is enabled
  ansible.builtin.assert:
    that:
      - (openwebui_ollama_primary_base_url | string | length) > 0
      - (openwebui_ollama_fallback_base_url | string | length) > 0
    fail_msg: "Set openwebui_ollama_primary_base_url and openwebui_ollama_fallback_base_url when openwebui_ollama_failover_enabled=true."
  when: openwebui_ollama_failover_enabled | bool

- name: Ensure Open WebUI SSL certificate is present when HTTPS is enabled
  ansible.builtin.assert:
    that:
      - (openwebui_nginx_ssl_cert_path | string | length) > 0
      - (openwebui_nginx_ssl_key_path | string | length) > 0
    fail_msg: "Set openwebui_nginx_ssl_cert_path and openwebui_nginx_ssl_key_path when enabling HTTPS."
  when: openwebui_nginx_enable | bool and openwebui_nginx_ssl_enable | bool

- name: Deploy Open WebUI nginx reverse proxy configuration
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: "{{ openwebui_nginx_conf_path }}"
    owner: "{{ openwebui_primary_user }}"
    group: "{{ openwebui_primary_user }}"
    mode: "0640"
  when: openwebui_nginx_enable | bool
  notify: Restart open-webui service

- name: Deploy Open WebUI ollama failover proxy configuration
  ansible.builtin.template:
    src: ollama-proxy.conf.j2
    dest: "{{ openwebui_ollama_proxy_conf_path }}"
    owner: "{{ openwebui_primary_user }}"
    group: "{{ openwebui_primary_user }}"
    mode: "0640"
  when: openwebui_ollama_failover_enabled | bool
  notify: Restart open-webui service

- name: Deploy Open WebUI compose file
  ansible.builtin.template:
    src: compose.yaml.j2
    dest: "{{ openwebui_compose_file }}"
    owner: "{{ openwebui_primary_user }}"
    group: "{{ openwebui_primary_user }}"
    mode: "0640"
  notify: Restart open-webui service

- name: Deploy Open WebUI environment file
  ansible.builtin.copy:
    dest: "{{ openwebui_env_file }}"
    content: "# Open WebUI environment overrides\n# This file is not overwritten on subsequent runs.\n"
    owner: "{{ openwebui_primary_user }}"
    group: "{{ openwebui_primary_user }}"
    mode: "0640"
    force: false

- name: Deploy Open WebUI systemd unit
  ansible.builtin.template:
    src: open-webui.service.j2
    dest: "{{ openwebui_systemd_unit_path }}"
    owner: root
    group: root
    mode: "0644"
  notify: Restart open-webui service

- name: Ensure Open WebUI service is enabled and running
  ansible.builtin.systemd:
    name: "{{ openwebui_systemd_unit }}"
    enabled: true
    state: started
    daemon_reload: true

- name: Check Ollama primary endpoint health (failover mode)
  ansible.builtin.uri:
    url: "{{ openwebui_ollama_primary_base_url | regex_replace('/+$', '') }}{{ openwebui_ollama_healthcheck_path }}"
    method: GET
    status_code: 200
    return_content: false
    timeout: "{{ openwebui_ollama_healthcheck_timeout }}"
  register: openwebui_ollama_primary_health
  failed_when: false
  changed_when: false
  when:
    - openwebui_ollama_healthcheck_enabled | bool
    - openwebui_ollama_failover_enabled | bool

- name: Check Ollama fallback endpoint health (failover mode)
  ansible.builtin.uri:
    url: "{{ openwebui_ollama_fallback_base_url | regex_replace('/+$', '') }}{{ openwebui_ollama_healthcheck_path }}"
    method: GET
    status_code: 200
    return_content: false
    timeout: "{{ openwebui_ollama_healthcheck_timeout }}"
  register: openwebui_ollama_fallback_health
  failed_when: false
  changed_when: false
  when:
    - openwebui_ollama_healthcheck_enabled | bool
    - openwebui_ollama_failover_enabled | bool

- name: Assert at least one Ollama endpoint is healthy (failover mode)
  ansible.builtin.assert:
    that:
      - (openwebui_ollama_primary_health.status | default(0) | int) == 200 or (openwebui_ollama_fallback_health.status | default(0) | int) == 200
    fail_msg: "Both Ollama endpoints are unhealthy: primary={{ openwebui_ollama_primary_base_url }}, fallback={{ openwebui_ollama_fallback_base_url }}"
  when:
    - openwebui_ollama_healthcheck_enabled | bool
    - openwebui_ollama_failover_enabled | bool
    - openwebui_ollama_healthcheck_fail_when_all_down | bool

- name: Check Ollama endpoint health (single-endpoint mode)
  ansible.builtin.uri:
    url: "{{ openwebui_ollama_base_url | regex_replace('/+$', '') }}{{ openwebui_ollama_healthcheck_path }}"
    method: GET
    status_code: 200
    return_content: false
    timeout: "{{ openwebui_ollama_healthcheck_timeout }}"
  register: openwebui_ollama_single_health
  failed_when: false
  changed_when: false
  when:
    - openwebui_ollama_healthcheck_enabled | bool
    - not (openwebui_ollama_failover_enabled | bool)

- name: Assert Ollama endpoint is healthy (single-endpoint mode)
  ansible.builtin.assert:
    that:
      - (openwebui_ollama_single_health.status | default(0) | int) == 200
    fail_msg: "Ollama endpoint is unhealthy: {{ openwebui_ollama_base_url }}"
  when:
    - openwebui_ollama_healthcheck_enabled | bool
    - not (openwebui_ollama_failover_enabled | bool)
    - openwebui_ollama_healthcheck_fail_when_all_down | bool
