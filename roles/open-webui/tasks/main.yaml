---
- name: Ensure role runs on Debian-family systems
  ansible.builtin.assert:
    that:
      - ansible_facts['os_family'] == "Debian"
    fail_msg: "open-webui role currently supports Debian/Ubuntu only"

- name: Ensure LDAP bind password is set when LDAP auth is enabled
  ansible.builtin.assert:
    that:
      - openwebui_ldap_app_password != 'change-me'
    fail_msg: "Set vault_lldap_ldap_user_pass in vars/common/secrets.yaml before enabling Open WebUI LDAP auth"
  when: openwebui_auth_ldap_enabled | bool

- name: Ensure Open WebUI directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ openwebui_primary_user }}"
    group: "{{ openwebui_primary_user }}"
    mode: "0755"
  loop:
    - "{{ openwebui_project_dir }}"
    - "{{ openwebui_data_dir }}"
  loop_control:
    label: "{{ item }}"

- name: Deploy Open WebUI Docker Compose file
  ansible.builtin.template:
    src: compose.yaml.j2
    dest: "{{ openwebui_compose_file }}"
    owner: "{{ openwebui_primary_user }}"
    group: "{{ openwebui_primary_user }}"
    mode: "0644"
  notify: Restart open-webui service

- name: Deploy Open WebUI systemd unit
  ansible.builtin.template:
    src: open-webui.service.j2
    dest: "{{ openwebui_systemd_unit_path }}"
    owner: root
    group: root
    mode: "0644"
  notify: Restart open-webui service

- name: Ensure Open WebUI service is enabled and running
  ansible.builtin.systemd:
    name: "{{ openwebui_systemd_unit }}"
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for Open WebUI to be ready
  ansible.builtin.uri:
    url: "http://127.0.0.1/"
    headers:
      Host: "{{ openwebui_traefik_hostname }}"
    status_code:
      - 200
      - 404
      - 301
      - 302
      - 307
      - 308
  register: openwebui_ready
  until: openwebui_ready is succeeded
  retries: 24
  delay: 5
