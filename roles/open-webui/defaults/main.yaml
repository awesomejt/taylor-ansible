---
openwebui_primary_user: root
openwebui_project_name: open-webui
openwebui_project_dir: "/opt/open-webui"
openwebui_compose_file: "{{ openwebui_project_dir }}/compose.yaml"

openwebui_image: ghcr.io/open-webui/open-webui:v0.9.5
openwebui_container_name: open-webui
openwebui_restart_policy: unless-stopped

openwebui_data_dir: "{{ openwebui_project_dir }}/data"

openwebui_webui_base_url: "http://openwebui.taylor.lan"

# LiteLLM connection (via shared traefik_proxy network)
openwebui_openai_base_url: "http://litellm:4000/v1"
openwebui_openai_api_key: "{{ litellm_master_key | default('change-me') }}"

# SearXNG connection (via shared traefik_proxy network)
openwebui_searxng_query_url: "http://searxng:8080/search?q=<query>&format=json"

# Qdrant connection (via shared traefik_proxy network)
openwebui_qdrant_endpoint: "http://qdrant:6333"
openwebui_qdrant_collection_prefix: open-webui

# Ollama (direct host IP access for model loading)
openwebui_ollama_base_url: "http://192.168.50.51:11434"

# Traefik integration
openwebui_network_name: traefik_proxy
openwebui_traefik_hostname: "openwebui.taylor.lan"
openwebui_traefik_entrypoint: web

openwebui_systemd_unit: open-webui.service
openwebui_systemd_unit_path: "/etc/systemd/system/{{ openwebui_systemd_unit }}"
