---
openwebui_primary_user: root
openwebui_project_name: open-webui
openwebui_project_dir: "/opt/open-webui"
openwebui_compose_file: "{{ openwebui_project_dir }}/compose.yaml"

openwebui_image: ghcr.io/open-webui/open-webui:v0.9.5
openwebui_container_name: open-webui
openwebui_restart_policy: unless-stopped

openwebui_data_dir: "{{ openwebui_project_dir }}/data"

openwebui_webui_base_url: "http://chat.taylor.lan"

# Authentication: LDAP (free, built-in Open WebUI capability)
openwebui_auth_ldap_enabled: true
openwebui_ldap_server_label: "LLDAP"
openwebui_ldap_server_host: "lldap"
openwebui_ldap_server_port: 3890
openwebui_ldap_attribute_for_mail: "mail"
openwebui_ldap_attribute_for_username: "uid"
openwebui_ldap_search_base: "ou=people,dc=taylor,dc=lan"
openwebui_ldap_search_filter: ""
openwebui_ldap_app_dn: "cn=admin,ou=people,dc=taylor,dc=lan"
openwebui_ldap_app_password: "{{ vault_lldap_ldap_user_pass | default('change-me') }}"
openwebui_ldap_use_tls: false
openwebui_ldap_validate_cert: false
openwebui_ldap_ciphers: "ALL"
openwebui_ldap_group_management_enabled: false
openwebui_ldap_group_creation_enabled: false
openwebui_ldap_attribute_for_groups: "memberOf"

# LiteLLM connection (via shared traefik_proxy network)
openwebui_openai_base_url: "http://litellm:4000/v1"
openwebui_openai_api_key: "{{ vault_litellm_master_key | default(vault_openwebui_litellm_master_key | default('change-me')) }}"

# Optional direct OpenAI-compatible provider testing endpoints
openwebui_omlx_primary_base_url: "http://192.168.50.93:8000/v1"
openwebui_omlx_secondary_base_url: "http://192.168.50.94:8000/v1"
openwebui_omlx_api_key: "{{ vault_omlx_api_key }}"

# Keep LiteLLM first so it remains the default OpenAI-compatible backend.
openwebui_openai_api_base_urls:
  - "{{ openwebui_openai_base_url }}"
  - "{{ openwebui_omlx_primary_base_url }}"
  - "{{ openwebui_omlx_secondary_base_url }}"
openwebui_openai_api_keys:
  - "{{ openwebui_openai_api_key }}"
  - "{{ openwebui_omlx_api_key }}"
  - "{{ openwebui_omlx_api_key }}"

# SearXNG connection (via shared traefik_proxy network)
openwebui_searxng_query_url: "http://searxng:8080/search?q=<query>&format=json"
openwebui_web_search_enabled: true
openwebui_web_search_engine: "searxng"

# Qdrant connection (via shared traefik_proxy network)
openwebui_qdrant_endpoint: "http://qdrant:6333"
openwebui_qdrant_collection_prefix: open-webui

# Ollama (direct host IP access for model loading)
openwebui_ollama_base_url: "http://192.168.50.51:11434"

# Traefik integration
openwebui_network_name: traefik_proxy
openwebui_traefik_hostname: "chat.taylor.lan"
openwebui_traefik_entrypoint: web

openwebui_systemd_unit: open-webui.service
openwebui_systemd_unit_path: "/etc/systemd/system/{{ openwebui_systemd_unit }}"
