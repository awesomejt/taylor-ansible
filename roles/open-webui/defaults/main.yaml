openwebui_primary_user: jason
openwebui_image: ghcr.io/open-webui/open-webui:main
openwebui_container_name: open-webui
openwebui_project_dir: /opt/open-webui
openwebui_compose_file: "{{ openwebui_project_dir }}/compose.yaml"
openwebui_env_file: "{{ openwebui_project_dir }}/.env"
openwebui_data_dir: "{{ openwebui_project_dir }}/data"
# Direct host exposure of Open WebUI. When nginx is enabled, this stays internal to the compose network.
openwebui_host_port: 3000
# Remote Ollama server base URL - override in host_vars or group_vars
openwebui_ollama_base_url: "http://127.0.0.1:11434"
openwebui_systemd_unit: open-webui.service
openwebui_systemd_unit_path: "/etc/systemd/system/{{ openwebui_systemd_unit }}"
openwebui_nginx_enable: true
openwebui_nginx_image: nginx:stable-alpine
openwebui_nginx_container_name: open-webui-nginx
openwebui_nginx_http_port: 80
openwebui_nginx_https_port: 443
openwebui_nginx_server_name: openwebui.taylor.lan
openwebui_nginx_conf_dir: "{{ openwebui_project_dir }}/nginx"
openwebui_nginx_conf_path: "{{ openwebui_nginx_conf_dir }}/default.conf"
openwebui_nginx_ssl_enable: false
openwebui_nginx_ssl_cert_path: "{{ openwebui_nginx_conf_dir }}/tls.crt"
openwebui_nginx_ssl_key_path: "{{ openwebui_nginx_conf_dir }}/tls.key"
