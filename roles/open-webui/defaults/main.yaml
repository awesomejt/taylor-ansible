openwebui_primary_user: jason
openwebui_project_name: ai-stack
openwebui_project_dir: /opt/ai-stack
openwebui_compose_file: "{{ openwebui_project_dir }}/compose.yaml"
openwebui_env_file: "{{ openwebui_project_dir }}/.env"

openwebui_image: ghcr.io/open-webui/open-webui:v0.9.5
openwebui_container_name: ai-stack-open-webui
openwebui_data_dir: "{{ openwebui_project_dir }}/open-webui"

openwebui_host_port: 80
openwebui_webui_base_url: "http://192.168.50.50"
openwebui_openai_base_url: "http://{{ openwebui_litellm_container_name }}:{{ openwebui_litellm_port }}/v1"
openwebui_openai_api_key: "{{ openwebui_litellm_master_key }}"
openwebui_searxng_query_url: "http://{{ openwebui_searxng_container_name }}:8080/search?q=<query>&format=json"

openwebui_litellm_image: ghcr.io/berriai/litellm:main-stable
openwebui_litellm_container_name: ai-stack-litellm
openwebui_litellm_dir: "{{ openwebui_project_dir }}/litellm"
openwebui_litellm_config_path: "{{ openwebui_litellm_dir }}/config.yaml"
openwebui_litellm_port: 4000
openwebui_litellm_master_key: "{{ vault_openwebui_litellm_master_key | default('change-me') }}"
openwebui_litellm_model_name: local-ollama
openwebui_litellm_ollama_model: llama3.2:latest
openwebui_litellm_ollama_base_url: "http://192.168.50.51:11434"
openwebui_litellm_omlx_primary_model_name: omlx-primary
openwebui_litellm_omlx_primary_model: gpt-oss-20b-MXFP4-Q8
openwebui_litellm_omlx_primary_base_url: "{{ hermes_omlx_macbook_url | default('http://192.168.50.93:8000/v1') }}"
openwebui_litellm_omlx_secondary_model_name: omlx-secondary
openwebui_litellm_omlx_secondary_model: gpt-oss-20b-MLX-8bit
openwebui_litellm_omlx_secondary_base_url: "{{ hermes_omlx_macmini_url | default('http://192.168.50.94:8000/v1') }}"
openwebui_litellm_omlx_api_key: "{{ vault_openwebui_omlx_api_key | default(vault_hermes_omlx_api_key | default('example')) }}"
openwebui_litellm_omlx_primary_chat_model: Qwen3.6-27B-6bit
openwebui_litellm_omlx_primary_coding_model: Qwen3.5-27B-Claude-4.6-Opus-Distilled-MLX-6bit
openwebui_litellm_omlx_primary_thinking_model: gpt-oss-20b-MXFP4-Q8
openwebui_litellm_omlx_secondary_chat_model: Qwen3.6-27B-6bit
openwebui_litellm_omlx_secondary_coding_model: Qwen3.6-35B-A3B-6bit
openwebui_litellm_omlx_secondary_thinking_model: gpt-oss-20b-MLX-8bit
openwebui_litellm_ollama_chat_model: llama3.1:latest
openwebui_litellm_ollama_coding_model: qwen2.5-coder:latest
openwebui_litellm_ollama_thinking_model: ministral-3:latest
openwebui_litellm_alias_chat: use-chat
openwebui_litellm_alias_coding: use-coding
openwebui_litellm_alias_thinking: use-thinking

openwebui_ollama_image: ollama/ollama:latest
openwebui_ollama_container_name: ai-stack-ollama
openwebui_ollama_dir: "{{ openwebui_project_dir }}/ollama"
openwebui_ollama_port: 11434

openwebui_searxng_image: ghcr.io/searxng/searxng:latest
openwebui_searxng_container_name: ai-stack-searxng
openwebui_searxng_dir: "{{ openwebui_project_dir }}/searxng"
openwebui_searxng_config_path: "{{ openwebui_searxng_dir }}/settings.yml"
openwebui_searxng_port: 8081
openwebui_searxng_secret_key: "{{ vault_openwebui_searxng_secret_key | default('change-me') }}"

openwebui_valkey_image: valkey/valkey:8-alpine
openwebui_valkey_container_name: ai-stack-valkey

openwebui_qdrant_image: qdrant/qdrant:latest
openwebui_qdrant_container_name: ai-stack-qdrant
openwebui_qdrant_dir: "{{ openwebui_project_dir }}/qdrant"
openwebui_qdrant_storage_dir: "{{ openwebui_qdrant_dir }}/storage"
openwebui_qdrant_port: 6333
openwebui_qdrant_grpc_port: 6334
openwebui_qdrant_endpoint: "http://{{ openwebui_qdrant_container_name }}:{{ openwebui_qdrant_port }}"
openwebui_qdrant_collection_prefix: ai-stack

openwebui_postgres_image: postgres:16-alpine
openwebui_postgres_container_name: ai-stack-postgres
openwebui_postgres_user: litellm
openwebui_postgres_db: litellm
openwebui_postgres_password: "{{ vault_openwebui_postgres_password | default('change-me') }}"
openwebui_postgres_host: 192.168.50.15
openwebui_postgres_port: 5432

openwebui_anythingllm_image: mintplexlabs/anythingllm:latest
openwebui_anythingllm_container_name: ai-stack-anythingllm
openwebui_anythingllm_dir: "{{ openwebui_project_dir }}/anythingllm"
openwebui_anythingllm_storage_dir: "{{ openwebui_anythingllm_dir }}/storage"
openwebui_anythingllm_port: 3001
openwebui_anythingllm_openai_base_url: "http://{{ openwebui_litellm_container_name }}:{{ openwebui_litellm_port }}/v1"
openwebui_anythingllm_embedding_base_url: "http://192.168.50.51:11434"

openwebui_n8n_image: n8nio/n8n:latest
openwebui_n8n_container_name: ai-stack-n8n
openwebui_n8n_dir: "{{ openwebui_project_dir }}/n8n"
openwebui_n8n_data_dir: "{{ openwebui_n8n_dir }}/data"
openwebui_n8n_port: 5678
openwebui_n8n_encryption_key: "{{ vault_openwebui_n8n_encryption_key | default('change-me') }}"
openwebui_n8n_host: 192.168.50.50
openwebui_n8n_protocol: http
openwebui_n8n_webhook_url: "http://192.168.50.50:{{ openwebui_n8n_port }}"

openwebui_systemd_unit: ai-stack.service
openwebui_systemd_unit_path: "/etc/systemd/system/{{ openwebui_systemd_unit }}"
