---
- name: Ensure role runs on Debian-family systems
  ansible.builtin.assert:
    that:
      - ansible_facts['os_family'] == "Debian"
    fail_msg: "qdrant role currently supports Debian/Ubuntu only"

- name: Ensure Qdrant project and storage directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ qdrant_primary_user }}"
    group: "{{ qdrant_primary_user }}"
    mode: "0755"
  loop:
    - "{{ qdrant_project_dir }}"
    - "{{ qdrant_storage_dir }}"
  loop_control:
    label: "{{ item }}"

- name: Deploy Qdrant Docker Compose file
  ansible.builtin.template:
    src: compose.yaml.j2
    dest: "{{ qdrant_compose_file }}"
    owner: "{{ qdrant_primary_user }}"
    group: "{{ qdrant_primary_user }}"
    mode: "0644"
  notify: Restart qdrant service

- name: Deploy Qdrant systemd unit
  ansible.builtin.template:
    src: qdrant.service.j2
    dest: "{{ qdrant_systemd_unit_path }}"
    owner: root
    group: root
    mode: "0644"
  notify: Restart qdrant service

- name: Ensure Qdrant service is enabled and running
  ansible.builtin.systemd:
    name: "{{ qdrant_systemd_unit }}"
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for Qdrant to be ready
  ansible.builtin.uri:
    url: "http://127.0.0.1:6333/"
    status_code: 200
  register: qdrant_ready
  until: qdrant_ready is succeeded
  retries: 12
  delay: 5
