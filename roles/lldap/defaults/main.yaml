---
# --- LLDAP image ---
lldap_image: lldap/lldap:stable
lldap_container_name: lldap

# --- Project layout ---
lldap_primary_user: root
lldap_project_name: lldap
lldap_project_dir: "/opt/{{ lldap_project_name }}"
lldap_compose_file: "{{ lldap_project_dir }}/compose.yaml"
lldap_env_file: "{{ lldap_project_dir }}/.env"
lldap_service_name: "{{ lldap_project_name }}.service"
lldap_systemd_unit_path: "/etc/systemd/system/{{ lldap_service_name }}"
lldap_data_dir: "{{ lldap_project_dir }}/data"

# --- LDAP settings ---
lldap_base_dn: "dc=taylor,dc=lan"
lldap_ldap_user_dn: "admin"
lldap_ldap_port: 3890
lldap_ldap_bind_address: "0.0.0.0"
lldap_ldap_host_port: 3890
lldap_web_port: 17170

# --- Secrets (from Ansible Vault) ---
lldap_jwt_secret: "{{ vault_lldap_jwt_secret | default('change-me-jwt') }}"
lldap_ldap_user_pass: "{{ vault_lldap_ldap_user_pass | default('change-me-ldap') }}"
lldap_db_password: "{{ vault_lldap_db_password | default('change-me-db') }}"

# --- PostgreSQL backend (prod server) ---
lldap_db_host: 192.168.50.15
lldap_db_port: 5432
lldap_db_name: lldap
lldap_db_user: lldap

# --- Traefik UI routing ---
lldap_traefik_hostname: ldap.taylor.lan
lldap_traefik_entrypoint: websecure

# --- Misc ---
lldap_verbose: false
lldap_http_url: "https://{{ lldap_traefik_hostname }}"
