- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: Restart vault
  ansible.builtin.systemd:
    name: "{{ vault_service_name }}"
    state: restarted

- name: Reload nginx
  ansible.builtin.systemd:
    name: nginx
    state: reloaded

- name: Restart nginx
  ansible.builtin.systemd:
    name: nginx
    state: restarted
