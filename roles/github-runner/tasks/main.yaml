---
# ── Preflight ─────────────────────────────────────────────────────────────────

- name: Ensure github-runner role runs on Debian-family systems
  ansible.builtin.assert:
    that:
      - ansible_facts['os_family'] == 'Debian'
    fail_msg: "github-runner role currently supports Debian/Ubuntu only"

- name: Ensure required runner variables are set
  ansible.builtin.assert:
    that:
      - gh_runner_pat | length > 0
      - gh_runner_org | length > 0
    fail_msg: >-
      Set vault_gh_runner_pat in vars/common/secrets.yaml and
      gh_runner_org in the playbook vars before running.

# ── User ──────────────────────────────────────────────────────────────────────

- name: Create runner group
  ansible.builtin.group:
    name: "{{ gh_runner_group }}"
    state: present

- name: Create runner user
  ansible.builtin.user:
    name: "{{ gh_runner_user }}"
    group: "{{ gh_runner_group }}"
    home: "{{ gh_runner_home_dir }}"
    shell: /bin/bash
    create_home: true
    state: present

- name: Add runner user to docker group
  ansible.builtin.user:
    name: "{{ gh_runner_user }}"
    groups: docker
    append: true
  when: gh_runner_docker_access | bool

# ── Runtime dependencies ──────────────────────────────────────────────────────

- name: Install runner runtime dependencies
  ansible.builtin.apt:
    name: "{{ gh_runner_packages }}"
    state: present
    update_cache: false
  when: gh_runner_packages | length > 0

# ── Binary installation ───────────────────────────────────────────────────────

- name: Ensure runner directory exists
  ansible.builtin.file:
    path: "{{ gh_runner_dir }}"
    state: directory
    owner: "{{ gh_runner_user }}"
    group: "{{ gh_runner_group }}"
    mode: "0755"

- name: Read installed runner version marker
  ansible.builtin.command: "cat {{ gh_runner_dir }}/.runner-version"
  register: _gh_runner_installed_version
  changed_when: false
  failed_when: false

- name: Determine whether runner binary update is required
  ansible.builtin.set_fact:
    _gh_runner_update_required: >-
      {{ (_gh_runner_installed_version.stdout | trim) != gh_runner_version }}

- name: Download runner archive
  ansible.builtin.get_url:
    url: "{{ gh_runner_download_url }}"
    dest: "/tmp/{{ gh_runner_archive }}"
    mode: "0644"
  when: _gh_runner_update_required | bool

- name: Stop runner service before upgrade
  ansible.builtin.systemd:
    name: github-runner
    state: stopped
  failed_when: false
  when:
    - _gh_runner_update_required | bool
    - _gh_runner_installed_version.rc == 0

- name: Extract runner archive
  ansible.builtin.unarchive:
    src: "/tmp/{{ gh_runner_archive }}"
    dest: "{{ gh_runner_dir }}"
    remote_src: true
    owner: "{{ gh_runner_user }}"
    group: "{{ gh_runner_group }}"
  when: _gh_runner_update_required | bool
  notify: Restart github-runner

- name: Write runner version marker
  ansible.builtin.copy:
    dest: "{{ gh_runner_dir }}/.runner-version"
    content: "{{ gh_runner_version }}\n"
    owner: "{{ gh_runner_user }}"
    group: "{{ gh_runner_group }}"
    mode: "0644"
  when: _gh_runner_update_required | bool

# ── Registration ──────────────────────────────────────────────────────────────

- name: Check if runner is already configured
  ansible.builtin.stat:
    path: "{{ gh_runner_dir }}/.runner"
  register: _gh_runner_config_stat

- name: Determine whether runner registration is needed
  ansible.builtin.set_fact:
    _gh_runner_register: >-
      {{ (not _gh_runner_config_stat.stat.exists) or (gh_runner_force_reconfigure | bool) }}

- name: Get GitHub Actions runner registration token
  ansible.builtin.uri:
    url: >-
      {{
        'https://api.github.com/orgs/' + gh_runner_org + '/actions/runners/registration-token'
        if gh_runner_scope == 'org' else
        'https://api.github.com/repos/' + gh_runner_org + '/' + gh_runner_repo + '/actions/runners/registration-token'
      }}
    method: POST
    headers:
      Authorization: "Bearer {{ gh_runner_pat }}"
      Accept: "application/vnd.github+json"
      X-GitHub-Api-Version: "2022-11-28"
    status_code: 201
  register: _gh_runner_reg_token
  no_log: true
  when: _gh_runner_register | bool

- name: Configure runner
  become: true
  become_user: "{{ gh_runner_user }}"
  ansible.builtin.command:
    cmd: >-
      ./config.sh
      --url {{ 'https://github.com/' + gh_runner_org
               if gh_runner_scope == 'org' else
               'https://github.com/' + gh_runner_org + '/' + gh_runner_repo }}
      --token {{ _gh_runner_reg_token.json.token }}
      --name {{ gh_runner_name }}
      --labels {{ gh_runner_labels }}
      --unattended
      --replace
    chdir: "{{ gh_runner_dir }}"
  no_log: true
  changed_when: true
  when: _gh_runner_register | bool

# ── Systemd service ───────────────────────────────────────────────────────────

- name: Deploy github-runner systemd unit
  ansible.builtin.template:
    src: github-runner.service.j2
    dest: /etc/systemd/system/github-runner.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart github-runner

- name: Ensure github-runner service is enabled and running
  ansible.builtin.systemd:
    name: github-runner
    enabled: true
    state: started
    daemon_reload: true
