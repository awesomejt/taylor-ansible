---
# Dormant playbook: retained as rollback path now that Harbor is the primary registry.
# See archive/registry.md for reactivation workflow.
- name: Deploy Docker Registry
  hosts: "{{ target | default('archived_registry') }}"
  become: true
  gather_facts: true
  pre_tasks:
    - name: Wait for apt locks to be released
      ansible.builtin.shell: |
        while fuser /var/lib/apt/lists/lock \
                    /var/lib/dpkg/lock \
                    /var/lib/dpkg/lock-frontend \
                    /var/cache/apt/archives/lock >/dev/null 2>&1; do
          echo "Waiting for apt lock..."
          sleep 10
        done
      changed_when: false
      timeout: 600
  roles:
    - updates
    - common
    - docker
    - { role: registry, tags: ["registry"] }
