---
- name: Install OpenClaw runtime and bootstrap OpenClaw
  hosts: openclaw
  become: true
  gather_facts: true

  vars:
    nodejs_major_version: "24"

    # Override if the CLI package name differs in your environment.
    openclaw_cli_npm_package: "openclaw"

    # Non-interactive + no-onboarding install command. Override as needed.
    openclaw_setup_command: "openclaw install --yes --no-onboarding"

    # Marker to avoid repeating first-time setup.
    openclaw_setup_marker: "/var/lib/openclaw/.setup-complete"

  pre_tasks:
    - name: Wait for apt locks to be released
      ansible.builtin.shell: |
        while fuser /var/lib/apt/lists/lock \
                    /var/lib/dpkg/lock \
                    /var/lib/dpkg/lock-frontend \
                    /var/cache/apt/archives/lock >/dev/null 2>&1; do
          echo "Waiting for apt lock..."
          sleep 10
        done
      changed_when: false
      timeout: 600

    - name: Ensure apt dependencies for repositories are installed
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - software-properties-common
        state: present
        update_cache: true
        lock_timeout: 600

  tasks:
    - name: Ensure basic tools are installed
      ansible.builtin.apt:
        name:
          - git
          - nano
        state: present
        lock_timeout: 600

    - name: Add deadsnakes PPA for Python 3.14
      ansible.builtin.apt_repository:
        repo: ppa:deadsnakes/ppa
        state: present
      when: ansible_distribution == "Ubuntu"

    - name: Install Python 3.14 runtime packages
      ansible.builtin.apt:
        name:
          - python3.14
          - python3.14-venv
          - python3.14-dev
        state: present
        update_cache: true
        lock_timeout: 600
      when: ansible_distribution == "Ubuntu"

    - name: Create keyrings directory for APT repositories
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Download NodeSource repository key
      ansible.builtin.get_url:
        url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
        dest: /tmp/nodesource-repo.gpg.key
        mode: "0644"

    - name: Convert NodeSource key to keyring format
      ansible.builtin.command:
        cmd: gpg --dearmor -o /etc/apt/keyrings/nodesource.gpg /tmp/nodesource-repo.gpg.key
      args:
        creates: /etc/apt/keyrings/nodesource.gpg

    - name: Add NodeSource repository for Node.js 24.x
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/nodesource.gpg] https://deb.nodesource.com/node_{{ nodejs_major_version }}.x nodistro main"
        filename: nodesource
        state: present

    - name: Install Node.js 24 LTS
      ansible.builtin.apt:
        name: nodejs
        state: present
        update_cache: true
        lock_timeout: 600

    - name: Upgrade npm to latest
      ansible.builtin.command:
        cmd: npm install -g npm@latest
      changed_when: true

    - name: Install OpenClaw CLI package globally
      ansible.builtin.command:
        cmd: npm install -g {{ openclaw_cli_npm_package }}
      changed_when: true

    - name: Ensure OpenClaw state directory exists
      ansible.builtin.file:
        path: "{{ openclaw_setup_marker | dirname }}"
        state: directory
        mode: "0755"

    - name: Check whether OpenClaw setup already completed
      ansible.builtin.stat:
        path: "{{ openclaw_setup_marker }}"
      register: openclaw_setup_state

    - name: Run OpenClaw non-interactive install without onboarding
      ansible.builtin.shell: "{{ openclaw_setup_command }}"
      environment:
        CI: "true"
      when: not openclaw_setup_state.stat.exists

    - name: Mark OpenClaw setup complete
      ansible.builtin.file:
        path: "{{ openclaw_setup_marker }}"
        state: touch
        mode: "0644"
      when: not openclaw_setup_state.stat.exists

    - name: Clean apt caches
      ansible.builtin.apt:
        autoclean: true
        autoremove: true
        lock_timeout: 600
